# Local development services — PostgreSQL + Redis + SonarQube
# Credentials are read from the root .env file.
# Usage: pnpm db:up / pnpm db:down / pnpm sonar:up / pnpm sonar:down / pnpm dev:all

services:
  # === Application database ===
  app-db:
    image: postgres:16
    container_name: expat-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - expat_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-expathunter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: expat-redis
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\";
      else
        redis-server;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - expat_redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === SonarQube (code quality) ===
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: ${SONAR_JDBC_URL}
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    restart: unless-stopped
    profiles:
      - sonar

  sonarqube-db:
    image: postgres:16
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: ${SONAR_JDBC_USERNAME}
      POSTGRES_PASSWORD: ${SONAR_JDBC_PASSWORD}
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_JDBC_USERNAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - sonar

volumes:
  expat_pgdata:
    name: expat-hunter_pgdata
  expat_redisdata:
    name: expat-hunter_redisdata
  sonarqube_data:
    name: sonarqube_sonarqube_data
  sonarqube_extensions:
    name: sonarqube_sonarqube_extensions
  sonarqube_logs:
    name: sonarqube_sonarqube_logs
  sonarqube_postgresql_data:
    name: sonarqube_postgresql_data
