# G4.1 Smoke boot strategy for the AdonisJS 6 backend.
#
# Runs after G4 (build). Proves the API actually starts, migrations
# apply, and /health returns 200 without errors. If any step fails,
# the gate fails — no PR.

strategy: adonisjs_start_healthcheck

steps:
  - name: build-if-needed
    cmd: "pnpm --filter @expat-hunter/api build"
    skip_if: "test -d apps/api/build"

  - name: db-up
    cmd: "pnpm db:up"
    ready_when: "docker exec expat-hunter-postgres pg_isready -U expat_hunter > /dev/null 2>&1"
    ready_timeout_s: 30

  - name: run-migrations
    cmd: "pnpm db:migrate"
    timeout_s: 60

  - name: start-api
    cmd: "pnpm --filter @expat-hunter/api exec node bin/server.js"
    env:
      NODE_ENV: test
      PORT: "3333"
    background: true
    ready_when: "curl -sf http://localhost:3333/health > /dev/null"
    ready_timeout_s: 45

  - name: assert-health
    cmd: "curl -sSf -o /dev/null -w '%{http_code}' http://localhost:3333/health | grep -q 200"
    timeout_s: 10

  - name: assert-auth-middleware
    # A protected endpoint must 401 when called without credentials.
    cmd: "test $(curl -s -o /dev/null -w '%{http_code}' http://localhost:3333/api/candidate-profile) -eq 401"
    timeout_s: 10

teardown:
  - cmd: "pkill -f 'node bin/server.js' || true"
  # Keep docker DB running between smoke runs — teardown is selective.
