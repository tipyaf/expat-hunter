# SDD v5 stack registry — expat-hunter
#
# typescript-react and nodejs-express point to PROJECT-LEVEL overrides
# in _work/stacks/ because this project uses Next.js 14 (not raw Vite
# + React) and AdonisJS 6 (not Express). The framework defaults under
# framework/stacks/templates/ would not match our conventions.
#
# postgres keeps the framework default (already appropriate for Lucid
# + docker-compose + standard migration semantics).
# python-fastapi stays disabled (no Python backend).
#
# To edit an override, update the YAMLs in _work/stacks/<stack>/.
# To revert to the framework default, change the `path:` back to
# `framework/stacks/templates/<stack>`.

version: 1
stacks:
  python-fastapi:
    enabled: false
    path: framework/stacks/templates/python-fastapi

  typescript-react:
    enabled: true
    path: _work/stacks/typescript-react             # project override (Next.js 14)
    shared_conventions: _work/stacks/typescript-shared.yaml
    source_v4: _work/stacks/typescript-nextjs.md    # kept for audit until validated

  postgres:
    enabled: true
    path: framework/stacks/templates/postgres

  nodejs-express:
    enabled: true
    path: _work/stacks/nodejs-express               # project override (AdonisJS 6)
    shared_conventions: _work/stacks/typescript-shared.yaml
    source_v4: _work/stacks/typescript-adonisjs.md  # kept for audit until validated
