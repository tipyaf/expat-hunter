# SDD v5 stack registry — generated by migrate-v4-to-v5.sh
# Stacks are auto-detected from the project's package.json / pyproject.toml / docker-compose / migrations.
# Flip `enabled: false → true` to activate a stack the detector missed.
# For custom stacks (go-gin, rust-axum, etc.) see stacks/CUSTOM_STACK_GUIDE.md
version: 1
stacks:
  python-fastapi:
    enabled: false
    path: framework/stacks/templates/python-fastapi
  typescript-react:
    enabled: true
    path: framework/stacks/templates/typescript-react
  postgres:
    enabled: true
    path: framework/stacks/templates/postgres
  nodejs-express:
    enabled: true
    path: framework/stacks/templates/nodejs-express
