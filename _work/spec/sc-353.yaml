edge_cases:
  - description: "User toggles to show, then navigates away and back"
    handling: "Toggle state is local to the component — resets to hidden on unmount/re-mount (default false)"
  - description: "PasswordInput used without i18n context (e.g. in tests)"
    handling: "aria-label falls back gracefully — use useTranslations with a fallback string"
  - description: "Multiple PasswordInput fields on the same page (e.g. reset-password: new + confirm)"
    handling: "Each instance has its own independent showPassword state — toggling one does not affect the other"
  - description: "IMAP password field and SMTP password field on email settings page"
    handling: "Same as above — independent state per instance"

depends_on: []

notes: |
  Password fields inventory (6 total across 4 pages):
  - /login:                    1 field  (password)
  - /register:                 1 field  (password)
  - /reset-password:           2 fields (password + confirmPassword)
  - /parametres/connexion-email: 2 fields (imapPassword + smtpPassword)

  Implementation pattern for PasswordInput:
  - Client component ('use client')
  - Props: extends InputHTMLAttributes<HTMLInputElement> (minus `type`)
  - Internal state: const [show, setShow] = useState(false)
  - Renders: <div className="relative"> + <input type={show ? 'text' : 'password'}> + <button> (eye/eyeoff SVG icon)
  - Toggle button: type="button" (prevent form submit), absolute right inside the input wrapper
  - aria-label on toggle button: t('auth.showPassword') or t('auth.hidePassword') based on state
  - Uses CSS variables for colors (var(--color-text-muted), var(--color-border))
  - No extra npm packages — inline SVG icons

  i18n keys to add:
    en.json: "showPassword": "Show password", "hidePassword": "Hide password"
    fr.json: "showPassword": "Afficher le mot de passe", "hidePassword": "Masquer le mot de passe"

