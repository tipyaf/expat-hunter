story:
  id: "sc-353"
  shortcut_url: "https://app.shortcut.com/expat-hunter/story/353"
  title: "Password fields show/hide toggle"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "S"
  estimate: 1
  type: "feature"
  refined_at: "2026-03-26"
  refined_by: "refinement"

user_story: >
  As a user filling in a password field,
  I want to be able to toggle password visibility (show/hide),
  so that I can verify what I am typing without making a mistake.

