      reason: "Reusable PasswordInput component with show/hide toggle button"
    - path: "apps/frontend/src/components/ui/password-input.test.tsx"
      reason: "Unit tests for PasswordInput component"
  files_to_modify:
    - path: "apps/frontend/src/app/login/page.tsx"
      reason: "Replace <input type='password'> with <PasswordInput>"
    - path: "apps/frontend/src/app/register/page.tsx"
      reason: "Replace <input type='password'> with <PasswordInput>"
    - path: "apps/frontend/src/app/reset-password/page.tsx"
      reason: "Replace 2 <input type='password'> (new + confirm) with <PasswordInput>"
    - path: "apps/frontend/src/app/parametres/connexion-email/page.tsx"
      reason: "Replace 2 <input type='password'> (IMAP + SMTP) with <PasswordInput>"
    - path: "apps/frontend/src/i18n/en.json"
      reason: "Add i18n keys: auth.showPassword, auth.hidePassword"
    - path: "apps/frontend/src/i18n/fr.json"
