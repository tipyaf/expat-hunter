id: "sc-752"
name: "refacto: add readonly to never-reassigned class members (SonarQube S2933)"
type: "chore"
area: "backend"
estimate: 1
status: "refined"
shortcut_id: 752
parent: null
depends_on: []

user_story: |
  As a developer,
  I want all never-reassigned class members marked as `readonly`,
  So that the codebase passes SonarQube rule S2933 and prevents accidental reassignment.

scope:
  files_to_modify:
    - "apps/api/app/controllers/chat_controller.ts"
    - "apps/api/app/controllers/tips_controller.ts"
    - "apps/api/app/controllers/onboarding_controller.ts"
    - "apps/api/app/controllers/emails_controller.ts"
    - "apps/api/app/controllers/market_controller.ts"
    - "apps/api/app/services/email_enricher.ts"
    - "apps/api/app/services/context_enrichment_service.ts"
    - "apps/api/app/services/search_orchestrator_service.ts"
    - "apps/api/app/services/market_snapshot_service.ts"
    - "apps/api/app/services/email_generation_service.ts"
  files_to_create: []
  files_to_read: []

acceptance_criteria:
  - id: "AC-FUNC-READONLY-01"
    type: "FUNC"
    description: "Given all 10 backend files / When inspecting injected members / Then every never-reassigned member is marked readonly"
    verify: "grep -rn 'private\\|protected' apps/api/app/controllers/chat_controller.ts apps/api/app/controllers/tips_controller.ts apps/api/app/controllers/onboarding_controller.ts apps/api/app/controllers/emails_controller.ts apps/api/app/controllers/market_controller.ts apps/api/app/services/email_enricher.ts apps/api/app/services/context_enrichment_service.ts apps/api/app/services/search_orchestrator_service.ts apps/api/app/services/market_snapshot_service.ts apps/api/app/services/email_generation_service.ts | grep -v 'readonly' | grep -cE '(chatService|profileService|usageService|dashboardService|tipsService|marketService|cache|hunterApiKey|apolloApiKey|sourcingService|analysisService|emailGenerationService|cacheService|composer)' | xargs test 0 -eq"
    tier: 1

  - id: "AC-BP-READONLY-02"
    type: "BP"
    description: "Given the codebase / When running TypeScript compiler / Then 0 errors"
    verify: "cd apps/api && npx tsc --noEmit 2>&1 | tail -1 | grep -q 'error' && exit 1 || exit 0"
    tier: 1

  - id: "AC-BP-READONLY-03"
    type: "BP"
    description: "Given existing unit tests / When running test suite / Then all tests pass"
    verify: "cd apps/api && node --experimental-vm-modules node_modules/.bin/japa --files='tests/unit/**/*.spec.ts' 2>&1 | tail -5"
    tier: 2

  - id: "AC-SEC-READONLY-04"
    type: "SEC"
    description: "Given the refactoring / When checking git diff / Then only readonly keyword additions — no logic changes"
    verify: "git diff --unified=0 -- 'apps/api/**/*.ts' | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v 'readonly' | grep -cvE '^[+-]\\s*$' | xargs test 0 -eq"
    tier: 1

edge_cases: []

test_intentions: []

components:
  reuse: []
  create: []

notes: |
  Purely declarative change — adding the `readonly` keyword to class members
  that are assigned in the constructor and never reassigned. No behavior change.
