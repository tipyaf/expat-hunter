story:
  id: "sc-512"
  title: "fix: hide chat button when user is not authenticated"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XS"
  refined_at: "2026-03-28"
  refined_by: "refinement"

user_story: >
  As an unauthenticated visitor on the login or register page,
  I want the chat button to be hidden,
  so that I don't see a feature I can't use without being logged in.

scope:
  files_to_create: []
  files_to_modify:
    - path: "apps/frontend/src/components/chat/floating-chat-button.tsx"
      reason: "Add useAuth() check — return null when user is not authenticated"
  files_to_read:
    - path: "apps/frontend/src/contexts/auth-context.tsx"
      reason: "Confirm useAuth() API: user is null when not logged in"
    - path: "apps/frontend/src/app/layout.tsx"
      reason: "Confirm FloatingChatButton is rendered inside AuthProvider"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC512-01"
      description: >
        Given a visitor on /login (not authenticated),
        When the page renders,
        Then the FloatingChatButton returns null (not visible).
      verify: "grep -q 'useAuth' apps/frontend/src/components/chat/floating-chat-button.tsx && grep -q 'return null' apps/frontend/src/components/chat/floating-chat-button.tsx && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC512-02"
      description: >
        Given an authenticated user on the dashboard,
        When the page renders,
        Then the FloatingChatButton is visible as before.
      verify: "grep -q 'FloatingChatButton' apps/frontend/src/app/layout.tsx && echo PASS || echo FAIL"
      tier: 1

  security:
    - id: "AC-SEC-SC512-01"
      description: >
        Given the FloatingChatButton component,
        When user is null (not authenticated),
        Then the chat UI is completely hidden — no chat API calls can be triggered.
      verify: "grep -n '!user' apps/frontend/src/components/chat/floating-chat-button.tsx | grep -q 'return null' && echo PASS || echo FAIL"
      tier: 1

  best_practices:
    - id: "AC-BP-SC512-TS"
      description: >
        Given the frontend codebase after changes,
        When running TypeScript type checking,
        Then no new errors are introduced in floating-chat-button.tsx.
      verify: "cd apps/frontend && pnpm tsc --noEmit 2>&1 | grep 'floating-chat' && echo FAIL || echo PASS"
      tier: 1

edge_cases:
  - description: "Auth loading state — user is null during initial load"
    handling: "useAuth() returns isLoading=true initially. During loading, user is null so chat is hidden — acceptable, it appears once auth resolves."
  - description: "Token expires while chat is open"
    handling: "Chat API calls will return 401, handled by existing error flow. Button visibility doesn't change mid-session."

depends_on: []

notes: >
  Simple 2-line fix: import useAuth, destructure user, return null if !user.
  FloatingChatButton is already inside AuthProvider in layout.tsx so useAuth() is safe.
  No path-based exclusion needed — auth state is the single source of truth.

definition_of_done:
  - "All AC verify: commands pass"
  - "No new TypeScript errors"
  - "PR merged into develop"
  - "Shortcut story sc-512 moved to Done"

closing_ac:
  - id: "AC-BP-SC512-DONE"
    type: "BP"
    description: |
      PR for sc-512 is merged into develop — story closure gate.
      After this passes, the validator MUST move sc-512 to Done (state 500000010).
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-512'"
    tier: 1
