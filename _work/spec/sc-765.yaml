    verify: "git diff origin/main --unified=0 -- 'apps/api/**/*.ts' 'apps/frontend/**/*.tsx' | grep '^+' | grep -v '^+++' | grep -c ': any' | xargs test 0 -eq && echo PASS"
    tier: 1

