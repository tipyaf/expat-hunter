    description: "Given all modified files / When checked / Then only ternary extraction — no logic changes"
    verify: "git diff origin/main -- 'apps/api/**/*.ts' 'apps/frontend/**/*.tsx' | grep '^+' | grep -v '^+++' | grep -v '^+$' | grep -v 'const ' | grep -v 'let ' | grep -v '//' | grep -vc '?' | xargs test 5 -ge && echo PASS"
