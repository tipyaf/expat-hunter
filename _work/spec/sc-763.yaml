story:
  id: "sc-763"
  name: "refacto: reduce cognitive complexity in critical functions (SonarQube S3776)"
  type: "chore"
  size: "L"
  estimate: 5
  priority: "high"
  parent_feature: null
  depends_on: []
  adr_required: false

user_story: |
  As a developer,
  I want functions with excessive cognitive complexity to be refactored into smaller, focused helpers,
  so the codebase is easier to maintain and SonarQube S3776 violations are resolved.

scope:
  files_to_modify:
    - path: "apps/api/app/services/sourcing_service.ts"
      description: "Extract helpers from persistContacts() — CC 39 → ≤15"
    - path: "apps/api/app/services/confidence_score_service.ts"
      description: "Extract per-factor scorers from calculate() — CC 25 → ≤15"
    - path: "apps/api/app/services/search_orchestrator_service.ts"
      description: "Extract shouldSkipContact(), processHunterContact() — CC 25 → ≤15"
    - path: "apps/api/app/scrapers/seek_scraper.ts"
      description: "Extract API call + dedup helpers from scrape() — CC 24 → ≤15"
    - path: "apps/api/app/services/company_enricher.ts"
      description: "Extract crawlTeamPages(), card/heading parsers — CC 26+22 → ≤15 each"
    - path: "apps/api/app/controllers/profile_controller.ts"
      description: "Extract validateCvFile() from uploadCv() — CC 22 → ≤15"
    - path: "apps/api/app/services/visa_sponsor_registry.ts"
      description: "Extract fetchNzPage() from fetchNzRegistry() — CC 21 → ≤15"
    - path: "apps/api/app/services/sourcing_orchestrator.ts"
      description: "Extract guard helpers from findNamedContacts() + label lookups from scoreContacts() — CC 20+17 → ≤15 each"
    - path: "apps/api/commands/poc_pipeline.ts"
      description: "Extract processSingleCompany() + per-step methods from run() — CC 83 → ≤15"
    - path: "apps/api/app/controllers/presets_controller.ts"
      description: "Extract validation helper from update() — CC 16 → ≤15"
    - path: "apps/api/app/ai/prompts/email_prompt.ts"
      description: "Extract instruction builders from buildEmailPrompt() — CC 16 → ≤15"
    - path: "apps/api/app/scrapers/apify_fallback.ts"
      description: "Extract API call + parsing from scrape() — CC 16 → ≤15"
    - path: "apps/frontend/src/app/profil/setup/page.tsx"
      description: "Extract applyAiSuggestions() from handleCvUpload() — CC 17 → ≤15"
  files_to_read: []
  files_to_create: []

acceptance_criteria:
  - id: "AC-FUNC-763-01"
    type: "FUNC"
    description: "Given all 12 backend files / When SonarQube re-scanned / Then 0 S3776 violations remain"
    verify: "curl -s 'http://localhost:9000/api/issues/search?projectKeys=expathunter&rules=typescript:S3776&statuses=OPEN&ps=1' -H \"Authorization: Bearer $(grep '^SONAR_TOKEN=' .env | cut -d= -f2)\" | grep -o '\"total\":[0-9]*' | grep -q '\"total\":0' && echo PASS"
    tier: 2

  - id: "AC-FUNC-763-02"
    type: "FUNC"
    description: "Given the codebase / When tsc --noEmit runs / Then 0 new TypeScript errors introduced"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' npx tsc --noEmit 2>&1 | grep -c 'error TS' | xargs test 24 -ge && echo PASS"
    tier: 2

  - id: "AC-FUNC-763-03"
    type: "FUNC"
    description: "Given the codebase / When unit tests run / Then all pass (no regressions)"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' pnpm test 2>&1 | tail -5"
    tier: 2

  - id: "AC-FUNC-763-04"
    type: "FUNC"
    description: "Given the API / When started / Then it boots without errors"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' timeout 15 node ace serve 2>&1 | grep -q 'started' && echo PASS"
    tier: 2

  - id: "AC-SEC-763-01"
    type: "SEC"
    description: "Given all modified files / When checked / Then no any type introduced"
    verify: "git diff origin/main --unified=0 -- 'apps/api/**/*.ts' 'apps/frontend/**/*.tsx' | grep '^+' | grep -v '^+++' | grep -c ': any' | xargs test 0 -eq && echo PASS"
    tier: 1

  - id: "AC-BP-763-01"
    type: "BP"
    description: "Given all modified files / When checked / Then every extracted helper is private (not exported)"
    verify: "git diff origin/main --unified=0 -- 'apps/api/**/*.ts' 'apps/frontend/**/*.tsx' | grep '^+' | grep -v '^+++' | grep -E 'function |const .* =' | grep -v 'private' | grep -c 'export' | xargs test 0 -eq && echo PASS"
    tier: 1

edge_cases:
  - "AdonisJS @inject() decorated members — DI still works after extraction"
  - "poc_pipeline.ts is a PoC command (CC=83) — refactor aggressively, not production-critical"
  - "Frontend setup/page.tsx — React hook rules must be preserved when extracting"
  - "Extracted helpers must preserve error handling (try-catch propagation)"
  - "Private helpers in same file vs separate file — prefer same file to minimize scope"

test_intentions: []

components: {}
