id: "personalized-emailing"
name: "feat: personalized emailing — AI generation, Gmail sending, batch, reply tracking"
type: "feature"
status: "validated"
shortcut_url: ""

context: |
  Retrospective story — the feature was fully implemented before the framework was set up.
  EmailComposer generates AI emails via OpenRouter. EmailSendingService sends via SMTP/Gmail.
  EmailGenerationService orchestrates batch generation. EmailMessage tracks status lifecycle
  (draft → approved → sent → opened → replied → bounced). EmailConnection stores IMAP/SMTP
  credentials. Known security gap: imapPassword and smtpPassword stored in plain text — see
  AC-SEC-PE-03 which requires a fix.

scope:
  - "apps/api/app/ai/email_composer.ts"
  - "apps/api/app/ai/prompts/email_prompt.ts"
  - "apps/api/app/services/email_generation_service.ts"
  - "apps/api/app/services/email_sending_service.ts"
  - "apps/api/app/services/email_enricher.ts"
  - "apps/api/app/services/email_verifier.ts"
  - "apps/api/app/controllers/emails_controller.ts"
  - "apps/api/app/models/email_message.ts"
  - "apps/api/app/models/email_connection.ts"
  - "apps/api/app/models/email_template.ts"
  - "apps/api/start/routes.ts"
  - "apps/frontend/src/app/emails/page.tsx"
  - "apps/frontend/src/hooks/use-emails.ts"
  - "apps/frontend/src/components/ui/email-status-badge.tsx"

acceptance_criteria:
  - id: "AC-FUNC-PE-01"
    type: "FUNC"
    description: "POST /api/emails/generate wired to EmailsController.generate"
    verify: "grep -c \"EmailsController, 'generate'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-PE-02"
    type: "FUNC"
    description: "POST /api/emails/send-batch wired to EmailsController.sendBatch"
    verify: "grep -c \"EmailsController, 'sendBatch'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-PE-03"
    type: "FUNC"
    description: "PUT /api/emails/:id wired to EmailsController.update"
    verify: "grep -c \"EmailsController, 'update'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-PE-04"
    type: "FUNC"
    description: "EmailMessage model defines subject, body, status, type (initial/follow_up variants)"
    verify: "grep -c 'subject\\|body\\|status\\|type.*EmailType\\|EmailStatus' apps/api/app/models/email_message.ts"
    tier: 1

  - id: "AC-FUNC-PE-05"
    type: "FUNC"
    description: "EmailGenerationService imports and uses EmailComposer for AI generation"
    verify: "grep -c 'EmailComposer\\|email_composer' apps/api/app/services/email_generation_service.ts"
    tier: 1

  - id: "AC-FUNC-PE-06"
    type: "FUNC"
    description: "Frontend /emails page exists and uses useEmails hook"
    verify: "test -f apps/frontend/src/app/emails/page.tsx && grep -c 'useEmails' apps/frontend/src/app/emails/page.tsx"
    tier: 1

  - id: "AC-FUNC-PE-07"
    type: "FUNC"
    description: "All email unit and functional tests pass"
    verify: "cd apps/api && ~/.nvm/versions/node/v22.22.1/bin/node --import tsx/esm bin/test.ts 2>&1 | grep -E 'Tests.*passed'"
    tier: 2

  - id: "AC-SEC-PE-01"
    type: "SEC"
    description: "All /api/emails routes are protected by auth middleware"
    verify: "grep -A 12 'prefix.*api/emails' apps/api/start/routes.ts | grep -c 'middleware.auth'"
    tier: 1

  - id: "AC-SEC-PE-02"
    type: "SEC"
    description: "Emails scoped to auth.user.id via whereHas contact"
    verify: "grep -c 'whereHas.*contact\\|userId.*user.id' apps/api/app/controllers/emails_controller.ts"
    tier: 1

  - id: "AC-SEC-PE-03"
    type: "SEC"
    description: "IMAP/SMTP passwords are NOT stored in plain text — encryption or env-based storage"
    verify: "grep -c 'encrypt\\|Encryption\\|secret\\|@column.*prepare\\|beforeSave' apps/api/app/models/email_connection.ts"
    tier: 1

  - id: "AC-BP-PE-01"
    type: "BP"
    description: "Email sending logic in EmailSendingService — not in controller"
    verify: "grep -c 'EmailSendingService\\|sendingService' apps/api/app/controllers/emails_controller.ts"
    tier: 1

  - id: "AC-BP-PE-02"
    type: "BP"
    description: "Email generation logic in EmailGenerationService — not in controller"
    verify: "grep -c 'EmailGenerationService\\|generationService' apps/api/app/controllers/emails_controller.ts"
    tier: 1

edge_cases:
  - "Gmail credentials invalid → sending fails with clear error, status not changed"
  - "AI generation fails → email stays in draft, error surfaced to user"
  - "Send batch with 0 approved emails → returns empty result, no error"
  - "Email already sent → cannot be edited or re-sent"
  - "IMAP/SMTP credentials plain text (KNOWN GAP) → AC-SEC-PE-03 fails, fix required"
