id: "candidate-profile"
name: "feat: candidate profile — CV, skills, preferences, onboarding"
type: "feature"
status: "validated"
shortcut_url: ""

context: |
  Retrospective story — the feature was fully implemented before the framework was set up.
  Backend (model, controller, service, validator, CV parser, AI extractor) and frontend
  (profile page, onboarding page, setup page, useProfile hook) are complete.
  Backend tests validated via sc-198 (15 unit + 8 functional, all passing).

scope:
  - "apps/api/app/models/candidate_profile.ts"
  - "apps/api/app/controllers/profile_controller.ts"
  - "apps/api/app/services/profile_service.ts"
  - "apps/api/app/validators/profile_validator.ts"
  - "apps/api/app/services/cv_parser_service.ts"
  - "apps/api/app/ai/cv_extractor.ts"
  - "apps/api/start/routes.ts"
  - "apps/frontend/src/app/profil/page.tsx"
  - "apps/frontend/src/app/profil/setup/page.tsx"
  - "apps/frontend/src/app/onboarding/page.tsx"
  - "apps/frontend/src/hooks/use-profile.ts"

acceptance_criteria:
  - id: "AC-FUNC-CP-01"
    type: "FUNC"
    description: "GET /api/profile route exists and is wired to ProfileController.show"
    verify: "grep -c \"ProfileController, 'show'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-CP-02"
    type: "FUNC"
    description: "PUT /api/profile route exists and is wired to ProfileController.update"
    verify: "grep -c \"ProfileController, 'update'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-CP-03"
    type: "FUNC"
    description: "POST /api/profile/cv route exists and is wired to ProfileController.uploadCv"
    verify: "grep -c \"ProfileController, 'uploadCv'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-CP-04"
    type: "FUNC"
    description: "completeOnboarding blocks if skills=0 AND cvText=null, or targetCountries=0"
    verify: "grep -c 'skills.length === 0.*cvText\\|targetCountries.length === 0' apps/api/app/services/profile_service.ts"
    tier: 1

  - id: "AC-FUNC-CP-05"
    type: "FUNC"
    description: "completionPercentage computed over 5 criteria x 20% in controller"
    verify: "grep -c 'pct += 20' apps/api/app/controllers/profile_controller.ts"
    tier: 1

  - id: "AC-FUNC-CP-06"
    type: "FUNC"
    description: "Frontend profile page exists and uses useProfile hook"
    verify: "test -f apps/frontend/src/app/profil/page.tsx && grep -c 'useProfile' apps/frontend/src/app/profil/page.tsx"
    tier: 1

  - id: "AC-FUNC-CP-07"
    type: "FUNC"
    description: "All backend unit and functional profile tests pass"
    verify: "cd apps/api && NODE_ENV=test node --import tsx/esm bin/test.ts --files 'tests/unit/services/profile_service.spec.ts' 'tests/functional/profile/profile.spec.ts' 2>&1 | grep -E 'PASSED|FAILED'"
    tier: 2

  - id: "AC-SEC-CP-01"
    type: "SEC"
    description: "All /api/profile routes are protected by auth middleware"
    verify: "grep -A 8 'prefix.*api/profile' apps/api/start/routes.ts | grep -c 'middleware.auth'"
    tier: 1

  - id: "AC-SEC-CP-02"
    type: "SEC"
    description: "CV upload validates extension (pdf/txt) and size (5MB max)"
    verify: "grep -c 'extnames.*pdf\\|size.*5mb' apps/api/app/controllers/profile_controller.ts"
    tier: 1

  - id: "AC-SEC-CP-03"
    type: "SEC"
    description: "Profile queries scoped to auth.user.id — no cross-user access"
    verify: "grep -c 'userId.*user.id\\|user\\.id' apps/api/app/services/profile_service.ts"
    tier: 1

  - id: "AC-SEC-CP-04"
    type: "SEC"
    description: "VineJS validator used on PUT /api/profile before calling service"
    verify: "grep -c 'validateUsing.*updateProfileValidator' apps/api/app/controllers/profile_controller.ts"
    tier: 1

  - id: "AC-BP-CP-01"
    type: "BP"
    description: "Business logic in ProfileService — controller only calls service methods"
    verify: "grep -c 'this.profileService\\.' apps/api/app/controllers/profile_controller.ts"
    tier: 1

  - id: "AC-BP-CP-02"
    type: "BP"
    description: "AI extraction failure is non-blocking (catch block with no rethrow)"
    verify: "grep -B 1 'AI extraction failure' apps/api/app/controllers/profile_controller.ts | grep -c 'catch'"
    tier: 1

  - id: "AC-BP-CP-03"
    type: "BP"
    description: "No hardcoded UI strings in profile page — all text via i18n keys"
    verify: "grep -c 'useTranslations' apps/frontend/src/app/profil/page.tsx"
    tier: 1

edge_cases:
  - "CV upload fails parsing → raw text not saved, error returned"
  - "AI extraction fails after CV parse → raw text still saved, no error to user"
  - "Complete onboarding with CV but no skills → allowed (CV counts)"
  - "PUT /api/profile with empty arrays → clears arrays (intentional)"
  - "Concurrent PUT requests → last write wins (no optimistic lock at MVP)"
