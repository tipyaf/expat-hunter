id: "sc-754"
name: "refacto: fix frontend code smells — ternaries, accessibility, hooks (SonarQube)"
type: "chore"
area: "frontend"
estimate: 2
status: "refined"
shortcut_id: 754
parent: null
depends_on: []

user_story: |
  As a developer,
  I want frontend code smells fixed (nested ternaries, accessibility, conditional hooks, optional chaining),
  So that the codebase passes SonarQube rules and improves accessibility and readability.

scope:
  files_to_modify:
    - "apps/frontend/src/app/contacts/page.tsx"
    - "apps/frontend/src/app/suivi/page.tsx"
    - "apps/frontend/src/components/chat/chat-panel.tsx"
    - "apps/frontend/src/components/ui/search-progress-modal.tsx"
    - "apps/frontend/src/components/ui/contact-detail-panel.tsx"
    - "apps/frontend/src/app/emails/page.tsx"
    - "apps/frontend/src/app/parametres/page.tsx"
    - "apps/frontend/src/app/parametres/connexion-email/page.tsx"
    - "apps/frontend/src/app/onboarding/page.tsx"
    - "apps/frontend/src/app/recherche/page.tsx"
    - "apps/frontend/src/app/admin/ai-settings/page.tsx"
    - "apps/frontend/src/hooks/use-pipeline.ts"
  files_to_create: []
  files_to_read: []

issues:
  - rule: "S3358"
    count: 8
    description: "Nested ternary → extract to variable or helper"
    files:
      - "contacts/page.tsx"
      - "emails/page.tsx"
      - "recherche/page.tsx"
      - "admin/ai-settings/page.tsx"
      - "parametres/connexion-email/page.tsx"
      - "search-progress-modal.tsx"
  - rule: "S6819"
    count: 3
    description: "role=dialog → native <dialog> element"
    files:
      - "chat-panel.tsx"
      - "search-progress-modal.tsx"
      - "contact-detail-panel.tsx"
  - rule: "S6848"
    count: 3
    description: "Non-native interactive elements need role + keyboard support"
    files:
      - "contacts/page.tsx"
      - "suivi/page.tsx"
  - rule: "S6582"
    count: 3
    description: "Use optional chaining (?.)"
    files:
      - "chat-panel.tsx"
      - "emails/page.tsx"
  - rule: "S6479"
    count: 2
    description: "Array index as React key"
    files:
      - "parametres/page.tsx"
      - "onboarding/page.tsx"
  - rule: "S6440"
    count: 1
    description: "Conditional hook call"
    files:
      - "suivi/page.tsx"
  - rule: "S2004"
    count: 1
    description: "Nested function > 4 levels"
    files:
      - "use-pipeline.ts"
  - rule: "S1854"
    count: 1
    description: "Useless assignment"
    files:
      - "contacts/page.tsx"

acceptance_criteria:
  - id: "AC-FUNC-FESMELL-01"
    type: "FUNC"
    description: "Given all frontend files / When SonarQube analyzes / Then 0 issues for rules S3358, S6819, S6848, S6582, S6479, S6440, S2004, S1854"
    verify: "export PATH=/opt/homebrew/bin:$PATH && source .env && export SONAR_TOKEN SONAR_HOST_URL SONAR_PROJECT_KEY && curl -s -u \"$SONAR_TOKEN:\" \"$SONAR_HOST_URL/api/issues/search?projectKeys=$SONAR_PROJECT_KEY&rules=typescript:S3358,typescript:S6819,typescript:S6848,typescript:S6582,typescript:S6479,typescript:S6440,typescript:S2004,typescript:S1854&resolved=false&ps=100\" | python3 -c \"import json,sys; d=json.load(sys.stdin); issues=d.get('issues',[]); print(f'{len(issues)} frontend smells remaining'); sys.exit(1 if issues else 0)\""
    tier: 2

  - id: "AC-FUNC-FESMELL-02"
    type: "FUNC"
    description: "Given nested ternaries / When refactored / Then each replaced by a variable, early return, or helper function"
    verify: "grep -rn '? .*? ' apps/frontend/src/app/contacts/page.tsx apps/frontend/src/app/emails/page.tsx apps/frontend/src/app/recherche/page.tsx apps/frontend/src/app/admin/ai-settings/page.tsx apps/frontend/src/app/parametres/connexion-email/page.tsx apps/frontend/src/components/ui/search-progress-modal.tsx | grep -c '? .*? .*:' | xargs test 0 -eq"
    tier: 1

  - id: "AC-FUNC-FESMELL-03"
    type: "FUNC"
    description: "Given dialog components / When checking HTML / Then native <dialog> element is used instead of role=dialog"
    verify: "grep -rn 'role=\"dialog\"' apps/frontend/src/components/chat/chat-panel.tsx apps/frontend/src/components/ui/search-progress-modal.tsx apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -c 'role=\"dialog\"' | xargs test 0 -eq"
    tier: 1

  - id: "AC-BP-FESMELL-04"
    type: "BP"
    description: "Given the frontend / When running TypeScript compiler / Then 0 errors"
    verify: "cd apps/frontend && npx tsc --noEmit 2>&1 | tail -1 | grep -q 'error' && exit 1 || exit 0"
    tier: 1

  - id: "AC-SEC-FESMELL-05"
    type: "SEC"
    description: "Given the refactoring / When checking for new exports / Then no new public API surface is introduced"
    verify: "git diff --unified=0 -- 'apps/frontend/**/*.tsx' 'apps/frontend/**/*.ts' | grep '^+' | grep -c 'export ' | xargs test 0 -eq"
    tier: 1

edge_cases:
  - "suivi/page.tsx S6440 (conditional hook) — restructure component so hooks are called unconditionally"
  - "<dialog> replacement must preserve existing open/close behavior (controlled via open attribute or showModal())"
  - "Array index keys: only replace if a stable unique ID exists in the data"

test_intentions: []

components:
  reuse: []
  create: []

notes: |
  No behavior change. Fixes code smells for readability and accessibility.
  Cognitive complexity on emails/page.tsx is handled in sc-753.
