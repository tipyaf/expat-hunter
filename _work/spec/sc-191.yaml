id: "sc-191"
name: "test: backend unit & functional tests for password reset flow"
type: "chore"
status: "validated"
shortcut_url: "https://app.shortcut.com/expat-hunter/story/191"

scope:
  - "apps/api/tests/unit/services/password_reset_service.spec.ts"
  - "apps/api/tests/functional/auth/password_reset.spec.ts"

context: |
  The password reset backend was implemented in sc-185 (PR #54) but without any
  backend tests. The PasswordResetService and two HTTP endpoints (forgot-password,
  reset-password) have zero test coverage. This story adds a complete test suite:
  - Unit tests for PasswordResetService (requestReset, validateToken, resetPassword)
  - Functional tests for POST /api/auth/forgot-password and POST /api/auth/reset-password

acceptance_criteria:
  - id: "AC-FUNC-SC191-01"
    type: "FUNC"
    description: "Unit test file exists for PasswordResetService"
    verify: "test -f apps/api/tests/unit/services/password_reset_service.spec.ts && echo PASS || echo FAIL"
    tier: 1

  - id: "AC-FUNC-SC191-02"
    type: "FUNC"
    description: "Functional test file exists for password reset endpoints"
    verify: "test -f apps/api/tests/functional/auth/password_reset.spec.ts && echo PASS || echo FAIL"
    tier: 1

  - id: "AC-FUNC-SC191-03"
    type: "FUNC"
    description: "Unit tests cover requestReset, validateToken and resetPassword"
    verify: "grep -c 'requestReset\\|validateToken\\|resetPassword' apps/api/tests/unit/services/password_reset_service.spec.ts"
    tier: 1

  - id: "AC-FUNC-SC191-04"
    type: "FUNC"
    description: "Functional tests cover both forgot-password and reset-password endpoints"
    verify: "grep -c 'forgot-password\\|reset-password' apps/api/tests/functional/auth/password_reset.spec.ts"
    tier: 1

  - id: "AC-FUNC-SC191-05"
    type: "FUNC"
    description: "All unit tests pass"
    verify: "cd apps/api && node ace test --files 'tests/unit/services/password_reset_service.spec.ts' 2>&1"
    tier: 2

  - id: "AC-FUNC-SC191-06"
    type: "FUNC"
    description: "All functional tests pass"
    verify: "cd apps/api && node ace test --files 'tests/functional/auth/password_reset.spec.ts' 2>&1"
    tier: 2

  - id: "AC-SEC-SC191-01"
    type: "SEC"
    description: "Anti-enumeration: forgot-password returns 200 for unknown email (no user disclosure)"
    verify: "grep -n 'anti-enumeration\\|200 for.*unknown' apps/api/tests/functional/auth/password_reset.spec.ts"
    tier: 1

  - id: "AC-SEC-SC191-02"
    type: "SEC"
    description: "Token is invalidated after use (cannot be reused)"
    verify: "grep -n 'cannot be reused\\|reused\\|secondAttempt' apps/api/tests/functional/auth/password_reset.spec.ts"
    tier: 1
