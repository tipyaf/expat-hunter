acceptance_criteria:
  - id: "AC-FUNC-764-01"
    type: "FUNC"
    description: "Given all 23 files / When checked / Then no SonarQube S2933 violations remain"
    verify: "curl -s 'http://localhost:9000/api/issues/search?projectKeys=expathunter&rules=typescript:S2933&statuses=OPEN&ps=1' -H \"Authorization: Bearer $(grep '^SONAR_TOKEN=' .env | cut -d= -f2)\" | grep -o '\"total\":[0-9]*' | grep -q '\"total\":0' && echo PASS"
    tier: 2

  - id: "AC-FUNC-764-02"
    type: "FUNC"
    description: "Given the codebase / When tsc --noEmit runs / Then 0 TypeScript errors"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' npx tsc --noEmit 2>&1 | grep -c 'error TS' | xargs test 0 -eq && echo PASS"
    tier: 2

  - id: "AC-FUNC-764-03"
    type: "FUNC"
    description: "Given the codebase / When unit tests run / Then all pass"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' pnpm test 2>&1 | tail -5"
    tier: 2

  - id: "AC-FUNC-764-04"
    type: "FUNC"
    description: "Given the API / When started / Then it boots without errors"
    verify: "cd apps/api && PATH='/opt/homebrew/bin:$PATH' timeout 15 node ace serve 2>&1 | grep -q 'started' && echo PASS"
    tier: 2

  - id: "AC-FUNC-764-05"
    type: "FUNC"
    description: "Given e2e tests / When run / Then no regression introduced"
    verify: "PATH='/opt/homebrew/bin:$PATH' pnpm test:e2e 2>&1 | tail -5"
    tier: 2

  - id: "AC-SEC-764-01"
    type: "SEC"
    description: "Given all modified files / When checked / Then no any type introduced"
    verify: "git diff origin/main --unified=0 -- 'apps/api/**/*.ts' | grep '^+' | grep -v '^+++' | grep -c ': any' | xargs test 0 -eq && echo PASS"
    tier: 1

  - id: "AC-BP-764-01"
    type: "BP"
    description: "Given all modified files / When checked / Then only readonly keyword was added — no logic changes"
    verify: "git diff origin/main -- 'apps/api/**/*.ts' | grep '^+' | grep -v '^+++' | grep -v 'readonly' | grep -v '^+$' | wc -l | xargs test 0 -eq && echo PASS"
