acceptance_criteria:
  - id: "AC-FUNC-COGCX-01"
    type: "FUNC"
    description: "Given all 6 files / When SonarQube analyzes them / Then no function exceeds cognitive complexity 15"
    verify: "export PATH=/opt/homebrew/bin:$PATH && source .env && export SONAR_TOKEN SONAR_HOST_URL SONAR_PROJECT_KEY && curl -s -u \"$SONAR_TOKEN:\" \"$SONAR_HOST_URL/api/issues/search?projectKeys=$SONAR_PROJECT_KEY&rules=typescript:S3776&resolved=false&ps=100\" | python3 -c \"import json,sys; d=json.load(sys.stdin); issues=[i for i in d.get('issues',[])]; print(f'{len(issues)} S3776 issues'); sys.exit(1 if issues else 0)\""
    tier: 2

  - id: "AC-FUNC-COGCX-02"
    type: "FUNC"
    description: "Given refactored functions / When checking extracted helpers / Then each helper has a single responsibility and ≤ 30 lines"
    verify: "grep -c 'function\\|private.*(' apps/api/app/services/search_orchestrator_service.ts apps/api/app/services/chat_assistant_service.ts apps/api/app/services/visa_sponsor_registry.ts apps/api/app/controllers/onboarding_controller.ts"
    tier: 1

  - id: "AC-BP-COGCX-03"
    type: "BP"
    description: "Given the codebase / When running TypeScript compiler / Then 0 errors"
    verify: "cd apps/api && npx tsc --noEmit 2>&1 | tail -1 | grep -q 'error' && exit 1 || exit 0"
    tier: 1

  - id: "AC-BP-COGCX-04"
    type: "BP"
    description: "Given existing unit tests / When running test suite / Then all tests pass"
    verify: "cd apps/api && node --experimental-vm-modules node_modules/.bin/japa --files='tests/unit/**/*.spec.ts' 2>&1 | tail -5"
    tier: 2

  - id: "AC-BP-COGCX-05"
    type: "BP"
    description: "Given the frontend / When running TypeScript compiler / Then 0 errors"
    verify: "cd apps/frontend && npx tsc --noEmit 2>&1 | tail -1 | grep -q 'error' && exit 1 || exit 0"
    tier: 1

  - id: "AC-SEC-COGCX-06"
    type: "SEC"
    description: "Given the refactoring / When checking for new exports / Then no new public API surface is introduced"
    verify: "git diff --unified=0 -- 'apps/**/*.ts' 'apps/**/*.tsx' | grep '^+' | grep -c 'export ' | xargs test 0 -eq"
    tier: 1

