story:
  id: "sc-489"
  title: "fix: add missing i18n keys for Google OAuth button (orContinueWith + continueWithGoogle)"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XS"
  refined_at: "2026-03-28"
  refined_by: "refinement"

user_story: >
  As a user landing on /login or /register,
  I want the Google button and its separator to display readable text,
  so that I don't see MISSING_MESSAGE errors instead of the button label.

scope:
  files_to_create: []
  files_to_modify:
    - path: "apps/frontend/src/i18n/en.json"
      reason: "Add auth.orContinueWith and auth.continueWithGoogle keys"
    - path: "apps/frontend/src/i18n/fr.json"
      reason: "Add auth.orContinueWith and auth.continueWithGoogle keys (French translations)"
  files_to_read:
    - path: "apps/frontend/src/app/login/page.tsx"
      reason: "Confirm key names used: t('orContinueWith') and t('continueWithGoogle')"
    - path: "apps/frontend/src/app/register/page.tsx"
      reason: "Same keys used on register page"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC489-01"
      description: >
        Given the en.json i18n file,
        When reviewing the auth section,
        Then the key "continueWithGoogle" is present with a non-empty English value.
      verify: "grep -q '\"continueWithGoogle\"' apps/frontend/src/i18n/en.json && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC489-02"
      description: >
        Given the en.json i18n file,
        When reviewing the auth section,
        Then the key "orContinueWith" is present with a non-empty English value.
      verify: "grep -q '\"orContinueWith\"' apps/frontend/src/i18n/en.json && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC489-03"
      description: >
        Given the fr.json i18n file,
        When reviewing the auth section,
        Then both keys "continueWithGoogle" and "orContinueWith" are present with French values.
      verify: "grep -q '\"continueWithGoogle\"' apps/frontend/src/i18n/fr.json && grep -q '\"orContinueWith\"' apps/frontend/src/i18n/fr.json && echo PASS || echo FAIL"
      tier: 1

  security:
    # No security surface — pure JSON content addition, no API endpoints or data handling.

  best_practices:
    - id: "AC-BP-SC489-TS"
      description: >
        Given the frontend codebase after the change,
        When running TypeScript type checking,
        Then there are 0 type errors.
      verify: "cd apps/frontend && pnpm tsc --noEmit 2>&1 | grep -c '^apps/frontend' || echo 0"
      tier: 1

    - id: "AC-BP-SC489-I18N"
      description: >
        Given login/page.tsx and register/page.tsx,
        When reviewing the Google button label,
        Then no hardcoded English or French string is used — both pages rely on t('continueWithGoogle') and t('orContinueWith').
      verify: "grep -n 'Continue with Google\\|Continuer avec Google\\|Or continue with\\|Ou continuer avec' apps/frontend/src/app/login/page.tsx apps/frontend/src/app/register/page.tsx | grep -v '//' && echo FAIL || echo PASS"
      tier: 1

edge_cases:
  - description: "Key added in wrong JSON section (not inside 'auth' object)"
    handling: "Developer must add keys inside the existing 'auth' object, not at root level. Verify by checking JSON structure."
  - description: "Trailing comma or JSON syntax error"
    handling: "JSON is strict — no trailing commas. TypeScript build (tsc --noEmit) will catch JSON parse errors."

depends_on: []

notes: >
  Root cause: sc-422 (Google OAuth) added SocialAuthButton with t('continueWithGoogle') and
  t('orContinueWith') but forgot to add the i18n keys to en.json and fr.json.
  Both keys must be placed inside the existing "auth": {} object in each file,
  alphabetically near the other auth keys. No TypeScript changes required.

  Proposed translations:
    en: orContinueWith = "Or continue with", continueWithGoogle = "Continue with Google"
    fr: orContinueWith = "Ou continuer avec", continueWithGoogle = "Continuer avec Google"

  The existing e2e spec (e2e/tests/oauth.spec.ts) filters on /Google/i — it will pass
  correctly once the real text is displayed instead of MISSING_MESSAGE.

definition_of_done:
  - "All AC verify: commands pass"
  - "No TypeScript errors (pnpm tsc --noEmit in apps/frontend)"
  - "PR merged into develop"
  - "Shortcut story sc-489 moved to Done"

closing_ac:
  - id: "AC-BP-SC489-DONE"
    type: "BP"
    description: |
      PR for sc-489 is merged into develop — story closure gate.
      After this passes, the validator MUST move sc-489 to Done (state 500000010).
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-489'"
    tier: 1
