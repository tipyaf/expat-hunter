# Spec overlay — job-scraping-orchestration
# Created: 2026-04-08

overlay:
  story_id: "job-scraping-orchestration"
  feature: "job-scraping-pipeline"

  new_endpoints:
    - method: "GET"
      path: "/api/job-offers"
      params: "search_id, status, page"
      auth: true
      description: "Paginated list of job offers for a search"
    - method: "GET"
      path: "/api/job-offers/:id"
      auth: true
      description: "Single job offer with all links"
    - method: "POST"
      path: "/api/job-searches/:id/run"
      auth: true
      description: "Trigger scraping for a job search (wired in job_searches_controller)"

  new_services:
    - "JobScrapingService — orchestrates scraping + persistence + quotas"
    - "JobOfferDedupService — rule-based + AI dedup"
    - "JobOfferService — CRUD for job offers"

  new_constants:
    - "DEDUP_RULES"
    - "OFFER_PAGE_SIZE"

  ai_integration:
    - service: "JobOfferDedupService"
      provider: "OpenRouter"
      purpose: "Disambiguate similar job offers that rules cannot confidently match"
      fallback: "keep as 'new' (fail open)"
