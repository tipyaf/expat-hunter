      verify: "grep -c 'null' /Volumes/Samsung_T5/dev/expat-hunter/stacks/typescript.md | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-SC352-08"
      description: "typescript-adonisjs.md and typescript-nextjs.md reference stacks/typescript.md"
      verify: "grep -l 'typescript.md' /Volumes/Samsung_T5/dev/expat-hunter/stacks/typescript-adonisjs.md /Volumes/Samsung_T5/dev/expat-hunter/stacks/typescript-nextjs.md | wc -l | tr -d ' ' | grep '^2$'"
      tier: 1

