edge_cases:
  - description: "api-responses.ts — ApiResponse.data? and ApiResponse.error?"
    handling: "Keep as ?: — these fields are genuinely absent (not null) in success/error responses"
  - description: "base_scraper.ts — ScrapeParams optional fields"
    handling: "Keep as ?: — these are truly optional input parameters, not DB columns"
  - description: "base_scraper.ts — RawContact optional fields"
    handling: "Keep as ?: — scrapers may not always populate these fields (genuinely absent)"
  - description: "Downstream code using the shared types"
    handling: "Shared types are not imported anywhere in app code (verified) — no downstream breakage"

depends_on: []

notes: |
  Key distinction:
    field?: T       — property may be ABSENT (undefined). Use for optional input params, conditional API fields.
    field: T | null — property is ALWAYS PRESENT but value can be null. Use for nullable DB columns.

  Known bugs found during audit:
    - Contact.userOverride?: string — wrong on two counts: type should be boolean, not optional
    - SourcingRun.errors?: string[] — wrong type: DB has Record<string,unknown> | null

  Shared types are not imported anywhere in app code (confirmed). The frontend hooks
  (use-contacts.ts, use-pipeline.ts etc.) already define their own local interfaces
  correctly using | null. This story aligns the shared package with that correct pattern.

  stacks/typescript.md structure:
    ## TypeScript Conventions
    - Type system rules (?:  vs | null, no any, explicit return types)
    - Naming conventions (PascalCase types, camelCase functions)
    - Import patterns
    ## Anti-patterns
    - No any, no ?: T | null conflation

