      description: "No any type introduced in shared types"
      verify: "grep -rn ': any' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/ | wc -l | tr -d ' ' | grep '^0$'"
      tier: 1

  best_practices:
