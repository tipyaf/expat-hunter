      verify: "grep -c 'absent\\|nullable\\|null' /Volumes/Samsung_T5/dev/expat-hunter/framework/stacks/stack-profile-template.md | grep -v '^0$'"
      tier: 1

    - id: "AC-BP-SC352-02"
      description: "TypeScript 0 errors in shared package after changes"
