      description: "Contact.userOverride is typed as boolean (not optional, not string)"
      verify: "grep 'userOverride' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/contact.ts | grep -v '?' | grep 'boolean'"
      tier: 1

    - id: "AC-FUNC-SC352-02"
      description: "No ?: remaining in contact.ts (all nullable fields use | null)"
      verify: "grep -c '?:' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/contact.ts | grep '^0$'"
      tier: 1

    - id: "AC-FUNC-SC352-03"
      description: "No ?: remaining in company.ts"
      verify: "grep -c '?:' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/company.ts | grep '^0$'"
      tier: 1

    - id: "AC-FUNC-SC352-04"
      description: "No ?: remaining in email.ts"
      verify: "grep -c '?:' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/email.ts | grep '^0$'"
