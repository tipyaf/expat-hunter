story:
  id: "sc-352"
  shortcut_url: "https://app.shortcut.com/expat-hunter/story/352"
  title: "TypeScript interface optional property audit"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "S"
  estimate: 2
  type: "tech-debt"
  refined_at: "2026-03-26"
  refined_by: "refinement"

user_story: >
  As a developer, I want all TypeScript interfaces to use ?: only for genuinely
  absent properties and T | null for nullable fields, so that the type system
  accurately reflects the data shape and prevents incorrect null/undefined handling.

scope:
  files_to_create:
    - path: "stacks/typescript.md"
      reason: "New shared TypeScript conventions file — all TS-specific rules consolidated here"
  files_to_modify:
    - path: "packages/shared/src/types/contact.ts"
      reason: "Replace ?: with | null for nullable DB fields. Fix userOverride: boolean (was ?: string)"
    - path: "packages/shared/src/types/company.ts"
      reason: "Replace ?: with | null for nullable DB fields"
    - path: "packages/shared/src/types/email.ts"
      reason: "Replace ?: with | null for date fields (sentAt, scheduledAt, openedAt, repliedAt)"
    - path: "packages/shared/src/types/sourcing.ts"
      reason: "Replace ?: with | null. Fix errors type: Record<string,unknown> | null (was ?: string[])"
    - path: "packages/shared/src/types/user.ts"
      reason: "Replace ?: with | null for cvText, cvFilePath, preferences"
    - path: "stacks/typescript-adonisjs.md"
      reason: "Remove duplicated TS rules, add reference to stacks/typescript.md"
    - path: "stacks/typescript-nextjs.md"
      reason: "Remove duplicated TS rules, add reference to stacks/typescript.md"
    - path: "framework/stacks/stack-profile-template.md"
      reason: "Add agnostic guidance: distinguish absent values from null values in typed languages"
  files_to_read:
    - "apps/api/app/models/contact.ts"
    - "apps/api/app/models/company.ts"
    - "apps/api/app/models/sourcing_run.ts"
    - "apps/api/app/models/candidate_profile.ts"
    - "apps/api/app/models/email_message.ts"
    - "stacks/typescript-adonisjs.md"
    - "stacks/typescript-nextjs.md"
    - "framework/stacks/stack-profile-template.md"

invariants:
  - "packages/shared/src/types/api-responses.ts — keep data? and error? as ?: (genuinely absent)"
  - "apps/api/app/scrapers/base_scraper.ts — keep ScrapeParams and RawContact ?: (input params, not DB fields)"

rule:
  - "?: means the property can be ABSENT from the object (undefined)"
  - "| null means the property is ALWAYS present but its value can be null"
  - "Use ?: only when the field is truly optional (e.g. API response conditional fields, optional input params)"
  - "Use | null for nullable DB columns — they are always serialized, even as null"
  - "Never use ?: T | null — that conflates both concepts"

acceptance_criteria:

  functional:
