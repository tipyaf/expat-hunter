# =============================================================================
# Story: sc-755 — Single-command local dev startup (front + back + SonarQube)
# =============================================================================
# Build contract — developer implements exactly this, validator checks exactly this.
# =============================================================================

story:
  id: "sc-755"
  name: "chore: single-command local dev startup (front + back + SonarQube)"
  type: "chore"
  size: "S"
  estimate: 2
  priority: "medium"
  parent_feature: null
  depends_on: []
  adr_required: false

user_story: |
  As a developer,
  I want to start the full dev environment (frontend + backend + SonarQube) with a single command,
  so I don't have to manage 3 separate processes.

scope:
  files_to_create:
    - path: ".devtools/docker-compose.yml"
      description: "SonarQube + PostgreSQL compose — credentials from .env"
  files_to_modify:
    - path: "package.json"
      description: "Add dev:all, sonar:up, sonar:down scripts"
    - path: ".env.example"
      description: "Add SONAR_JDBC_USERNAME, SONAR_JDBC_PASSWORD, SONAR_JDBC_URL without values"
    - path: ".env"
      description: "Add SONAR_JDBC_USERNAME, SONAR_JDBC_PASSWORD, SONAR_JDBC_URL with dev defaults"
  files_to_read:
    - path: "~/Dev/sonarqube/docker-compose.yml"
      description: "Reference compose file"

acceptance_criteria:
  - id: "AC-FUNC-755-01"
    type: "FUNC"
    description: "Given the project / When I check .devtools/ / Then docker-compose.yml exists and defines sonarqube + db services"
    verify: "grep -q 'sonarqube:' .devtools/docker-compose.yml && grep -q 'postgres:' .devtools/docker-compose.yml && echo PASS"
    tier: 1

  - id: "AC-FUNC-755-02"
    type: "FUNC"
    description: "Given root package.json / When I check scripts / Then dev:all script exists"
    verify: "node -e \"const p=require('./package.json'); process.exit(p.scripts['dev:all'] ? 0 : 1)\""
    tier: 1

  - id: "AC-FUNC-755-03"
    type: "FUNC"
    description: "Given root package.json / When I check scripts / Then sonar:up and sonar:down scripts exist"
    verify: "node -e \"const p=require('./package.json'); process.exit(p.scripts['sonar:up'] && p.scripts['sonar:down'] ? 0 : 1)\""
    tier: 1

  - id: "AC-FUNC-755-04"
    type: "FUNC"
    description: "Given .env.example / When I check contents / Then SONAR_JDBC_USERNAME, SONAR_JDBC_PASSWORD, SONAR_JDBC_URL are present without real values"
    verify: "grep -q 'SONAR_JDBC_USERNAME=' .env.example && grep -q 'SONAR_JDBC_PASSWORD=' .env.example && grep -q 'SONAR_JDBC_URL=' .env.example && echo PASS"
    tier: 1

  - id: "AC-SEC-755-01"
    type: "SEC"
    description: "Given docker-compose.yml / When I check credentials / Then no hardcoded values — all use ${VAR} interpolation"
    verify: "! grep -P '(PASSWORD|USERNAME):\\s+\\S' .devtools/docker-compose.yml && grep -c '\\${' .devtools/docker-compose.yml | xargs test 0 -lt && echo PASS"
    tier: 1

  - id: "AC-SEC-755-02"
    type: "SEC"
    description: "Given .gitignore / When I check entries / Then .env is gitignored"
    verify: "grep -q '^\\.env$' .gitignore && echo PASS"
    tier: 1

  - id: "AC-BP-755-01"
    type: "BP"
    description: "Given docker-compose.yml / When I check db dependency / Then sonarqube depends on db with condition: service_healthy"
    verify: "grep -q 'service_healthy' .devtools/docker-compose.yml && echo PASS"
    tier: 1

edge_cases:
  - "Docker not installed → sonar:up fails with clear Docker error (no special handling)"
  - "Port 9000 already in use → Docker compose reports the conflict"
  - ".env missing JDBC vars → compose starts with empty env, Sonar fails to connect (user must configure .env)"

test_intentions: []

components: {}
