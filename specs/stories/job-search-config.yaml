story:
  id: "job-search-config"
  name: "Job Search Configuration"
  feature: "job-search-config"
  epic: "E10 — Recherche & Scraping"
  priority: "must-have"
  size: "L"
  estimate: 5
  status: "refined"
  created_at: "2026-04-07"

  user_story: |
    As an expat job seeker,
    I want to configure a multi-role job search with my target countries and platforms,
    so that the system can automatically find relevant job offers for me.

  description: |
    First feature of the job offers pipeline. Enables users to create, update, delete,
    and manually trigger job search configurations. Enforces free/premium quotas
    (1 active search for free, 3 for premium). Backend CRUD + frontend config page.

  depends_on:
    - "candidate-profile"  # validated

  ux_ref: "specs/expat-hunter-ux.md#composant-jobsearchconfigpage"

  # ---- SCOPE ----
  scope:
    files_to_create:
      - path: "apps/api/database/migrations/34_create_job_searches_table.ts"
        role: "Migration — job_searches table"
      - path: "apps/api/app/models/job_search.ts"
        role: "Lucid model for JobSearch"
      - path: "apps/api/app/services/job_search_service.ts"
        role: "CRUD + quota enforcement logic"
      - path: "apps/api/app/validators/job_search_validator.ts"
        role: "VineJS schemas for create/update"
      - path: "apps/api/app/controllers/job_searches_controller.ts"
        role: "HTTP controller — 5 endpoints"
      - path: "packages/shared/src/types/job-search.ts"
        role: "Shared TypeScript types (JobSearch, CreateJobSearchPayload, etc.)"
      - path: "apps/frontend/src/app/(authenticated)/recherche-offres/page.tsx"
        role: "Search config page"
      - path: "apps/frontend/src/hooks/use-job-searches.ts"
        role: "React hook for job search API calls"
      - path: "apps/frontend/src/components/job-search/job-search-form.tsx"
        role: "Smart form component — create/edit search"
      - path: "apps/frontend/src/components/job-search/active-search-card.tsx"
        role: "Dumb component — displays active search summary"
      - path: "apps/api/tests/unit/services/job_search_service.spec.ts"
        role: "Unit tests for JobSearchService"
      - path: "apps/api/tests/functional/job_searches.spec.ts"
        role: "Functional tests for job search routes"
      - path: "e2e/tests/job-search-config.spec.ts"
        role: "E2E tests for /recherche-offres page"

    files_to_modify:
      - path: "apps/api/start/routes.ts"
        change: "Add 5 job search routes under /api/job-searches"
      - path: "packages/shared/src/index.ts"
        change: "Export new job-search types"
      - path: "apps/frontend/src/i18n/locales/en.json"
        change: "Add jobSearch namespace keys"
      - path: "apps/frontend/src/i18n/locales/fr.json"
        change: "Add jobSearch namespace keys"

    files_to_read:
      - path: "apps/api/app/models/user.ts"
        reason: "Understand User model for relationship"
      - path: "apps/api/app/services/usage_service.ts"
        reason: "Reference for quota enforcement pattern"
      - path: "apps/api/app/validators/"
        reason: "Follow existing VineJS validator patterns"
      - path: "apps/frontend/src/hooks/"
        reason: "Follow existing hook patterns"
      - path: "specs/expat-hunter-ux.md"
        reason: "Wireframe reference for /recherche-offres"

  # ---- DATA MODEL ----
  data_model:
    table: "job_searches"
    columns:
      - { name: "id", type: "serial", pk: true }
      - { name: "user_id", type: "integer", fk: "users.id", nullable: false, index: true }
      - { name: "roles", type: "jsonb", nullable: false, note: "Array of role strings" }
      - { name: "countries", type: "jsonb", nullable: false, note: "Array of country codes" }
      - { name: "cities", type: "jsonb", nullable: true, note: "Array of city names" }
      - { name: "platforms", type: "jsonb", nullable: false, note: "Array of platform slugs" }
      - { name: "seniority", type: "varchar(20)", nullable: false, default: "indifferent" }
      - { name: "sector", type: "varchar(100)", nullable: true }
      - { name: "skills", type: "jsonb", nullable: true, note: "Array of skill strings" }
      - { name: "salary_min", type: "integer", nullable: true }
      - { name: "salary_max", type: "integer", nullable: true }
      - { name: "contract_type", type: "varchar(20)", nullable: true, note: "permanent|contract|any" }
      - { name: "frequency", type: "varchar(20)", nullable: false, default: "manual" }
      - { name: "is_active", type: "boolean", nullable: false, default: true }
      - { name: "last_run_at", type: "timestamp", nullable: true }
      - { name: "next_run_at", type: "timestamp", nullable: true }
      - { name: "created_at", type: "timestamp" }
      - { name: "updated_at", type: "timestamp" }

  # ---- API ENDPOINTS ----
  api_endpoints:
    - { method: "POST", path: "/api/job-searches", description: "Create a job search" }
    - { method: "GET", path: "/api/job-searches", description: "List user's searches" }
    - { method: "PUT", path: "/api/job-searches/:id", description: "Update a search" }
    - { method: "DELETE", path: "/api/job-searches/:id", description: "Delete a search" }
    - { method: "POST", path: "/api/job-searches/:id/run", description: "Manually trigger a search run" }

  # ---- CONSTANTS ----
  constants:
    - name: "FREE_MAX_SEARCHES"
      value: 1
      location: "packages/shared/src/constants/quotas.ts"
    - name: "PREMIUM_MAX_SEARCHES"
      value: 3
      location: "packages/shared/src/constants/quotas.ts"
    - name: "SENIORITY_VALUES"
      value: '["junior", "intermediate", "senior", "lead", "indifferent"]'
      location: "packages/shared/src/constants/job-search.ts"
    - name: "SUPPORTED_PLATFORMS"
      value: '["seek", "linkedin", "builtin", "zeil"]'
      location: "packages/shared/src/constants/job-search.ts"
    - name: "MAX_ROLES_PER_SEARCH"
      value: 10
      location: "packages/shared/src/constants/job-search.ts"
    - name: "MAX_ROLE_LENGTH"
      value: 100
      location: "packages/shared/src/constants/job-search.ts"

  # ---- ACCEPTANCE CRITERIA ----
  acceptance_criteria:

    # --- Functional ---
    - id: "AC-FUNC-JSC-01"
      type: "FUNC"
      description: "Given a logged-in user / When they POST /api/job-searches with roles, countries, platforms / Then 201 returned and search saved"
      verify: "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3333/api/job-searches -H 'Authorization: Bearer $TOKEN' -H 'Content-Type: application/json' -d '{\"roles\":[\"Senior Frontend\"],\"countries\":[\"NZ\"],\"platforms\":[\"seek\"],\"seniority\":\"senior\"}'"
      tier: 2

    - id: "AC-FUNC-JSC-02"
      type: "FUNC"
      description: "Given a free user with 1 active search / When they POST a second search / Then 403 with quota exceeded message"
      verify: "curl -s -w '%{http_code}' -X POST http://localhost:3333/api/job-searches -H 'Authorization: Bearer $FREE_TOKEN' -H 'Content-Type: application/json' -d '{\"roles\":[\"DevOps\"],\"countries\":[\"AU\"],\"platforms\":[\"seek\"],\"seniority\":\"indifferent\"}' | tail -c 3"
      tier: 2

    - id: "AC-FUNC-JSC-03"
      type: "FUNC"
      description: "Given a user with an active search / When PUT /api/job-searches/:id with new roles / Then 200, search updated"
      verify: "curl -s -o /dev/null -w '%{http_code}' -X PUT http://localhost:3333/api/job-searches/1 -H 'Authorization: Bearer $TOKEN' -H 'Content-Type: application/json' -d '{\"roles\":[\"Senior Frontend\",\"React Developer\"]}'"
      tier: 2

    - id: "AC-FUNC-JSC-04"
      type: "FUNC"
      description: "Given a search with seniority=indifferent / When inspecting the service / Then no seniority filter is applied during scraping"
      verify: "grep -r 'indifferent' apps/api/app/services/job_search_service.ts | grep -v node_modules"
      tier: 1

    - id: "AC-FUNC-JSC-05"
      type: "FUNC"
      description: "Given a user with searches / When GET /api/job-searches / Then returns only that user's searches as JSON array"
      verify: "curl -s http://localhost:3333/api/job-searches -H 'Authorization: Bearer $TOKEN' | jq '.data | type == \"array\"'"
      tier: 2

    - id: "AC-FUNC-JSC-06"
      type: "FUNC"
      description: "Given a user with a search / When DELETE /api/job-searches/:id / Then 200 and search deleted"
      verify: "curl -s -o /dev/null -w '%{http_code}' -X DELETE http://localhost:3333/api/job-searches/1 -H 'Authorization: Bearer $TOKEN'"
      tier: 2

    - id: "AC-FUNC-JSC-07"
      type: "FUNC"
      description: "Given a premium user / When they create up to 3 searches / Then 201. When 4th / Then 403"
      verify: "grep -r 'PREMIUM_MAX_SEARCHES\\|premium.*quota\\|maxSearches' apps/api/app/services/job_search_service.ts packages/shared/src"
      tier: 1

    - id: "AC-FUNC-JSC-08"
      type: "FUNC"
      description: "Given the /recherche-offres page / When rendered / Then form displays roles input, countries select, platforms checkboxes, seniority radio, frequency select"
      verify: "bash -c 'cd e2e && npx playwright test job-search-config --grep \"form renders\"'"
      tier: 2

    - id: "AC-FUNC-JSC-09"
      type: "FUNC"
      description: "Given user A's search / When user B requests GET /api/job-searches / Then user A's search is NOT returned (user scoping)"
      verify: "grep -rn 'auth.user' apps/api/app/controllers/job_searches_controller.ts | grep -c 'auth\\.user'"
      tier: 1

    # --- Security (all Tier 1) ---
    - id: "AC-SEC-JSC-01"
      type: "SEC"
      description: "All job search routes have VineJS validation (OWASP A03)"
      verify: "grep -c 'validator\\|validate' apps/api/app/controllers/job_searches_controller.ts"
      tier: 1

    - id: "AC-SEC-JSC-02"
      type: "SEC"
      description: "All job search routes require auth middleware (OWASP A01)"
      verify: "grep -A5 'job-searches' apps/api/start/routes.ts | grep -c 'auth\\|middleware'"
      tier: 1

    - id: "AC-SEC-JSC-03"
      type: "SEC"
      description: "All service queries scope to authenticated user — no cross-user data access"
      verify: "grep -c 'userId\\|user_id' apps/api/app/services/job_search_service.ts"
      tier: 1

    # --- Best Practices (auto-generated) ---
    - id: "AC-BP-JSC-COMPILE"
      type: "BP"
      description: "Project compiles with 0 TypeScript errors"
      verify: "cd apps/api && node ace generate:manifest 2>&1 && cd ../../apps/frontend && npx tsc --noEmit 2>&1"
      tier: 1

    - id: "AC-BP-JSC-TU"
      type: "BP"
      description: "All unit tests pass"
      verify: "cd apps/api && node --import=tsx bin/test.ts 2>&1 | tail -5"
      tier: 1

    - id: "AC-BP-JSC-CONSOLE"
      type: "BP"
      description: "Zero console errors/stacktraces (frontend browser console + backend server logs)"
      verify: "runtime-only"
      tier: 3

    - id: "AC-BP-JSC-WCAG"
      type: "BP"
      description: "WCAG 2.1 AA — 0 violations on /recherche-offres"
      verify: "runtime-only"
      tier: 3

    - id: "AC-BP-JSC-WIREFRAME"
      type: "BP"
      description: "UI matches wireframe layout and all data-testid attributes present"
      verify: "grep -c 'data-testid' apps/frontend/src/app/\\(authenticated\\)/recherche-offres/page.tsx apps/frontend/src/components/job-search/*.tsx"
      tier: 1

  # ---- EDGE CASES ----
  edge_cases:
    - "Empty roles array — validator rejects: minimum 1 role required"
    - "Empty platforms array — validator rejects: minimum 1 platform"
    - "Invalid seniority value — validator rejects: must be in SENIORITY_VALUES enum"
    - "Duplicate search criteria — allowed (no dedup on searches, only on offers later)"
    - "Delete active search — allowed, removes from DB"
    - "Premium→Free downgrade — existing searches remain but user can't create new ones until <= FREE_MAX_SEARCHES"
    - "Very long role names — validator enforces MAX_ROLE_LENGTH (100 chars) per role, MAX_ROLES_PER_SEARCH (10)"
    - "Invalid country code — validator rejects: must be in SUPPORTED_COUNTRIES"
    - "Salary min > salary max — validator rejects"

  # ---- TEST INTENTIONS ----
  test_intentions:
    # Trigger A — quota enforcement
    - function: "JobSearchService.create"
      description: "Free user quota enforcement"
      inputs:
        userId: 1
        plan: "free"
        existingActiveSearches: 1
      oracle:
        final: "existingActiveSearches (1) >= FREE_MAX_SEARCHES (1) → throw QuotaExceededException"
      assertions:
        - "expect(error.status).toBe(403)"
        - "expect(error.message).toContain('quota')"
      edge_cases:
        - description: "Free user with 0 active searches"
          inputs: { existingActiveSearches: 0, plan: "free" }
          oracle: { final: "0 < 1 → allowed" }
          assertions: ["expect(result.id).toBeDefined()"]
        - description: "Premium user with 2 active searches"
          inputs: { plan: "premium", existingActiveSearches: 2 }
          oracle: { final: "2 < PREMIUM_MAX_SEARCHES (3) → allowed" }
          assertions: ["expect(result.id).toBeDefined()"]
        - description: "Premium user at quota limit"
          inputs: { plan: "premium", existingActiveSearches: 3 }
          oracle: { final: "3 >= 3 → throw QuotaExceededException" }
          assertions: ["expect(error.status).toBe(403)"]

    # Trigger C — frontend rendering
    - function: "JobSearchConfigPage"
      description: "Active search card rendering"
      inputs:
        activeSearch:
          roles: ["Senior Frontend", "Fullstack"]
          countries: ["NZ"]
          platforms: ["seek", "linkedin"]
          lastRunAt: "2026-04-01T10:00:00Z"
          offersFoundCount: 12
      oracle:
        final: "roles joined = 'Senior Frontend, Fullstack', relative date for lastRunAt"
      assertions:
        - "screen.getByTestId('job-search-active-card').toBeVisible()"
        - "screen.getByText('Senior Frontend, Fullstack').toBeVisible()"
      edge_cases:
        - description: "No active search (empty state)"
          inputs: { activeSearch: null }
          assertions:
            - "screen.getByText(/no active search|pas de recherche/i).toBeVisible()"
            - "screen.queryByTestId('job-search-active-card').not.toBeInTheDocument()"
        - description: "Never run (lastRunAt = null)"
          inputs: { activeSearch: { lastRunAt: null, offersFoundCount: 0 } }
          assertions:
            - "screen.getByText(/never run|jamais/i).toBeVisible()"

  # ---- COMPONENTS ----
  components:
    reuse:
      - name: "TagInput"
        path: "apps/frontend/src/components/ui/tag-input.tsx"
        note: "Reuse for roles and skills inputs"
      - name: "CountrySelect"
        path: "apps/frontend/src/components/ui/country-select.tsx"
        note: "Reuse for country selection"
      - name: "EmptyState"
        path: "apps/frontend/src/components/ui/empty-state.tsx"
        note: "Reuse for 'no active search' state"
      - name: "PremiumBadge"
        path: "apps/frontend/src/components/ui/premium-badge.tsx"
        note: "Show on frequency selector for premium-only options"
    create:
      - name: "JobSearchForm"
        type: "smart"
        path: "apps/frontend/src/components/job-search/job-search-form.tsx"
        reason: "Orchestrates search creation/update form with quota logic"
      - name: "ActiveSearchCard"
        type: "dumb"
        path: "apps/frontend/src/components/job-search/active-search-card.tsx"
        reason: "Displays current active search summary with actions"

  # ---- VALIDATION ACS (auto-generated, always present) ----
  validation_acs:
    - "AC-BP-JSC-COMPILE"
    - "AC-BP-JSC-TU"
    - "AC-BP-JSC-CONSOLE"
    - "AC-BP-JSC-WCAG"
    - "AC-BP-JSC-WIREFRAME"
