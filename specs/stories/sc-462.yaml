id: sc-462
name: "chore: implement smoke test suite"
status: refined
type: chore
area: fullstack
estimate: 2
shortcut_url: "https://app.shortcut.com/expat-hunter/story/462"

context: |
  The project has 25+ feature-specific e2e specs but no dedicated smoke suite.
  A smoke suite is a fast-running (~60s) critical-path check run on every push
  to catch regressions and deployment failures before the full test suite runs.
  It covers: API health, authenticated session, and all 9 main pages loading
  without errors.

scope:
  files_to_create:
    - e2e/tests/smoke.spec.ts
  files_to_modify:
    - e2e/playwright.config.ts
    - package.json
  files_to_create: []
  excluded:
    - "Any application code (apps/, packages/)"
    - "Any existing e2e spec files"
    - "Any API code"

components:
  reuse:
    - name: "TEST_USER"
      path: "e2e/fixtures/seed.ts"
      note: "Reuse existing test user credentials and auth state"
    - name: "auth-state.json"
      path: "e2e/fixtures/auth-state.json"
      note: "Generated by global-setup.ts, reused by smoke project"
  create: []

test_intentions: []

acceptance_criteria:
  - id: "AC-BP-SC462-01"
    type: "BP"
    description: "Given the e2e directory / When listing test files / Then smoke.spec.ts exists"
    verify: "test -f e2e/tests/smoke.spec.ts && echo ok"
    tier: 1

  - id: "AC-BP-SC462-02"
    type: "BP"
    description: "Given playwright.config.ts / When reading projects / Then a 'smoke' project is defined"
    verify: "grep -c 'smoke' e2e/playwright.config.ts"
    tier: 1

  - id: "AC-BP-SC462-03"
    type: "BP"
    description: "Given the root package.json / When reading scripts / Then 'test:smoke' script exists"
    verify: "grep -c 'test:smoke' package.json"
    tier: 1

  - id: "AC-BP-SC462-04"
    type: "BP"
    description: "Given smoke.spec.ts / When reading test cases / Then all 9 main routes are covered (/,/contacts,/suivi,/emails,/parametres,/profil,/templates,/presets,/recherche)"
    verify: "grep -c 'goto\\|/suivi\\|/contacts\\|/emails\\|/parametres\\|/profil\\|/templates\\|/presets\\|/recherche' e2e/tests/smoke.spec.ts"
    tier: 1

  - id: "AC-BP-SC462-05"
    type: "BP"
    description: "Given smoke.spec.ts / When reading test cases / Then API health check test is present"
    verify: "grep -c '/health' e2e/tests/smoke.spec.ts"
    tier: 1

  - id: "AC-FUNC-SC462-01"
    type: "FUNC"
    description: "Given a running app / When running pnpm test:smoke / Then all smoke tests pass"
    verify: "cd e2e && npx playwright test --project=smoke"
    tier: 2

  - id: "AC-BP-SC462-DONE"
    type: "BP"
    description: "Shortcut ticket sc-462 is moved to Done after PR merge"
    verify: "echo 'manual: move sc-462 to Done in Shortcut after merge'"
    tier: 3

edge_cases:
  - "Auth state file missing — smoke project depends on global-setup, which must run first"
  - "Port conflicts — playwright.config.ts already has reuseExistingServer: true, which handles this"
  - "Unauthenticated redirects — pages that redirect to /login must not be counted as passing"
  - "Slow CI environment — use generous timeouts (15s) on page load assertions"
