# Story: sc-1136
# Epic: infra — tech debt
# Estimate: S (2 pts)
# Priority: chore
# Depends on: none

user_story: |
  As a maintainer of the ExpatHunter repo,
  I want to clean up the obsolete and incorrect files in _work/,
  so that the working directory matches the framework v4.1.1 contract
  (story contract in specs/stories/, spec delta in _work/spec/, build state in _work/build/)
  and future /refine and /build runs behave predictably.

context: |
  After the framework migration to v4.0.0 (commit cd4262f), the project moved
  its canonical tracker and story files to specs/ but never cleaned up _work/.
  Auditing the framework v4.1.1 design confirms each folder has a distinct role:

    _work/spec/[id].yaml   — spec OVERLAY (new endpoints, schemas, tables)
                             consumed by spec-generator → _docs/spec/*.md
    _work/build/[id].yaml  — pipeline state per story (gates, files, ACs)
                             consumed by builders
    _work/ux/wireframes/   — wireframe HTML files
                             consumed by ux-ui agent + developer
    _work/feature-tracker.yaml  — OBSOLETE, real tracker is specs/feature-tracker.yaml

  Past /refine runs wrote story-contract content into _work/spec/ instead of
  spec deltas. Result: 32 files duplicate their specs/stories/ counterpart, and
  12 orphans contain story-content with no real spec delta. Only sc-810.yaml
  contains a legitimate overlay (new_table, new_endpoints).

  _docs/spec/ was never generated, so the corrupt overlays have had no runtime
  impact — but would break spec-generator if it were ever run.

