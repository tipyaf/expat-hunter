id: "contact-detail-panel"
name: "feat: contact detail panel — slide-over drawer on card click in pipeline view"
type: "feature"
status: "validated"
shortcut_url: "https://app.shortcut.com/ya-bes/story/215"

context: |
  New feature. When a user clicks a contact card in the /suivi pipeline, a side panel
  (slide-over drawer) opens from the right without navigating away. The panel shows
  full contact info, AI analysis, and email thread history. Uses existing API endpoints:
  GET /api/contacts/:id (full detail) and GET /api/contacts/:id/thread (email history).
  The drag & drop functionality of the kanban is preserved — HTML5 drag events natively
  suppress the click event when a drag occurs.

scope:
  files_to_create:
    - "apps/frontend/src/components/ui/contact-detail-panel.tsx"
    - "apps/frontend/src/hooks/use-contact-detail.ts"
  files_to_modify:
    - "apps/frontend/src/app/suivi/page.tsx"

acceptance_criteria:
  - id: "AC-FUNC-CDP-01"
    type: "FUNC"
    description: "ContactCard in /suivi has an onClick handler that sets selectedContact state in page.tsx"
    verify: "grep -c 'onClick\\|selectedContact\\|onCardClick' apps/frontend/src/app/suivi/page.tsx"
    tier: 1

  - id: "AC-FUNC-CDP-02"
    type: "FUNC"
    description: "ContactDetailPanel renders contact name, role, company, email, and LinkedIn URL"
    verify: "grep -c 'fullName\\|linkedinUrl\\|role\\|company' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

  - id: "AC-FUNC-CDP-03"
    type: "FUNC"
    description: "Panel shows AI analysis section (relevanceLabel, relevanceReason, scoreBreakdown)"
    verify: "grep -c 'relevanceLabel\\|relevanceReason\\|scoreBreakdown' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

  - id: "AC-FUNC-CDP-04"
    type: "FUNC"
    description: "Panel shows email thread history loaded from GET /api/contacts/:id/thread"
    verify: "grep -c 'thread\\|emailHistory\\|\\/thread' apps/frontend/src/hooks/use-contact-detail.ts"
    tier: 1

  - id: "AC-FUNC-CDP-05"
    type: "FUNC"
    description: "Panel closes on close button click AND on Escape key press"
    verify: "grep -c 'Escape\\|onClose\\|keydown\\|onKeyDown' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

  - id: "AC-FUNC-CDP-06"
    type: "FUNC"
    description: "useContactDetail hook exists and fetches contact detail from GET /api/contacts/:id"
    verify: "test -f apps/frontend/src/hooks/use-contact-detail.ts && grep -c '/api/contacts' apps/frontend/src/hooks/use-contact-detail.ts"
    tier: 1

  - id: "AC-SEC-CDP-01"
    type: "SEC"
    description: "useContactDetail includes auth token in API requests (no unauthenticated fetch)"
    verify: "grep -c 'token' apps/frontend/src/hooks/use-contact-detail.ts"
    tier: 1

  - id: "AC-SEC-CDP-02"
    type: "SEC"
    description: "ContactDetailPanel guards against null contactId (no render if null/undefined)"
    verify: "grep -c 'if.*!contact\\|contact.*null\\|!contactId\\|contact?' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

  - id: "AC-BP-CDP-01"
    type: "BP"
    description: "ContactDetailPanel imports and uses useContactDetail hook (fetch logic not in component)"
    verify: "grep -c 'useContactDetail' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

  - id: "AC-BP-CDP-02"
    type: "BP"
    description: "ContactDetailPanel uses i18n translations via useTranslations"
    verify: "grep -c 'useTranslations' apps/frontend/src/components/ui/contact-detail-panel.tsx"
    tier: 1

edge_cases:
  - "Contact not found (404) → panel shows error state, does not crash"
  - "Email thread empty → section hidden or shows 'no emails sent yet' message"
  - "Click vs drag conflict → HTML5 drag events suppress click natively, no double-action"
  - "Panel open while drag & drop → panel stays open, kanban drag still functional"
  - "Very long name/role/company → truncation, no overflow"
  - "No LinkedIn URL → LinkedIn section hidden"
  - "No AI analysis yet → AI section shows 'not analyzed' state"
