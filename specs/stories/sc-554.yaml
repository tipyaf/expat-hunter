# =============================================================================
# STORY FILE — sc-554: Emails viewable and editable from contact detail panel
# =============================================================================
# This is the BUILD CONTRACT. The developer implements exactly this.
# The validator checks exactly this. Nothing more, nothing less.
# =============================================================================

story:
  id: "sc-554"
  name: "Emails viewable and editable from contact detail panel"
  parent: null
  type: "feature"
  priority: "medium"
  estimate: 2  # S — wiring existing components into contact panel
  created_at: "2026-03-28"

  user_story: >
    As a user viewing a contact in the detail panel,
    I want to see the contact's emails and be able to edit drafts (including applying templates),
    so that I can manage emails directly from the contacts page without switching to the emails page.

  context: >
    The contact detail panel already shows email history (subject, status, date) in read-only mode.
    The EmailEditModal (sc-549-1) and template selector (sc-549-2) exist but are only accessible
    from the emails page. This story wires the modal into the contact detail panel so users can
    edit drafts and apply templates from the contacts view. It also adds a "Generate email" action
    for contacts that have no email yet but are recommended for contact.

scope:
  included:
    - "Add 'Edit' button on draft emails in the contact detail panel → opens EmailEditModal"
    - "Add 'Generate email' button for contacts with aiRecommendation='contact' and no email"
    - "Import and render EmailEditModal in contact detail panel"
    - "Wire useEmails hook (updateEmail, regenerate) into the panel for modal actions"
    - "Refresh email thread after edit/generate/template-apply"
    - "i18n keys en/fr for new buttons"
  excluded:
    - "Changes to EmailEditModal itself (already has template selector from sc-549-2)"
    - "Changes to the emails page"
    - "Email sending from the contact panel (user sends from emails page)"
    - "Reply generation from the panel"
    - "Changes to backend API endpoints"

files:
  to_create: []
  to_modify:
    - path: "apps/frontend/src/components/ui/contact-detail-panel.tsx"
      description: "Add Edit button on draft email cards, Generate email button when no emails, import and render EmailEditModal, wire useEmails for edit/regenerate actions, refresh thread on modal close"
    - path: "apps/frontend/src/hooks/use-contact-detail.ts"
      description: "Add refetch/mutate method to refresh thread data after email edit or generation"
    - path: "apps/frontend/src/i18n/en.json"
      description: "Add keys: contactPanel.editDraft, contactPanel.generateEmail, contactPanel.generating"
    - path: "apps/frontend/src/i18n/fr.json"
      description: "Same keys in French"
  to_read:
    - path: "apps/frontend/src/components/emails/email-edit-modal.tsx"
      description: "Understand EmailEditModal props interface (email, templates, onSave, onRegenerate, onClose)"
    - path: "apps/frontend/src/hooks/use-emails.ts"
      description: "Understand updateEmail, regenerate, generateForContact API methods"
    - path: "apps/frontend/src/hooks/use-templates.ts"
      description: "Understand template fetching for modal dropdown"

dependencies:
  - "sc-549-1 (EmailEditModal must exist)"
  - "sc-549-2 (template selector in modal must exist)"

acceptance_criteria:
  - id: "AC-FUNC-554-01"
    type: "FUNC"
    description: "Given a contact has draft emails / When I view the contact detail panel / Then each draft email card has an 'Edit' button"
    verify: "grep -r 'editDraft\\|edit.*draft\\|Edit.*button' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-554-02"
    type: "FUNC"
    description: "Given I click Edit on a draft email in the contact panel / Then the EmailEditModal opens with that email's subject and body pre-filled"
    verify: "grep -r 'EmailEditModal' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-554-03"
    type: "FUNC"
    description: "Given the EmailEditModal is open from the contact panel / Then the template selector dropdown is available (from sc-549-2)"
    verify: "grep -r 'template' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q 'template\\|useTemplates'"
    tier: 1

  - id: "AC-FUNC-554-04"
    type: "FUNC"
    description: "Given I save or regenerate an email in the modal / When the modal closes / Then the email thread in the contact panel refreshes to show updated data"
    verify: "grep -r 'refetch\\|mutate\\|refresh' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-554-05"
    type: "FUNC"
    description: "Given a contact has aiRecommendation='contact' and no emails / Then a 'Generate email' button is displayed in the email section"
    verify: "grep -r 'generateEmail\\|generate.*email\\|aiRecommendation' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-554-06"
    type: "FUNC"
    description: "Given I click 'Generate email' / Then the API is called to generate an email for this contact and the thread refreshes"
    verify: "grep -r 'generate\\|POST.*emails' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -q '.'"
    tier: 1

  - id: "AC-SEC-554-01"
    type: "SEC"
    description: "No new API endpoints introduced — all actions go through existing secured endpoints"
    verify: "! grep -r 'fetch.*api' apps/frontend/src/components/ui/contact-detail-panel.tsx | grep -v 'useEmails\\|useTemplates\\|useContactDetail' | grep -q 'api/'"
    tier: 1

  - id: "AC-BP-554-01"
    type: "BP"
    description: "i18n keys for contact panel email actions exist in both en.json and fr.json"
    verify: "grep -q 'editDraft' apps/frontend/src/i18n/en.json && grep -q 'editDraft' apps/frontend/src/i18n/fr.json"
    tier: 1

  - id: "AC-BP-554-02"
    type: "BP"
    description: "TypeScript: 0 errors in frontend"
    verify: "cd apps/frontend && pnpm tsc --noEmit 2>&1 | grep -c 'error TS' | grep -q '^0$'"
    tier: 1

edge_cases:
  - "Contact has no emails and aiRecommendation is not 'contact' → no Generate button shown"
  - "Contact has only sent/approved emails (no drafts) → no Edit buttons, only read-only view"
  - "EmailEditModal opened from contact panel while emails page also open → independent state, no conflict"
  - "Generate email fails (OpenRouter unavailable) → error toast, no thread change"
  - "Contact detail panel closed while modal is open → modal stays open (portal-based)"
  - "Template list is empty → modal shows empty state for templates (handled by sc-549-2)"

technical_notes:
  - "EmailEditModal is already a self-contained component — just pass the email object and callback props"
  - "useEmails hook already exposes updateEmail() and regenerate() — import and use directly"
  - "useTemplates hook fetches templates for the dropdown — import in panel"
  - "For 'Generate email', call the existing POST /api/emails/generate endpoint with a single contactId"
  - "Thread refresh: call mutate() from useContactDetail SWR hook after modal onClose"
  - "The panel file is currently 270 lines — adding modal integration should keep it under 400 lines"
