story:
  id: "sc-431-1"
  shortcut_url: ""
  title: "Premium/Free: data model + PlanGuard middleware"
  parent_spec: "specs/expat-hunter.yaml"
  parent_epic: "sc-431"
  status: "refined"
  size: "S"
  estimate: 2
  type: "feature"
  refined_at: "2026-03-27"
  refined_by: "refinement"

user_story: >
  As the system, I need a plan field on users and a middleware that blocks
  premium-only routes for free users, so that all subsequent premium/free
  stories have a solid backend foundation.

scope:
  files_to_create:
    - path: "apps/api/database/migrations/XXX_add_plan_to_users.ts"
      reason: "Add plan column (varchar, default 'free') to users table"
    - path: "apps/api/app/middleware/plan_guard_middleware.ts"
      reason: "Middleware that checks user.plan and returns 403 PREMIUM_REQUIRED if free"
    - path: "packages/shared/src/constants/plans.ts"
      reason: "Plan constants: PLAN_FREE, PLAN_PREMIUM, FREE_QUOTAS (searches, results, emails, chatQuestions)"
  files_to_modify:
    - path: "apps/api/app/models/user.ts"
      reason: "Add @column() declare plan: 'free' | 'premium' with isPremium getter"
    - path: "packages/shared/src/types/user.ts"
      reason: "Add plan: 'free' | 'premium' to User interface"
    - path: "apps/api/start/kernel.ts"
      reason: "Register plan_guard as named middleware"
  files_to_read:
    - "apps/api/app/middleware/admin_middleware.ts"
    - "apps/api/app/models/user.ts"
    - "packages/shared/src/types/user.ts"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC431-1-01"
      description: "Given the User model / When checked / Then plan column exists with type 'free' | 'premium'"
      verify: "grep -n \"declare plan:\" /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/models/user.ts"
      tier: 1

    - id: "AC-FUNC-SC431-1-02"
      description: "Given a migration / When run / Then users table has plan column with default 'free'"
      verify: "grep -rn \"plan.*free\" /Volumes/Samsung_T5/dev/expat-hunter/apps/api/database/migrations/ | grep -i default"
      tier: 1

    - id: "AC-FUNC-SC431-1-03"
      description: "Given PlanGuard middleware / When a free user hits a premium route / Then 403 with code PREMIUM_REQUIRED"
      verify: "grep -n 'PREMIUM_REQUIRED' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/middleware/plan_guard_middleware.ts"
      tier: 1

    - id: "AC-FUNC-SC431-1-04"
      description: "Given shared constants / When imported / Then FREE_QUOTAS contains searches=2, results=5, emails=5, chatQuestions=15"
      verify: "grep -n 'searches.*2\\|results.*5\\|emails.*5\\|chatQuestions.*15' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/constants/plans.ts"
      tier: 1

    - id: "AC-FUNC-SC431-1-05"
      description: "Given shared User type / When imported / Then plan field exists with UserPlan type"
      verify: "grep -n 'plan.*UserPlan' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/user.ts"
      tier: 1

  security:
    - id: "AC-SEC-SC431-1-01"
      description: "PlanGuard checks plan from authenticated user server-side, not from request body or headers"
      verify: "grep -n 'auth.getUserOrFail\\|auth.authenticate' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/middleware/plan_guard_middleware.ts"
      tier: 1

    - id: "AC-SEC-SC431-1-02"
      description: "No raw SQL in migration — uses Lucid schema builder"
      verify: "! grep -n 'this.raw\\|raw(' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/database/migrations/*plan* 2>/dev/null || echo 'PASS: no raw SQL'"
      tier: 1

  best_practices:
    - id: "AC-BP-SC431-1-01"
      description: "TypeScript: 0 errors"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/api && npx tsc --noEmit 2>&1 | wc -l | tr -d ' ' | grep '^0$'"
      tier: 1

    - id: "AC-BP-SC431-1-02"
      description: "No magic strings — plan values come from shared constants"
      verify: "grep -n 'PLAN_FREE\\|PLAN_PREMIUM' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/constants/plans.ts"
      tier: 1

edge_cases:
  - description: "Existing users have no plan column yet"
    handling: "Migration sets default 'free' — all existing users become free"
  - description: "PlanGuard on public routes (login, register)"
    handling: "PlanGuard only applies to routes explicitly marked — not global"

depends_on: []

notes: |
  Foundation story for the entire premium/free feature set.
  PlanGuard follows the same pattern as AdminMiddleware.
  Quotas are defined as constants but NOT enforced here — enforcement is in sc-431-2.

definition_of_done:
  - "Migration runs without errors"
  - "User model has plan column"
  - "PlanGuard middleware registered and working"
  - "Shared types and constants exported"
  - "0 TS errors"
  - "PR merged"
