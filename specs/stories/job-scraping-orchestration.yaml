story:
  id: "job-scraping-orchestration"
  name: "Job Scraping Orchestration — Dedup + API + Quotas"
  feature: "job-scraping-pipeline"
  epic: "E10 — Recherche & Scraping"
  priority: "must-have"
  size: "L"
  estimate: 5
  status: "refined"
  created_at: "2026-04-08"

  user_story: |
    As an expat job seeker,
    I want to launch a job search that scrapes all configured platforms, deduplicates results, and respects my plan quotas,
    so that I see only unique, relevant offers without duplicates.

  description: |
    Orchestration layer for the job scraping pipeline.
    Creates JobScrapingService (runs all registered scrapers for a search), JobOfferDedupService
    (rule-based pre-filter + OpenRouter AI for ambiguous cases), republication detection,
    API routes (GET /api/job-offers, GET /api/job-offers/:id), quota enforcement (free=5 offers max),
    and wires POST /api/job-searches/:id/run to trigger actual scraping.
    Backend-only — no UI changes.

  depends_on:
    - "job-scraping-foundation"  # provides models, scrapers, registry
    - "job-search-config"        # provides JobSearch model + API

  ux_ref: null  # Backend-only, no UI

  adr_required: false

  scope:
    files_to_create:
      - path: "apps/api/app/services/job_scraping_service.ts"
        description: "Orchestrator: for a JobSearch, run all platform scrapers, persist RawJobOffer[] as JobOffer+JobOfferLink, call dedup, enforce quotas"
      - path: "apps/api/app/services/job_offer_dedup_service.ts"
        description: "Dedup: rule-based pre-filter (normalized company+title+location ~90%), OpenRouter AI for ambiguous cases (~10%), mark duplicates with status='duplicate'"
      - path: "apps/api/app/services/job_offer_service.ts"
        description: "CRUD service: list offers for a search (paginated, filtered by status), get single offer, update status"
      - path: "apps/api/app/controllers/job_offers_controller.ts"
        description: "REST controller: GET /api/job-offers?search_id=&status=&page=, GET /api/job-offers/:id"
      - path: "apps/api/start/routes/job_offers.ts"
        description: "Route file: register job offer routes under auth middleware"
      - path: "apps/api/tests/unit/services/job_scraping_service.spec.ts"
        description: "Unit tests for JobScrapingService (mocked scrapers + DB)"
      - path: "apps/api/tests/unit/services/job_offer_dedup_service.spec.ts"
        description: "Unit tests for JobOfferDedupService (rules + mocked AI)"
      - path: "apps/api/tests/unit/services/job_offer_service.spec.ts"
        description: "Unit tests for JobOfferService (CRUD, pagination, filtering)"
      - path: "apps/api/tests/functional/job_offers.spec.ts"
        description: "Functional tests for job offers API endpoints"
    files_to_modify:
      - path: "apps/api/app/controllers/job_searches_controller.ts"
        description: "Wire POST /api/job-searches/:id/run to call JobScrapingService.runForSearch()"
      - path: "apps/api/start/routes.ts"
        description: "Import and mount job_offers route file"
      - path: "packages/shared/src/constants/job-offer.ts"
        description: "Add DEDUP_RULES, OFFER_PAGE_SIZE constants"
      - path: "packages/shared/src/index.ts"
        description: "Export new constants if not already exported"
    files_to_read:
      - path: "apps/api/app/services/search_orchestrator_service.ts"
        description: "Reference: existing orchestration pattern for contact sourcing"
      - path: "apps/api/app/services/expat_scoring_service.ts"
        description: "Reference: OpenRouter AI integration pattern"
      - path: "apps/api/app/controllers/contacts_controller.ts"
        description: "Reference: paginated listing pattern"
      - path: "apps/api/app/scrapers/base_job_offer_scraper.ts"
        description: "Reference: BaseJobOfferScraper from Story 1"
      - path: "apps/api/app/scrapers/job_offer_scraper_registry.ts"
        description: "Reference: registry from Story 1"

  acceptance_criteria:
    # --- FUNCTIONAL ---
    - id: "AC-FUNC-JSO-01"
      type: "FUNC"
      description: "Given a JobSearch with platforms configured / When POST /api/job-searches/:id/run called / Then JobScrapingService runs scrapers for each platform and persists JobOffer + JobOfferLink records"
      verify: "grep -E 'runForSearch|scrapeAll|JobOfferScraperRegistry|persist' apps/api/app/services/job_scraping_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-02"
      type: "FUNC"
      description: "Given scraped RawJobOffer[] / When dedup runs / Then rule-based pre-filter catches ~90% duplicates (same normalized company+title+location) and marks them status='duplicate'"
      verify: "grep -E 'normalize|duplicate|company.*title.*location|rule' apps/api/app/services/job_offer_dedup_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-03"
      type: "FUNC"
      description: "Given ambiguous duplicates (different title/company but same job) / When AI dedup runs / Then OpenRouter is called to confirm/deny duplicate status"
      verify: "grep -E 'openrouter|OpenRouter|OPENROUTER|aiDedup|ambiguous' apps/api/app/services/job_offer_dedup_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-04"
      type: "FUNC"
      description: "Given a job offer that was previously scraped and is scraped again / When dedup runs / Then it detects republication via (platform, external_id) match and sets is_republished=true, updates publication_dates jsonb"
      verify: "grep -E 'is_republished|publication_dates|republish' apps/api/app/services/job_offer_dedup_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-05"
      type: "FUNC"
      description: "Given authenticated user / When GET /api/job-offers?search_id=X&status=new&page=1 / Then returns paginated list of JobOffer with their links, filtered by status"
      verify: "grep -E 'paginate|page|status|search_id|JobOffer' apps/api/app/controllers/job_offers_controller.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-06"
      type: "FUNC"
      description: "Given authenticated user / When GET /api/job-offers/:id / Then returns full JobOffer with all JobOfferLink records"
      verify: "grep -E 'show|params.id|preload.*links' apps/api/app/controllers/job_offers_controller.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-07"
      type: "FUNC"
      description: "Given free plan user with 5 existing offers / When scraping produces new offers / Then only first 5 are kept (status='new'), extras are set to status='quota_exceeded'"
      verify: "grep -E 'FREE_MAX_OFFERS|quota_exceeded|quota|plan.*free' apps/api/app/services/job_scraping_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-08"
      type: "FUNC"
      description: "Given premium plan user / When scraping produces any number of offers / Then all are kept with status='new' (no quota limit)"
      verify: "grep -E 'premium|PLAN_PREMIUM|unlimited' apps/api/app/services/job_scraping_service.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-FUNC-JSO-09"
      type: "FUNC"
      description: "Given POST /api/job-searches/:id/run / When called / Then job_searches_controller delegates to JobScrapingService and returns scraping results summary"
      verify: "grep -E 'JobScrapingService|runForSearch|run' apps/api/app/controllers/job_searches_controller.ts | wc -l | grep -v '^0$'"
      tier: 1

    # --- SECURITY ---
    - id: "AC-SEC-JSO-01"
      type: "SEC"
      description: "All job offer API routes are behind auth middleware — no unauthenticated access"
      verify: "grep -E 'middleware.*auth|auth.*middleware' apps/api/start/routes/job_offers.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-SEC-JSO-02"
      type: "SEC"
      description: "User can only access their own job offers — controller filters by user's search ownership"
      verify: "grep -E 'auth.user|userId|user_id.*auth' apps/api/app/controllers/job_offers_controller.ts | wc -l | grep -v '^0$'"
      tier: 1

    - id: "AC-SEC-JSO-03"
      type: "SEC"
      description: "No raw SQL in services or controllers — use Lucid ORM only"
      verify: "grep -rn 'Database.rawQuery\\|\\.raw(' apps/api/app/services/job_scraping_service.ts apps/api/app/services/job_offer_dedup_service.ts apps/api/app/services/job_offer_service.ts apps/api/app/controllers/job_offers_controller.ts 2>/dev/null | wc -l | grep '^0$'"
      tier: 1

    - id: "AC-SEC-JSO-04"
      type: "SEC"
      description: "OPENROUTER_API_KEY must be read from env — no hardcoded keys"
      verify: "grep -rn 'sk-or-\\|sk-' apps/api/app/services/job_offer_dedup_service.ts 2>/dev/null | wc -l | grep '^0$'"
      tier: 1

    # --- BEST PRACTICES ---
    - id: "AC-BP-JSO-COMPILE"
      type: "BP"
      description: "Frontend compiles with 0 errors, backend has 0 new errors"
      verify: "cd apps/frontend && npx tsc --noEmit 2>&1 | wc -l | grep '^0$'"
      tier: 1

    - id: "AC-BP-JSO-TU"
      type: "BP"
      description: "All unit tests for orchestration and dedup pass"
      verify: "cd apps/api && node ace test --groups 'JobScrapingService,JobOfferDedupService' 2>&1 | tail -3"
      tier: 2

    - id: "AC-BP-JSO-FUNCTIONAL"
      type: "BP"
      description: "All functional tests for job offers API pass"
      verify: "cd apps/api && node ace test --groups 'JobOffersAPI' 2>&1 | tail -3"
      tier: 2

  test_intentions:
    - function: "JobScrapingService.runForSearch"
      description: "Orchestrates scraping across all configured platforms for a search"
      inputs:
        searchId: "uuid-of-search"
        platforms: ["seek", "linkedin"]
      oracle:
        final: "JobOffer records created in DB with correct search_id, one JobOfferLink per platform per offer"
      assertions:
        - "result.totalScraped > 0"
        - "result.newOffers >= 0"
        - "result.duplicates >= 0"
        - "all created JobOffers have search_id matching input"
      edge_cases:
        - description: "All scrapers fail (Apify down)"
          inputs: { searchId: "uuid", platforms: ["seek", "linkedin"] }
          oracle: { final: "returns {totalScraped: 0, errors: [...]} — does not throw" }
          assertions: ["result.totalScraped === 0", "result.errors.length > 0"]
        - description: "One scraper fails, others succeed"
          inputs: { searchId: "uuid", platforms: ["seek", "linkedin"] }
          oracle: { final: "partial results saved, failed scraper error logged" }
          assertions: ["result.totalScraped > 0", "result.errors.length === 1"]
        - description: "Free user at quota (5 offers already)"
          inputs: { searchId: "uuid", platforms: ["seek"], userPlan: "free" }
          oracle: { final: "new offers get status='quota_exceeded'" }
          assertions: ["newOffers.every(o => o.status === 'quota_exceeded')"]

    - function: "JobOfferDedupService.dedup"
      description: "Detects duplicate job offers using rules + AI"
      inputs:
        offers: [{ title: "Senior Dev", company: "Acme", location: "Auckland" }]
        existingOffers: [{ title: "Senior Developer", company: "ACME Corp", location: "Auckland, NZ" }]
      oracle:
        final: "Rule-based match detects these as duplicates (normalized company+title+location)"
      assertions:
        - "result.duplicates.length === 1"
        - "result.duplicates[0].status === 'duplicate'"
      edge_cases:
        - description: "Exact same external_id on same platform"
          inputs: { platform: "seek", external_id: "12345" }
          oracle: { final: "detected as republication, is_republished=true" }
          assertions: ["result.republished.length === 1"]
        - description: "Different titles but same job (requires AI)"
          inputs: { offer1: { title: "React Dev" }, offer2: { title: "Frontend Engineer (React)" } }
          oracle: { final: "flagged as ambiguous, sent to AI, AI confirms duplicate" }
          assertions: ["aiCallCount === 1"]
        - description: "OpenRouter unavailable"
          inputs: { ambiguousOffers: ["..."] }
          oracle: { final: "ambiguous offers kept as 'new' (not marked duplicate) — fail open" }
          assertions: ["ambiguousOffers.every(o => o.status === 'new')"]

    - function: "JobOffersController.index"
      description: "Returns paginated, filtered job offers for the authenticated user"
      inputs:
        search_id: "uuid"
        status: "new"
        page: 1
      oracle:
        final: "Paginated response with offers matching search_id and status"
      assertions:
        - "response.status === 200"
        - "response.body.data is array"
        - "response.body.meta.total >= 0"
        - "all offers belong to the authenticated user's search"
      edge_cases:
        - description: "User tries to access another user's offers"
          inputs: { search_id: "other-user-uuid" }
          oracle: { final: "returns 404 or empty results — never other user's data" }
          assertions: ["response.status === 404 || response.body.data.length === 0"]

  edge_cases:
    - "All scrapers fail → service returns empty result with error details, does not throw"
    - "One scraper times out → other scrapers still complete, partial results saved"
    - "OpenRouter down during AI dedup → ambiguous offers kept as 'new' (fail open, not fail closed)"
    - "Free user reaches quota mid-scrape → first 5 offers are 'new', rest are 'quota_exceeded'"
    - "Concurrent scrape requests for same search → second request returns 409 or waits"
    - "Job offer with identical external_id but different content → update existing, track republication"
    - "Very large scrape result (>500 offers) → process in batches of 50 for DB inserts"

  components:
    reuse:
      - name: "SearchOrchestratorService pattern"
        path: "apps/api/app/services/search_orchestrator_service.ts"
        note: "Reuse orchestration pattern (run multiple scrapers, collect results, handle partial failures)"
      - name: "ExpatScoringService AI pattern"
        path: "apps/api/app/services/expat_scoring_service.ts"
        note: "Reuse OpenRouter API call pattern for AI dedup"
      - name: "ContactsController pagination"
        path: "apps/api/app/controllers/contacts_controller.ts"
        note: "Reuse paginated listing pattern with filters"
    create: []
