acceptance_criteria:

  functional:
    - id: "AC-FUNC-JASC-01"
      description: "Given an offer owned by the user / When POST /api/job-offers/:id/contacts with {name, role, email} / Then a RecruitmentContact is created and linked to the offer"
      verify: "grep -rn 'createContact\\|create.*recruitment' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

    - id: "AC-FUNC-JASC-02"
      description: "Given recruitment contacts exist for an offer / When GET /api/job-offers/:id/contacts / Then all contacts for that offer are returned"
      verify: "grep -rn 'listContacts\\|getContacts\\|findByOffer' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

    - id: "AC-FUNC-JASC-03"
      description: "Given a recruitment contact exists / When PUT /api/job-offers/:id/contacts/:contactId with updated fields / Then the contact is updated"
      verify: "grep -rn 'updateContact\\|update.*Contact' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

    - id: "AC-FUNC-JASC-04"
      description: "Given a recruitment contact exists / When DELETE /api/job-offers/:id/contacts/:contactId / Then the contact is removed and if linked to a lead, the lead's recruitmentStatus is cleared"
      verify: "grep -rn 'removeContact\\|deleteContact' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

    - id: "AC-FUNC-JASC-05"
      description: "Given a lead contact exists for company X / When a recruitment contact is added with the same email / Then the lead is flagged as 'in_recruitment_process' and the recruitmentContact.leadId is set"
      verify: "grep -rn 'in_recruitment_process\\|flagLead\\|detectCrossPipeline' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

    - id: "AC-FUNC-JASC-06"
      description: "Given a lead flagged as in_recruitment_process / When POST /api/job-offers/:id/contacts/:contactId/re-prospect / Then the lead's recruitmentStatus is cleared and returned to the pipeline"
      verify: "grep -rn 'reProspect\\|clearRecruitmentStatus\\|returnToLeadPipeline' apps/api/app/services/recruitment_contact_service.ts | head -5"
      tier: 1

  security:
    - id: "AC-SEC-JASC-01"
      description: "All recruitment contact endpoints use VineJS validators — no unvalidated input reaches the service layer"
      verify: "grep -rn 'validateUsing' apps/api/start/routes/recruitment_contacts.ts apps/api/app/services/recruitment_contact_service.ts 2>/dev/null; grep -rn 'vine\\.' apps/api/app/validators/recruitment_contact_validator.ts | head -10"
      tier: 1

    - id: "AC-SEC-JASC-02"
      description: "Every query in RecruitmentContactService is scoped to the authenticated user's offers — no cross-user data access"
      verify: "grep -rn 'userId\\|user.*id\\|verifyOfferOwnership' apps/api/app/services/recruitment_contact_service.ts | head -10"
      tier: 1

    - id: "AC-SEC-JASC-03"
      description: "No raw SQL — all queries use Lucid ORM query builder or model methods"
      verify: "! grep -rn 'rawQuery\\|\\$raw\\|Database.raw' apps/api/app/services/recruitment_contact_service.ts apps/api/app/models/recruitment_contact.ts"
      tier: 1

  best_practices:
    - id: "AC-BP-JASC-01"
      description: "Business logic in service, controller is thin (validate → call service → return response)"
      verify: "wc -l apps/api/start/routes/recruitment_contacts.ts | awk '{if ($1 < 80) print \"PASS: route file under 80 lines\"; else print \"FAIL: route file too large\"}'"
      tier: 1

    - id: "AC-BP-JASC-02"
      description: "RecruitmentContact model uses snake_case DB columns, PascalCase class, camelCase properties"
      verify: "grep -c 'declare.*:' apps/api/app/models/recruitment_contact.ts | awk '{if ($1 >= 5) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

edge_cases:
  - description: "Adding a contact with the same email as an existing recruitment contact on the same offer"
    handling: "Return 409 Conflict with error code DUPLICATE_CONTACT"
  - description: "Adding a contact whose email matches a lead but for a different company"
    handling: "Do NOT flag as cross-pipeline — the match must be email + same company (via offer.companyCacheId)"
  - description: "Removing a recruitment contact that was cross-pipeline linked, but the lead was already manually moved to 'rejected'"
    handling: "Only clear recruitmentStatus if it is still 'in_recruitment_process' — don't override other statuses"
  - description: "Re-prospect on a contact that has no linked lead (leadId is null)"
    handling: "Return 400 with error code NO_LINKED_LEAD"
  - description: "Adding a contact to an offer the user doesn't own"
    handling: "Return 404 (same as verifyOfferOwnership pattern)"

test_intentions:
  - function: "detectCrossPipeline"
    description: "When adding a recruitment contact, check if email matches a lead for the same company"
    inputs:
      recruitmentContactEmail: "john@acme.com"
      offerCompanyCacheId: "company-uuid-1"
      leadEmail: "john@acme.com"
      leadCompanyId: "company-uuid-1"
    oracle:
      final: "email match + same company → lead.recruitmentStatus = 'in_recruitment_process', recruitmentContact.leadId = lead.id"
    assertions:
      - "lead.recruitmentStatus === 'in_recruitment_process'"
      - "recruitmentContact.leadId === lead.id"
    edge_cases:
      - description: "Email matches but different company"
        inputs:
          recruitmentContactEmail: "john@acme.com"
          offerCompanyCacheId: "company-uuid-1"
          leadEmail: "john@acme.com"
          leadCompanyId: "company-uuid-2"
        oracle:
          final: "email match but company mismatch → no flagging"
        assertions:
          - "lead.recruitmentStatus === null"
          - "recruitmentContact.leadId === null"
      - description: "No lead exists with that email"
        inputs:
          recruitmentContactEmail: "unknown@acme.com"
        oracle:
          final: "no match → no flagging, leadId stays null"
        assertions:
          - "recruitmentContact.leadId === null"

  - function: "clearRecruitmentStatus (re-prospect)"
    description: "When re-prospecting, clear the lead's recruitment status"
    inputs:
      leadRecruitmentStatus: "in_recruitment_process"
    oracle:
      final: "lead.recruitmentStatus = null"
    assertions:
      - "lead.recruitmentStatus === null"
    edge_cases:
      - description: "Lead was already manually moved (status != in_recruitment_process)"
        inputs:
          leadRecruitmentStatus: null
        oracle:
          final: "No change — already cleared"
        assertions:
          - "lead.recruitmentStatus === null"

ux_ref: null  # Backend-only story, no UI

components:
  reuse: []
  create: []

depends_on:
  - "job-cover-letter"

notes: |
  - RecruitmentContact model: id (UUID), offerId (FK→job_offers), userId (FK→users), name (string, required),
    role (string|null), email (string|null), linkedinUrl (string|null), notes (text|null),
    leadId (string|null, FK→contacts), createdAt, updatedAt
  - Migration for contacts table: add recruitment_status column (varchar(30)|null, default null)
  - Cross-pipeline detection runs on create only (not update) — changing email on a recruitment contact
    does not re-trigger detection (keep it simple for MVP)
  - The re-prospect endpoint is POST (not DELETE) because it's an action, not a resource deletion
  - ADR: recruitment contacts are a separate table from leads (contacts table) because they serve
    different purposes (tracking vs outreach) and have different lifecycles

