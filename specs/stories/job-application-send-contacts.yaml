story:
  id: "job-application-send-contacts"
  title: "Recruitment contacts CRUD + cross-pipeline detection"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "M"
  refined_at: "2026-04-09"
  refined_by: "refinement"

user_story: >
  As a job seeker, I want to add and manage recruitment contacts (HR, hiring manager, CEO)
  linked to a job offer, so that I can track who I interact with during the recruitment process.
  When a contact is also a lead in my pipeline, I want them flagged as 'in_recruitment_process'
  so they are excluded from cold outreach during the active process.

scope:
