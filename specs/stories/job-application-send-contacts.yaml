      reason: "Understand existing JobApplication model structure"
    - path: "apps/api/app/models/job_offer.ts"
      reason: "Understand offer ownership verification pattern"
    - path: "apps/api/app/controllers/job_applications_controller.ts"
      reason: "Reuse verifyOfferOwnership pattern"
    - path: "apps/api/app/models/contact.ts"
      reason: "Understand lead contact model for cross-pipeline"
