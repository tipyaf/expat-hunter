      purpose: "Migration for recruitment_contacts table"
    - path: "apps/api/database/migrations/043_add_recruitment_status_to_contacts.ts"
      purpose: "Add recruitment_status column to contacts table (for cross-pipeline flagging)"
    - path: "apps/api/app/models/recruitment_contact.ts"
      purpose: "RecruitmentContact Lucid model"
    - path: "apps/api/app/services/recruitment_contact_service.ts"
      purpose: "Service: CRUD, cross-pipeline detection, re-prospect"
    - path: "apps/api/app/validators/recruitment_contact_validator.ts"
      purpose: "VineJS validators for recruitment contact endpoints"
    - path: "apps/api/start/routes/recruitment_contacts.ts"
      purpose: "Route group for /api/job-offers/:id/contacts"
    - path: "apps/api/tests/unit/services/recruitment_contact_service.spec.ts"
