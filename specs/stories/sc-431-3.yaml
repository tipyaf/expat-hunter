story:
  id: "sc-431-3"
  shortcut_url: ""
  title: "Premium/Free: frontend premium badges, gated UI + upgrade page"
  parent_spec: "specs/expat-hunter.yaml"
  parent_epic: "sc-431"
  status: "refined"
  size: "L"
  estimate: 5
  type: "feature"
  refined_at: "2026-03-27"
  refined_by: "refinement"

user_story: >
  As a free user, I can see premium features exist (via badges and blurred
  content) which motivates me to upgrade. The kanban page is visible but
  non-interactive. The contacts page shows my real contacts + fake blurred
  contacts below. An upgrade page shows pricing and benefits.

scope:
  files_to_create:
    - path: "apps/frontend/src/components/ui/premium-badge.tsx"
      reason: "PremiumBadge component — small badge/pill shown on premium-only features"
    - path: "apps/frontend/src/components/ui/premium-gate.tsx"
      reason: "PremiumGate wrapper — renders children normally for premium, shows overlay+badge for free"
    - path: "apps/frontend/src/components/ui/fake-contact-row.tsx"
      reason: "FakeContactRow component — generates randomized blurred contact data for free users"
    - path: "apps/frontend/src/app/upgrade/page.tsx"
      reason: "Upgrade page with pricing, free vs premium comparison, CTA"
    - path: "apps/frontend/src/hooks/use-plan.ts"
      reason: "usePlan hook — returns { plan, isPremium, isFree, quota } from user context"
  files_to_modify:
    - path: "apps/frontend/src/app/suivi/page.tsx"
      reason: "Wrap kanban in PremiumGate — visible but non-interactive for free users"
    - path: "apps/frontend/src/app/contacts/page.tsx"
      reason: "Show real contacts + fake blurred contacts below for free users"
    - path: "apps/frontend/src/app/emails/page.tsx"
      reason: "Add PremiumBadge on modify/regenerate buttons for free users"
    - path: "apps/frontend/src/components/layout/sidebar.tsx"
      reason: "Add upgrade CTA button in sidebar for free users"
    - path: "apps/frontend/src/i18n/en.json"
      reason: "Add premium/upgrade i18n keys"
    - path: "apps/frontend/src/i18n/fr.json"
      reason: "Add premium/upgrade i18n keys"
  files_to_read:
    - "apps/frontend/src/app/suivi/page.tsx"
    - "apps/frontend/src/app/contacts/page.tsx"
    - "apps/frontend/src/components/layout/sidebar.tsx"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC431-3-01"
      description: "Given PremiumBadge component / When rendered / Then shows a styled badge with premium icon"
      verify: "grep -n 'PremiumBadge' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/premium-badge.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-02"
      description: "Given PremiumGate component / When user is free / Then children are rendered with disabled overlay + upgrade CTA"
      verify: "grep -n 'PremiumGate\\|isPremium\\|isFree' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/premium-gate.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-03"
      description: "Given the kanban page / When a free user visits / Then content is visible but interactions disabled (drag, buttons)"
      verify: "grep -n 'PremiumGate\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/suivi/page.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-04"
      description: "Given /suivi route / When a free user accesses via URL / Then backend returns 403 (PlanGuard) and frontend shows upgrade prompt"
      verify: "grep -n 'plan_guard\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/start/routes.ts | grep -i suivi\\|pipeline"
      tier: 1

    - id: "AC-FUNC-SC431-3-05"
      description: "Given the contacts page / When a free user visits / Then real contacts show normally + fake blurred contacts appear below"
      verify: "grep -n 'FakeContactRow\\|fake.*contact\\|blurred' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/contacts/page.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-06"
      description: "Given FakeContactRow / When rendered / Then contact data is randomized and visually blurred (CSS blur filter)"
      verify: "grep -n 'blur\\|filter' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/fake-contact-row.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-07"
      description: "Given the upgrade page / When visited / Then displays pricing table, free vs premium comparison, CTA button"
      verify: "grep -n 'upgrade\\|premium\\|free' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/upgrade/page.tsx | wc -l | xargs test 3 -le"
      tier: 1

    - id: "AC-FUNC-SC431-3-08"
      description: "Given the sidebar / When user is free / Then an upgrade CTA is visible"
      verify: "grep -n 'upgrade\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/layout/sidebar.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-09"
      description: "Given relevance badges / When contacts belong to free user / Then relevance badges are NOT displayed (analysis not done)"
      verify: "grep -n 'isPremium\\|relevance.*premium\\|plan' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/contacts/page.tsx"
      tier: 1

  security:
    - id: "AC-SEC-SC431-3-01"
      description: "Fake contacts are generated client-side only — no API calls, no real data leaked"
      verify: "! grep -n 'fetch\\|api.*contact' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/fake-contact-row.tsx || echo 'PASS: no API calls'"
      tier: 1

    - id: "AC-SEC-SC431-3-02"
      description: "Pipeline/kanban route is protected server-side by PlanGuard (not frontend-only)"
      verify: "grep -n 'plan_guard\\|middleware.plan' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/start/routes.ts"
      tier: 1

  best_practices:
    - id: "AC-BP-SC431-3-01"
      description: "All premium/upgrade text uses i18n keys (en + fr)"
      verify: "grep -rn 'premium\\|upgrade' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/i18n/en.json | head -3"
      tier: 1

    - id: "AC-BP-SC431-3-02"
      description: "TypeScript: 0 errors frontend"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend && npx tsc --noEmit 2>&1 | tail -1 | grep -v error"
      tier: 1

    - id: "AC-BP-SC431-3-03"
      description: "usePlan hook exists and exports isPremium, isFree"
      verify: "grep -n 'isPremium\\|isFree' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/hooks/use-plan.ts"
      tier: 1

edge_cases:
  - description: "User upgrades to premium while on contacts page"
    handling: "usePlan hook re-reads from user context — fake contacts disappear on next render/navigation"
  - description: "Free user has 0 real contacts"
    handling: "Show only fake blurred contacts with empty state message + upgrade CTA"
  - description: "Fake contacts must not look identical each time"
    handling: "Use seeded random based on userId to generate consistent but unique fake data per user"

depends_on: ["sc-431-1"]

notes: |
  Fake contacts are purely cosmetic — generated client-side from a pool of randomized
  names/roles/companies. They must look realistic but be clearly blurred/inaccessible.
  No API call involved — zero cost.
  The upgrade page is designed as if payment exists, but CTA redirects to
  "contact admin" for now. Will be wired to Stripe later.

definition_of_done:
  - "PremiumBadge + PremiumGate + FakeContactRow components"
  - "Kanban gated with overlay"
  - "Contacts page shows real + fake blurred"
  - "Upgrade page with pricing"
  - "Sidebar CTA for free users"
  - "i18n en + fr"
  - "0 TS errors"
  - "PR merged"
