      description: "Given PremiumBadge component / When rendered / Then shows a styled badge with premium icon"
      verify: "grep -n 'PremiumBadge' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/premium-badge.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-02"
      description: "Given PremiumGate component / When user is free / Then children are rendered with disabled overlay + upgrade CTA"
      verify: "grep -n 'PremiumGate\\|isPremium\\|isFree' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/premium-gate.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-03"
      description: "Given the kanban page / When a free user visits / Then content is visible but interactions disabled (drag, buttons)"
      verify: "grep -n 'PremiumGate\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/suivi/page.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-04"
      description: "Given /suivi route / When a free user accesses via URL / Then backend returns 403 (PlanGuard) and frontend shows upgrade prompt"
      verify: "grep -n 'plan_guard\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/start/routes.ts | grep -i suivi\\|pipeline"
      tier: 1

    - id: "AC-FUNC-SC431-3-05"
      description: "Given the contacts page / When a free user visits / Then real contacts show normally + fake blurred contacts appear below"
      verify: "grep -n 'FakeContactRow\\|fake.*contact\\|blurred' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/contacts/page.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-06"
      description: "Given FakeContactRow / When rendered / Then contact data is randomized and visually blurred (CSS blur filter)"
      verify: "grep -n 'blur\\|filter' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/fake-contact-row.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-07"
      description: "Given the upgrade page / When visited / Then displays pricing table, free vs premium comparison, CTA button"
      verify: "grep -n 'upgrade\\|premium\\|free' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/upgrade/page.tsx | wc -l | xargs test 3 -le"
      tier: 1

    - id: "AC-FUNC-SC431-3-08"
      description: "Given the sidebar / When user is free / Then an upgrade CTA is visible"
      verify: "grep -n 'upgrade\\|premium' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/layout/sidebar.tsx"
      tier: 1

    - id: "AC-FUNC-SC431-3-09"
      description: "Given relevance badges / When contacts belong to free user / Then relevance badges are NOT displayed (analysis not done)"
      verify: "grep -n 'isPremium\\|relevance.*premium\\|plan' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/app/contacts/page.tsx"
      tier: 1

  security:
    - id: "AC-SEC-SC431-3-01"
      description: "Fake contacts are generated client-side only — no API calls, no real data leaked"
      verify: "! grep -n 'fetch\\|api.*contact' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/components/ui/fake-contact-row.tsx || echo 'PASS: no API calls'"
      tier: 1

    - id: "AC-SEC-SC431-3-02"
      description: "Pipeline/kanban route is protected server-side by PlanGuard (not frontend-only)"
      verify: "grep -n 'plan_guard\\|middleware.plan' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/start/routes.ts"
      tier: 1

  best_practices:
    - id: "AC-BP-SC431-3-01"
      description: "All premium/upgrade text uses i18n keys (en + fr)"
      verify: "grep -rn 'premium\\|upgrade' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/i18n/en.json | head -3"
      tier: 1

    - id: "AC-BP-SC431-3-02"
      description: "TypeScript: 0 errors frontend"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend && npx tsc --noEmit 2>&1 | tail -1 | grep -v error"
      tier: 1

    - id: "AC-BP-SC431-3-03"
      description: "usePlan hook exists and exports isPremium, isFree"
      verify: "grep -n 'isPremium\\|isFree' /Volumes/Samsung_T5/dev/expat-hunter/apps/frontend/src/hooks/use-plan.ts"
      tier: 1

edge_cases:
  - description: "User upgrades to premium while on contacts page"
    handling: "usePlan hook re-reads from user context — fake contacts disappear on next render/navigation"
  - description: "Free user has 0 real contacts"
    handling: "Show only fake blurred contacts with empty state message + upgrade CTA"
  - description: "Fake contacts must not look identical each time"
    handling: "Use seeded random based on userId to generate consistent but unique fake data per user"

depends_on: ["sc-431-1"]

notes: |
  Fake contacts are purely cosmetic — generated client-side from a pool of randomized
  names/roles/companies. They must look realistic but be clearly blurred/inaccessible.
  No API call involved — zero cost.
  The upgrade page is designed as if payment exists, but CTA redirects to
  "contact admin" for now. Will be wired to Stripe later.

definition_of_done:
  - "PremiumBadge + PremiumGate + FakeContactRow components"
  - "Kanban gated with overlay"
  - "Contacts page shows real + fake blurred"
  - "Upgrade page with pricing"
  - "Sidebar CTA for free users"
  - "i18n en + fr"
  - "0 TS errors"
  - "PR merged"

# ─────────────────────────────────────────────────────────────────────────
# v5 interactions: contract (G9.4 — interaction verification)
#
# Each item is a user trigger + its expected side effects (DOM, URL,
# API, state, console). generate-interaction-tests.py reads this block
# and emits a Playwright spec that asserts every `expected` item.
# G9.4 fails (and /ship refuses to create a PR) if any assertion
# misses.
#
# Required attributes on the rendered UI:
#   - data-testid      : stable selector for the element
#   - data-action      : intent label that matches the `action` below
# ─────────────────────────────────────────────────────────────────────────

interactions:
  # --- Sidebar upgrade CTA (visible to free users only) -------------------
  - action: click-upgrade-cta-sidebar
    description: "Free user clicks the upgrade button in the sidebar"
    pre_state:
      - plan: free
    trigger: click data-testid=sidebar-upgrade-cta
    expected:
      - url: /upgrade
      - dom: data-testid=upgrade-page-pricing-table is visible
      - no_console_errors: true

  # --- Upgrade page --------------------------------------------------------
  - action: visit-upgrade-page
    description: "Any user navigates directly to the upgrade page"
    trigger: navigate /upgrade
    expected:
      - dom: data-testid=upgrade-page-pricing-table is visible
      - dom: data-testid=upgrade-free-column is visible
      - dom: data-testid=upgrade-premium-column is visible
      - dom: data-testid=upgrade-primary-cta is visible
      - no_console_errors: true

  - action: click-upgrade-contact-cta
    description: "Free user clicks the upgrade CTA on the upgrade page"
    pre_state:
      - plan: free
    trigger: click data-testid=upgrade-primary-cta
    expected:
      # Stripe wiring is out of scope of sc-431-3 (per notes); for now
      # the CTA opens a mailto / admin contact flow.
      - href_starts_with: "mailto:"
      - no_console_errors: true

  # --- Kanban gated for free users ----------------------------------------
  - action: visit-kanban-free
    description: "Free user navigates to /suivi — page is visible but locked"
    pre_state:
      - plan: free
    trigger: navigate /suivi
    expected:
      - dom: data-testid=kanban-board is visible
      - dom: data-testid=kanban-locked-overlay is visible
      - dom: data-testid=kanban-upgrade-prompt is visible
      - no_console_errors: true

  - action: drag-kanban-card-free
    description: "Free user tries to drag a kanban card — nothing moves"
    pre_state:
      - plan: free
      - dom: data-testid=kanban-board is visible
    trigger: drag data-testid=kanban-card-0 to data-testid=kanban-column-contacted
    expected:
      # Strict behavioural assertion — the card must NOT move.
      - dom_attr: data-testid=kanban-card-0 has data-column="to-contact"
      - no_console_errors: true

  - action: visit-kanban-premium
    description: "Premium user can drag cards normally"
    pre_state:
      - plan: premium
    trigger: navigate /suivi
    expected:
      - dom: data-testid=kanban-board is visible
      - dom: data-testid=kanban-locked-overlay is absent
      - no_console_errors: true

  # --- Kanban backend enforcement (server-side PlanGuard) -----------------
  - action: api-kanban-free-direct
    description: "Free user hits the kanban API directly — backend enforces PlanGuard"
    pre_state:
      - plan: free
    trigger: fetch GET /api/pipeline
    expected:
      - api_status: 403
      - api_body_contains: plan_required
      # Client intercepts 403 and shows the upgrade prompt (no crash).
      - no_console_errors: true

  # --- Contacts page with fake blurred rows for free users ----------------
  - action: visit-contacts-free
    description: "Free user on contacts page sees real contacts + fake blurred ones"
    pre_state:
      - plan: free
      - fixture: user-with-2-real-contacts
    trigger: navigate /contacts
    expected:
      - dom_count: "data-testid=contact-row=2"             # real contacts
      - dom_count_min: "data-testid=fake-contact-row=3"    # fake blurred contacts
      - dom: data-testid=fake-contact-row[data-blurred=true] is visible
      - no_console_errors: true

  - action: click-fake-contact-free
    description: "Free user clicks a fake blurred contact — nothing selectable"
    pre_state:
      - plan: free
    trigger: click data-testid=fake-contact-row
    expected:
      - dom: data-testid=fake-contact-row is still visible  # no navigation
      - dom: data-testid=contact-detail-panel is absent     # no detail opens
      - no_console_errors: true

  - action: visit-contacts-premium
    description: "Premium user on contacts page sees only real contacts"
    pre_state:
      - plan: premium
      - fixture: user-with-2-real-contacts
    trigger: navigate /contacts
    expected:
      - dom_count: "data-testid=contact-row=2"
      - dom_count: "data-testid=fake-contact-row=0"
      - no_console_errors: true

  # --- Relevance badges hidden for free users -----------------------------
  - action: relevance-hidden-free
    description: "Free user sees NO relevance badges on contacts (analysis is premium)"
    pre_state:
      - plan: free
    trigger: navigate /contacts
    expected:
      - dom_count: "data-testid=relevance-badge=0"
      - no_console_errors: true

  # --- Emails page: modify / regenerate buttons show PremiumBadge ---------
  - action: emails-premium-badge-visible
    description: "Free user on emails page sees PremiumBadge on gated actions"
    pre_state:
      - plan: free
    trigger: navigate /emails
    expected:
      - dom: data-testid=email-modify-btn[data-premium=true] is visible
      - dom: data-testid=email-regenerate-btn[data-premium=true] is visible
      # Clicking a gated action shows the upgrade prompt inline.
      - after_click[data-testid=email-modify-btn]:
          - dom: data-testid=inline-upgrade-prompt is visible
      - no_console_errors: true

