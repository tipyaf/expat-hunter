    - "apps/frontend/src/app/onboarding/page.tsx — replace 4 silent catches"
    - "apps/frontend/src/app/parametres/connexion-email/page.tsx — replace 3 silent catches"
    - "apps/frontend/src/contexts/auth-context.tsx — replace 3 silent catches"
    - "apps/frontend/src/app/contacts/page.tsx — replace silent catch"
    - "apps/frontend/src/app/recherche/page.tsx — extract COUNTRY_CODES to constants, fix silent catch"
    # === i18n VIOLATIONS (11 hardcoded French strings) ===
    - "apps/frontend/src/app/recherche/error.tsx — replace hardcoded French with i18n"
    - "apps/frontend/src/hooks/use-search.ts — replace hardcoded French error with i18n"
    - "apps/frontend/src/hooks/use-analysis.ts — replace hardcoded French error with i18n"
    - "apps/frontend/src/hooks/use-contacts.ts — replace hardcoded French error with i18n"
    - "apps/frontend/src/hooks/use-market-snapshot.ts — replace hardcoded French error with i18n"
