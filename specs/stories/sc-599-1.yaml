acceptance_criteria:

  functional:
    - id: "AC-FUNC-599-1-01"
      description: "Given all frontend files / When checking line count / Then no file exceeds 400 lines"
      verify: "find apps/frontend/src -name '*.tsx' -o -name '*.ts' | xargs wc -l | awk '$1 > 400 && !/total/ {print \"VIOLATION: \" $2 \" (\" $1 \"L)\"}' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-02"
      description: "Given all frontend source / When searching for magic numbers / Then no raw timeout/interval values exist in component logic"
      verify: "grep -rn 'setTimeout.*[0-9]\\{4,\\}\\|setInterval.*[0-9]\\{4,\\}' apps/frontend/src/app/ apps/frontend/src/components/ apps/frontend/src/hooks/ --include='*.tsx' --include='*.ts' | grep -v 'constants\\|config\\|TIMEOUT\\|INTERVAL\\|DELAY\\|_MS' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-03"
      description: "Given all frontend source / When searching for hardcoded French strings / Then zero remain outside i18n JSON files"
      verify: "grep -rn 'Erreur lors\\|Améliorer\\|Meilleur moment\\|Comment relancer\\|Page actuelle\\|Réessayer\\|Erreur sur la page' apps/frontend/src/ --include='*.tsx' --include='*.ts' | grep -v 'node_modules\\|i18n\\|.json' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-04"
      description: "Given all frontend source / When searching for silent catches / Then no empty catch blocks exist"
      verify: "grep -rn 'catch.*{\\s*}\\|catch.*=> *{}\\|catch\\s*{\\s*}\\|/\\* silent \\*/' apps/frontend/src/ --include='*.tsx' --include='*.ts' | grep -v 'test\\|spec\\|node_modules' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-05"
      description: "Given all frontend source / When searching for inline styles / Then no style={{}} remains except dynamic width on progress bars"
      verify: "grep -rn 'style={{' apps/frontend/src/ --include='*.tsx' | grep -v 'node_modules\\|width.*%\\|width.*var' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-06"
      description: "Given the refactored pages / When building / Then TypeScript compiles with 0 errors"
      verify: "cd apps/frontend && npx tsc --noEmit 2>&1 | grep -c 'error TS' | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-07"
      description: "Given constants/ui.ts / When checking / Then it exports named constants for all extracted magic numbers"
      verify: "test -f apps/frontend/src/constants/ui.ts && grep -c 'export const' apps/frontend/src/constants/ui.ts | awk '{if($1>=3) print \"PASS\"; else print \"FAIL: need at least 3 constants\"}'"
      tier: 1

    - id: "AC-FUNC-599-1-08"
      description: "Given i18n files / When comparing en.json and fr.json / Then both have identical key sets"
      verify: "bash -c 'diff <(cd /Volumes/Samsung_T5/dev/expat-hunter && node -e \"const k=Object.keys(JSON.parse(require(\\\"fs\\\").readFileSync(\\\"i18n/en.json\\\",\\\"utf8\\\"))); k.sort(); console.log(k.join(\\\"\\\\n\\\"))\") <(cd /Volumes/Samsung_T5/dev/expat-hunter && node -e \"const k=Object.keys(JSON.parse(require(\\\"fs\\\").readFileSync(\\\"i18n/fr.json\\\",\\\"utf8\\\"))); k.sort(); console.log(k.join(\\\"\\\\n\\\"))\") && echo PASS || echo FAIL'"
      tier: 1

  security: []

  best_practices:
    - id: "AC-BP-599-1-01"
      description: "Given split components / When reviewing / Then each extracted component is under 200 lines and has a single responsibility"
      verify: "find apps/frontend/src -name '*.tsx' -newer /Volumes/Samsung_T5/dev/expat-hunter/specs/stories/sc-599-1.yaml | xargs wc -l 2>/dev/null | awk '$1 > 200 && !/total/ {count++} END {if(count+0>0) print \"FAIL: \" count \" new files >200L\"; else print \"PASS\"}'"
      tier: 1

    - id: "AC-BP-599-1-02"
      description: "Given all catch blocks / When reviewing / Then every catch logs the error via console.error or shows a toast notification"
      verify: "grep -A2 'catch' apps/frontend/src/hooks/*.ts apps/frontend/src/app/**/*.tsx apps/frontend/src/contexts/*.tsx 2>/dev/null | grep -c 'console.error\\|toast\\|setError\\|setToast' | awk '{if($1>=20) print \"PASS\"; else print \"FAIL: not enough error handlers\"}'"
      tier: 1

    - id: "AC-BP-599-1-03"
      description: "Given all frontend source / When checking / Then no explicit any type exists"
      verify: "grep -rn ': any\\b\\|as any\\b' apps/frontend/src/ --include='*.ts' --include='*.tsx' | grep -v 'node_modules\\|.d.ts' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

edge_cases:
  - description: "Splitting pages may break existing e2e tests (selectors, test IDs)"
    handling: "Run e2e suite after refactor. Fix any broken selectors. Update test IDs if components moved."
  - description: "Some inline styles are dynamic (progress bar width based on state)"
    handling: "Keep style={{width}} for dynamic percentage-based widths. Replace animation delays with Tailwind classes."
  - description: "Silent catch replacement may surface errors to users that were previously hidden"
    handling: "Use console.error for non-user-facing errors (data prefetch). Use toast for user-triggered actions (save, delete)."
  - description: "i18n keys added must exist in both en.json and fr.json"
    handling: "AC-FUNC-599-1-08 verifies both files have identical key sets."

test_intentions: []

depends_on: []

notes: |
  AUDIT FINDINGS (2026-03-30):

  FILES >400L (6):
  - onboarding/page.tsx (475L), suivi/page.tsx (455L), emails/page.tsx (453L),
    parametres/page.tsx (437L), parametres/connexion-email/page.tsx (424L),
    search-progress-modal.tsx (418L)

  SILENT CATCHES (47 across 18 files):
  - Worst offenders: admin/ai-settings (4), onboarding (4), auth-context (3),
    connexion-email (3), use-emails (2), use-pipeline (2)
  - Pattern: replace `catch {}` or `catch(() => {})` with:
    - `catch (error) { console.error('Context:', error) }` for non-user-facing
    - `catch (error) { toast.error(t('errors.generic')); console.error(error) }` for user actions

  HARDCODED FRENCH (11 strings in 8 files):
  - 6 hooks: use-search, use-analysis, use-contacts, use-market-snapshot, use-profile, use-sourcing
  - 1 error page: recherche/error.tsx
  - 1 component: chat-panel.tsx (PAGE_SUGGESTIONS)

  INLINE STYLES (11):
  - Dynamic widths (progress bars) → keep style={{width}}
  - Animation delays (0, 150, 300ms) → replace with Tailwind `delay-*` or CSS custom properties
  - fieldSizing cast → keep (browser compat)

  MAGIC NUMBERS (2 in timers):
  - recherche/page.tsx:98 → setTimeout(…, 8000)
  - use-search.ts:131 → setInterval(…, 2000)

  EXPLICIT ANY: 0 (clean)

definition_of_done:
  - "All AC verify: commands pass"
  - "No TypeScript errors (tsc --noEmit)"
  - "All e2e tests pass (no regressions)"
  - "PR merged into develop"
  - "Shortcut story moved to Done"

closing_ac:
  - id: "AC-BP-599-1-DONE"
    type: "BP"
    description: |
      PR is merged into develop — story closure gate.
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-599-1'"
    tier: 1
