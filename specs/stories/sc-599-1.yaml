story:
  id: "sc-599-1"
  title: "Frontend best practices audit and refactor"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XL"
  refined_at: "2026-03-30"
  refined_by: "refinement"

user_story: >
  As a developer, I want the frontend codebase to respect best practices
  (file size limits, no magic values, i18n compliance, proper error handling, no inline styles),
  so that the code is maintainable and consistent.

scope:
  files_to_create:
    - "apps/frontend/src/constants/ui.ts — extracted magic numbers (timeouts, polling intervals, thresholds)"
  files_to_modify:
    # === FILE SPLITS (6 files >400L) ===
    - "apps/frontend/src/app/onboarding/page.tsx — split into subcomponents (<400L, currently 475L)"
    - "apps/frontend/src/app/suivi/page.tsx — split into subcomponents (<400L, currently 455L)"
    - "apps/frontend/src/app/emails/page.tsx — split into subcomponents (<400L, currently 453L)"
    - "apps/frontend/src/app/parametres/page.tsx — split into subcomponents (<400L, currently 437L)"
    - "apps/frontend/src/app/parametres/connexion-email/page.tsx — split (<400L, currently 424L)"
    - "apps/frontend/src/components/ui/search-progress-modal.tsx — split (<400L, currently 418L)"
    # === SILENT CATCHES (47 occurrences across 18 files) ===
    - "apps/frontend/src/hooks/use-presets.ts — replace silent catch with console.error + toast"
    - "apps/frontend/src/hooks/use-templates.ts — replace silent catch"
    - "apps/frontend/src/hooks/use-emails.ts — replace 2 silent catches"
    - "apps/frontend/src/hooks/use-pipeline.ts — replace 2 silent catches"
    - "apps/frontend/src/app/contacts/[id]/page.tsx — replace .catch(() => {})"
    - "apps/frontend/src/app/parametres/page.tsx — replace .catch(() => {})"
    - "apps/frontend/src/app/profil/page.tsx — replace silent catches + extract magic timeouts"
