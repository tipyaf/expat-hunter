story:
  id: "sc-535"
  title: "chore: add zero-console-errors validation gate to framework and project"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "S"
  refined_at: "2026-03-28"
  refined_by: "refinement"

user_story: >
  As a project maintainer,
  I want validation to fail if any stacktrace or console error exists (front & back),
  so that no story is declared "done" with runtime errors still present.

scope:
  files_to_create: []
  files_to_modify:
    # --- Repo: ai-spec-driven-generator (framework submodule) ---
    - path: "framework/agents/validator.md"
      repo: "ai-spec-driven-generator"
      reason: "Add Step 4b: zero console errors gate (preview_console_logs for front, preview_logs for back)"
    - path: "framework/specs/templates/story-template.yaml"
      repo: "ai-spec-driven-generator"
      reason: "Add AC-BP-[FEATURE]-CONSOLE to definition_of_done and add console error AC template"
    # --- Repo: expat-hunter (main project) ---
    - path: "CLAUDE.md"
      repo: "expat-hunter"
      reason: "Add checklist item 'Zero console errors (front & back)' to build checklist"
    - path: "memory/LESSONS.md"
      repo: "expat-hunter"
      reason: "Add lesson about never validating with console errors/stacktraces"
  files_to_read:
    - path: "framework/agents/validator.ref.md"
      reason: "Reference for report templates and anti-pattern lists"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC535-01"
      description: >
        Given the CLAUDE.md build checklist,
        When reviewing the checklist items,
        Then there is an item requiring zero console errors (front & back) before validation.
      verify: "grep -qi 'console error\\|zero console\\|0 console' CLAUDE.md && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC535-02"
      description: >
        Given framework/agents/validator.md,
        When reviewing the validation workflow,
        Then there is a step checking for console errors/stacktraces via preview tools.
      verify: "grep -qi 'console.*error\\|stacktrace\\|preview_console\\|console.*log.*check' framework/agents/validator.md && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC535-03"
      description: >
        Given framework/specs/templates/story-template.yaml,
        When reviewing definition_of_done,
        Then an AC-BP-CONSOLE entry exists requiring zero console errors.
      verify: "grep -q 'CONSOLE\\|console.*error\\|stacktrace' framework/specs/templates/story-template.yaml && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC535-04"
      description: >
        Given memory/LESSONS.md,
        When reviewing lessons,
        Then a lesson exists about never validating with console errors or stacktraces.
      verify: "grep -qi 'console.*error\\|stacktrace.*validat\\|validat.*stacktrace' memory/LESSONS.md && echo PASS || echo FAIL"
      tier: 1

  security:
    - id: "AC-SEC-SC535-01"
      description: >
        Given all modified files,
        When reviewing for secrets,
        Then no passwords, tokens, or API keys are present.
      verify: "! grep -rn 'password=\\|secret=\\|token=\\|api_key=' CLAUDE.md framework/agents/validator.md framework/specs/templates/story-template.yaml memory/LESSONS.md 2>/dev/null | grep -v 'example\\|placeholder\\|never\\|mask' | head -1 && echo PASS || echo FAIL"
      tier: 1

  best_practices:
    - id: "AC-BP-SC535-FRAMEWORK"
      description: >
        Given the framework submodule changes,
        When reviewing git history in framework/,
        Then the changes are committed and pushed to the ai-spec-driven-generator repo.
      verify: "cd framework && git log -1 --oneline | grep -qi 'console\\|stacktrace' && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-BP-SC535-SUBMODULE"
      description: >
        Given the expat-hunter repo,
        When reviewing the submodule pointer,
        Then framework/ points to the new commit that includes the console error gate.
      verify: "git submodule status framework | grep -v '^-' && echo PASS || echo FAIL"
      tier: 1

edge_cases:
  - description: "Pre-existing console errors unrelated to the current story"
    handling: "Per LESSONS.md rule: fix immediately if small (<30 min) or create a Shortcut story. Never ignore."
  - description: "Console warnings vs errors"
    handling: "Gate applies to errors and stacktraces only. Warnings are noted but don't block validation."
  - description: "Backend log errors from external services (OpenRouter timeout, etc.)"
    handling: "Only errors triggered by the modified feature block validation. External service errors are noted, not blocking."

depends_on: []

notes: >
  Build workflow requires 2 separate commits in 2 repos:
  1. cd framework/ → modify validator.md + story-template.yaml → commit + push to ai-spec-driven-generator
  2. cd expat-hunter/ → modify CLAUDE.md + LESSONS.md → git add framework CLAUDE.md memory/LESSONS.md → commit + push + PR

  The checklist in CLAUDE.md currently has 12 items. This adds item #8bis (after "ACs verified"):
  "Zero console errors/stacktraces (front: browser console, back: server logs)"

  The validator gate should use:
  - Frontend: preview_console_logs (Claude Preview MCP) to check browser console
  - Backend: preview_logs or curl + check server output for stacktraces

definition_of_done:
  - "All AC verify: commands pass"
  - "Framework submodule committed and pushed"
  - "Submodule pointer updated in expat-hunter"
  - "PR merged into develop"
  - "Shortcut story sc-535 moved to Done"

closing_ac:
  - id: "AC-BP-SC535-DONE"
    type: "BP"
    description: |
      PR for sc-535 is merged into develop — story closure gate.
      After this passes, the validator MUST move sc-535 to Done (state 500000010).
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-535'"
    tier: 1
