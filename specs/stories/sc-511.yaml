    - "@adonisjs/limiter (to install)"
    - "Redis (already running via docker-compose)"
  features: []

test_intentions: []
# No computed values / formulas in this story — test_intentions is empty.
# Tests will focus on integration: hitting rate limits, lockout triggers, honeypot rejection.

