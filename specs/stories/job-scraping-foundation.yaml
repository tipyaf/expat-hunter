      type: "FUNC"
      description: "Given migration 35 / When run / Then job_offers table exists with all required columns (id uuid PK, search_id FK NOT NULL, company_cache_id FK nullable, title varchar(500) NOT NULL, description_raw text, status varchar(20) default 'new', relevance_score integer, salary_min integer, salary_max integer, salary_currency varchar(5), location varchar(255), remote_type varchar(10), publication_dates jsonb default '[]', closing_date timestamp, contact_email varchar(255), is_republished boolean default false, timestamps)"
