story:
  id: "job-scraping-foundation"
  name: "Job Scraping Foundation — Data model + Scrapers"
  feature: "job-scraping-pipeline"
  epic: "E10 — Recherche & Scraping"
  priority: "must-have"
  size: "L"
  estimate: 5
  status: "refined"
  created_at: "2026-04-08"

  user_story: |
    As an expat job seeker,
    I want the system to fetch job offers from multiple platforms (Seek, BuiltIn, Zeil, LinkedIn),
    so that I have a comprehensive view of opportunities in my target countries.

  description: |
    Data model foundation and platform scrapers for the job offers pipeline.
    Creates job_offers and job_offer_links tables, Lucid models, shared types/constants,
    BaseJobOfferScraper abstract class, JobOfferScraperRegistry, and 4 platform scrapers
    (all via Apify actors). Backend-only — no UI changes.

  depends_on:
    - "job-search-config"  # validated — provides JobSearch model + API

  ux_ref: null  # Backend-only, no UI

  adr_required: false  # Reuses existing scraper patterns (ADR in architecture doc)

