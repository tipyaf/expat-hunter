      - path: "apps/api/database/migrations/36_create_job_offer_links_table.ts"
        description: "Migration: job_offer_links table (uuid PK, offer_id FK, platform, url, apply_url, external_id, scraped_at) with unique index on (platform, external_id) WHERE external_id IS NOT NULL"
