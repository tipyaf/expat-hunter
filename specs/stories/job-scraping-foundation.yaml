    - id: "AC-BP-JSF-TU"
      type: "BP"
      description: "All unit tests for scrapers pass"
      verify: "cd apps/api && node ace test --groups 'JobOfferScraper' 2>&1 | tail -3"
      tier: 2

  test_intentions:
    - function: "SeekJobScraper.scrape"
      description: "Returns parsed RawJobOffer[] from Apify Seek actor"
      inputs:
        roles: ["Senior Frontend"]
        country: "NZ"
        city: "Auckland"
      oracle:
        final: "Array of RawJobOffer with platform='seek', each having title, company, location, url"
      assertions:
        - "result.length > 0"
        - "result[0].platform === 'seek'"
        - "result[0].title is string"
        - "result[0].url starts with 'https://'"
      edge_cases:
        - description: "Apify returns empty results"
          inputs: { roles: ["Underwater Basket Weaver"], country: "NZ" }
          oracle: { final: "empty array []" }
          assertions: ["result.length === 0"]
        - description: "Apify token missing (APIFY_TOKEN undefined)"
          inputs: { roles: ["Dev"], country: "NZ" }
          oracle: { final: "throws error with message about APIFY_TOKEN" }
          assertions: ["throws Error with message containing 'APIFY_TOKEN'"]
        - description: "Apify API returns error (500)"
          inputs: { roles: ["Dev"], country: "NZ" }
          oracle: { final: "throws error, does not return partial results" }
          assertions: ["throws Error"]

    - function: "JobOfferScraperRegistry.getForPlatform"
      description: "Returns the correct scraper for a given platform"
      inputs:
        platform: "seek"
      oracle:
        final: "Returns SeekJobScraper instance"
      assertions:
        - "result instanceof SeekJobScraper"
        - "result.platform === 'seek'"
      edge_cases:
        - description: "Unknown platform"
          inputs: { platform: "unknown_platform" }
          oracle: { final: "returns null or throws" }
          assertions: ["result === null or throws Error"]

  edge_cases:
    - "Apify API is down or returns 500 → scraper throws, orchestrator handles gracefully"
    - "Apify rate limit exceeded → retry with exponential backoff or fail gracefully"
    - "Scraper returns offers with missing fields (no salary, no closing_date) → nullable columns handle it"
    - "external_id collision across platforms → unique index scoped to (platform, external_id)"
    - "Very long job description (>50KB) → text column has no limit, but parse only first 10KB for AI"
    - "Platform not configured (no Apify actor for a platform) → registry returns null, skip"

  components:
    reuse:
      - name: "BaseScraper utilities"
        path: "apps/api/app/scrapers/base_scraper.ts"
        note: "Reuse randomUserAgent(), delay() via composition or utility extraction"
    create: []
