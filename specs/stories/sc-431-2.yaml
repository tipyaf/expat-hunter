story:
  id: "sc-431-2"
  shortcut_url: ""
  title: "Premium/Free: quota tracking + enforcement"
  parent_spec: "specs/expat-hunter.yaml"
  parent_epic: "sc-431"
  status: "refined"
  size: "L"
  estimate: 5
  type: "feature"
  refined_at: "2026-03-27"
  refined_by: "refinement"

user_story: >
  As a free user, I am limited to 2 sourcing searches, 5 contacts found,
  and 5 emails generated (lifetime). When I hit a limit the API returns
  a clear error with my remaining quota so the frontend can display it.
  As a premium user, I have no limits.

scope:
  files_to_create:
    - path: "apps/api/database/migrations/XXX_create_usage_counters.ts"
      reason: "Create usage_counters table (id, userId, counterType, count, updatedAt)"
    - path: "apps/api/app/models/usage_counter.ts"
      reason: "Lucid model for usage counters"
    - path: "apps/api/app/services/usage_service.ts"
      reason: "UsageService: increment(userId, type), getUsage(userId), checkQuota(userId, type), getRemainingQuota(userId)"
    - path: "apps/api/tests/unit/services/usage_service.spec.ts"
      reason: "Unit tests for UsageService"
  files_to_modify:
    - path: "apps/api/app/controllers/sourcing_controller.ts"
      reason: "Check search quota before running sourcing, increment after success, return quota in response"
    - path: "apps/api/app/controllers/emails_controller.ts"
      reason: "Check email quota before generating, increment after success, return quota in response"
    - path: "apps/api/app/services/search_orchestrator_service.ts"
      reason: "Pass limit=5 to Hunter API when user is free (limit contacts found)"
    - path: "packages/shared/src/types/api-responses.ts"
      reason: "Add QuotaInfo type { used, limit, remaining } to API response types"
  files_to_read:
    - "apps/api/app/controllers/sourcing_controller.ts"
    - "apps/api/app/controllers/emails_controller.ts"
    - "apps/api/app/services/search_orchestrator_service.ts"
    - "packages/shared/src/constants/plans.ts"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC431-2-01"
      description: "Given usage_counters table / When checked / Then columns userId, counterType, count exist"
      verify: "grep -n 'counter_type\\|counterType' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/models/usage_counter.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-02"
      description: "Given UsageService / When imported / Then increment, getUsage, checkQuota, getRemainingQuota methods exist"
      verify: "grep -n 'async increment\\|async getUsage\\|async checkQuota\\|async getRemainingQuota' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/services/usage_service.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-03"
      description: "Given a free user with 2 searches used / When POST /api/sourcing/run / Then 403 with code QUOTA_EXCEEDED"
      verify: "grep -n 'QUOTA_EXCEEDED' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/controllers/sourcing_controller.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-04"
      description: "Given a free user with 5 emails used / When POST /api/emails/generate / Then 403 with code QUOTA_EXCEEDED"
      verify: "grep -n 'QUOTA_EXCEEDED' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/controllers/emails_controller.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-05"
      description: "Given a premium user / When hitting any endpoint / Then no quota check — unlimited"
      verify: "grep -n 'isPremium\\|PLAN_PREMIUM' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/services/usage_service.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-06"
      description: "Given a free user / When sourcing runs / Then Hunter API is called with limit=5 (not unlimited)"
      verify: "grep -n 'limit.*FREE_QUOTAS\\|FREE_QUOTAS.results\\|quota.*results' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/services/search_orchestrator_service.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-07"
      description: "Given a free user / When AI relevance analysis would run / Then it is skipped (premium-only)"
      verify: "grep -n 'isPremium\\|plan.*premium\\|PLAN_PREMIUM' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/services/analysis_service.ts"
      tier: 1

    - id: "AC-FUNC-SC431-2-08"
      description: "Given a free user approaching a limit / When quota is checked / Then API response includes quota info with remaining count"
      verify: "grep -n 'quota\\|remaining' /Volumes/Samsung_T5/dev/expat-hunter/packages/shared/src/types/api-responses.ts"
      tier: 1

  security:
    - id: "AC-SEC-SC431-2-01"
      description: "Quota enforcement is server-side only — no client-side quota bypass possible"
      verify: "grep -n 'checkQuota\\|QUOTA_EXCEEDED' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/controllers/sourcing_controller.ts /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/controllers/emails_controller.ts"
      tier: 1

    - id: "AC-SEC-SC431-2-02"
      description: "Usage counters are per-user — no cross-user manipulation possible"
      verify: "grep -n 'userId' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/services/usage_service.ts | head -5"
      tier: 1

  best_practices:
    - id: "AC-BP-SC431-2-01"
      description: "TypeScript: 0 errors"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/api && npx tsc --noEmit 2>&1 | wc -l | tr -d ' ' | grep '^0$'"
      tier: 1

    - id: "AC-BP-SC431-2-02"
      description: "Unit tests for UsageService exist and pass"
      verify: "test -f /Volumes/Samsung_T5/dev/expat-hunter/apps/api/tests/unit/services/usage_service.spec.ts && echo 'EXISTS'"
      tier: 1

edge_cases:
  - description: "User upgraded from free to premium mid-session"
    handling: "checkQuota reads plan from DB at each call — upgrade takes effect immediately"
  - description: "Counter increment fails (DB error)"
    handling: "Fail open for the action but log warning — don't block user on counter failure"
  - description: "User has exactly 0 remaining"
    handling: "Return quota: { used: 5, limit: 5, remaining: 0 } — next request blocked"
  - description: "Free user with 4 results already — sourcing finds 3 more"
    handling: "Only the first result (up to limit) is saved. Hunter limit=5 handles this at API level."

depends_on: ["sc-431-1"]

notes: |
  Hunter API already has a limit parameter — we just need to pass FREE_QUOTAS.results for free users.
  AI analysis (analysis_service.ts) should check plan before calling OpenRouter — skip for free.
  Notification for approaching limits: include remaining count in every quota-gated API response.

definition_of_done:
  - "UsageService with full CRUD"
  - "Sourcing + email controllers enforce quotas"
  - "Hunter API limited to 5 for free users"
  - "AI analysis skipped for free users"
  - "Quota info in API responses"
  - "Unit tests passing"
  - "0 TS errors"
  - "PR merged"
