    - "apps/api/tests/unit/services/dashboard_service.spec.ts — aggregation logic"
    - "apps/api/tests/unit/services/contact_movement_service.spec.ts — state transitions"
    - "apps/api/tests/unit/services/cv_parser_service.spec.ts — file type routing"
    - "apps/api/tests/unit/services/chat_assistant_service.spec.ts — intent detection, FAQ matching"
    - "apps/api/tests/unit/services/reply_generation_service.spec.ts — prompt construction"
    - "apps/api/tests/unit/services/tips_service.spec.ts — conditional tip logic"
  files_to_modify:
    - "apps/api/tests/unit/ — fix any broken imports or skip/todo without BUG: comments (audit findings)"
  files_to_read:
    - "apps/api/app/services/expat_scoring_service.ts"
    - "apps/api/app/services/dashboard_service.ts"
    - "apps/api/app/services/contact_movement_service.ts"
    - "apps/api/app/services/cv_parser_service.ts"
    - "apps/api/app/services/chat_assistant_service.ts"
    - "apps/api/app/services/reply_generation_service.ts"
