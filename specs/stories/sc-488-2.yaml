story:
  id: "sc-488-2"
  title: "Audit test quality + write unit tests for core business logic services"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "L"
  refined_at: "2026-03-30"
  refined_by: "refinement"

user_story: >
  As a developer, I want comprehensive unit tests for all services containing
  business logic, and a clear audit of existing test quality,
  so that regressions are caught before deployment and the test suite is trustworthy.

