acceptance_criteria:

  functional:
    # === AUDIT (ex sc-488-1) ===
    - id: "AC-FUNC-488-2-00"
      description: "Given existing unit tests / When running the suite / Then all tests execute without module resolution errors and pass"
      verify: "cd apps/api && NODE_ENV=test DB_DATABASE=expat_hunter_test node --loader ts-node/esm bin/test.ts --tags=unit 2>&1 | tail -5"
      tier: 2

    - id: "AC-FUNC-488-2-00b"
      description: "Given all existing test files / When checking / Then no tests use .skip() or .todo() without a BUG: comment"
      verify: "grep -rn '\\.skip\\|test\\.todo\\|it\\.todo' apps/api/tests/ | grep -v 'BUG:' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    # === NEW TESTS ===
    - id: "AC-FUNC-488-2-01"
      description: "Given expat_scoring_service / When running tests / Then scoreVisa, scoreRole, scoreHiring, scoreExpatFriendly, scoreMomentum each have at least 2 test cases"
      verify: "grep -c 'test\\|it(' apps/api/tests/unit/services/expat_scoring_service.spec.ts | awk '{if($1>=10) print \"PASS\"; else print \"FAIL: need 10+ tests\"}'"
      tier: 1

    - id: "AC-FUNC-488-2-02"
      description: "Given dashboard_service / When running tests / Then response rate calculation and aggregation are tested"
      verify: "test -f apps/api/tests/unit/services/dashboard_service.spec.ts && grep -q 'responseRate\\|response_rate\\|emailsSent\\|replies' apps/api/tests/unit/services/dashboard_service.spec.ts && echo PASS"
      tier: 1

    - id: "AC-FUNC-488-2-03"
      description: "Given contact_movement_service / When running tests / Then state transitions and edge cases are tested"
      verify: "test -f apps/api/tests/unit/services/contact_movement_service.spec.ts && grep -c 'test\\|it(' apps/api/tests/unit/services/contact_movement_service.spec.ts | awk '{if($1>=5) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-488-2-04"
      description: "Given chat_assistant_service / When running tests / Then detectIntent, findFaqMatch, detectActions are tested"
      verify: "test -f apps/api/tests/unit/services/chat_assistant_service.spec.ts && grep -q 'detectIntent\\|findFaqMatch\\|detectActions' apps/api/tests/unit/services/chat_assistant_service.spec.ts && echo PASS"
      tier: 1

    - id: "AC-FUNC-488-2-05"
      description: "Given tips_service / When running tests / Then all 4 tip methods are tested with multiple stat variations"
      verify: "test -f apps/api/tests/unit/services/tips_service.spec.ts && grep -c 'test\\|it(' apps/api/tests/unit/services/tips_service.spec.ts | awk '{if($1>=8) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-FUNC-488-2-06"
      description: "Given all new test files / When running the full unit test suite / Then all tests pass"
      verify: "cd apps/api && NODE_ENV=test DB_DATABASE=expat_hunter_test node --loader ts-node/esm bin/test.ts --tags=unit 2>&1 | tail -5"
      tier: 2

    - id: "AC-FUNC-488-2-07"
      description: "Given cv_parser_service / When running tests / Then file type routing (PDF, DOCX, unsupported) is tested"
      verify: "test -f apps/api/tests/unit/services/cv_parser_service.spec.ts && grep -q 'pdf\\|docx\\|unsupported' apps/api/tests/unit/services/cv_parser_service.spec.ts && echo PASS"
      tier: 1

    - id: "AC-FUNC-488-2-08"
      description: "Given reply_generation_service / When running tests / Then prompt construction with preset parameters is tested"
      verify: "test -f apps/api/tests/unit/services/reply_generation_service.spec.ts && grep -c 'test\\|it(' apps/api/tests/unit/services/reply_generation_service.spec.ts | awk '{if($1>=3) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

  security: []

  best_practices:
    - id: "AC-BP-488-2-01"
      description: "Given all new test files / When reviewing / Then every numeric assertion has an ORACLE comment block within 5 lines above it"
      verify: "grep -n 'toEqual\\|toBe\\|approx' apps/api/tests/unit/services/expat_scoring_service.spec.ts | head -5"
      tier: 1

    - id: "AC-BP-488-2-02"
      description: "Given all new tests / When reviewing / Then tests call real production functions, not just assert mock return values"
      verify: "grep -rn 'import.*from.*app/services' apps/api/tests/unit/services/expat_scoring_service.spec.ts apps/api/tests/unit/services/tips_service.spec.ts apps/api/tests/unit/services/chat_assistant_service.spec.ts | wc -l | awk '{if($1>=3) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-BP-488-2-03"
      description: "Given all new tests / When reviewing / Then no test uses .skip() or .todo() without a BUG: comment"
      verify: "grep -rn '\\.skip\\|test\\.todo' apps/api/tests/unit/services/expat_scoring_service.spec.ts apps/api/tests/unit/services/dashboard_service.spec.ts apps/api/tests/unit/services/tips_service.spec.ts | grep -v 'BUG:' | wc -l | awk '{if($1==0) print \"PASS\"; else print \"FAIL\"}'"
      tier: 1

    - id: "AC-BP-488-2-04"
      description: "Given the audit / When listing untested services / Then the PR description documents which services remain untested (deferred to sc-488-3)"
      verify: "bash -c 'for f in apps/api/app/services/*.ts; do base=$(basename \"$f\" .ts); if ! find apps/api/tests -name \"*${base}*\" 2>/dev/null | grep -q .; then echo \"UNTESTED: $base\"; fi; done | wc -l'"
      tier: 1

edge_cases:
  - description: "Scoring functions depend on visa registry data"
    handling: "Mock visaRegistry, test scoring logic in isolation"
  - description: "Chat FAQ matching uses word overlap — edge case with empty strings"
    handling: "Test with empty query, single word, exact match, no match"
  - description: "Tips service returns different tips based on stats — many branches"
    handling: "Test each branch condition with minimal stat objects"
  - description: "Dashboard response rate division by zero when no emails sent"
    handling: "Test with emailsSent=0, expect 0% rate"

test_intentions:
  - function: "ExpatScoringService.scoreVisa"
    description: "Score a company known as visa sponsor"
    inputs:
      company_name: "Xero"
      visa_sponsor: true
    oracle:
      final: "visa_sponsor = true → score = high (e.g., 80-100 depending on implementation)"
    assertions:
      - "result.visa >= 80"
    edge_cases:
      - description: "Unknown company, not in visa registry"
        inputs: { company_name: "UnknownCorp", visa_sponsor: false }
        oracle: { final: "visa_sponsor = false → score = 0 or low default" }
        assertions: ["result.visa <= 20"]

  - function: "DashboardService.getStats"
    description: "Response rate calculation"
    inputs:
      emails_sent: 10
      replies: 3
    oracle:
      final: "responseRate = (replies / emailsSent) * 100 = (3 / 10) * 100 = 30"
    assertions:
      - "result.responseRate == 30"
    edge_cases:
      - description: "Zero emails sent"
        inputs: { emails_sent: 0, replies: 0 }
        oracle: { final: "responseRate = 0 (guard against division by zero)" }
        assertions: ["result.responseRate == 0"]

  - function: "ContactMovementService.toMinDays"
    description: "Convert time unit to minimum days"
    inputs:
      value: 2
      unit: "weeks"
    oracle:
      final: "toMinDays(2, 'weeks') = 2 * 7 = 14"
    assertions:
      - "result == 14"
    edge_cases:
      - description: "Days unit"
        inputs: { value: 5, unit: "days" }
        oracle: { final: "toMinDays(5, 'days') = 5" }
        assertions: ["result == 5"]
      - description: "Months unit"
        inputs: { value: 1, unit: "months" }
        oracle: { final: "toMinDays(1, 'months') = 30" }
        assertions: ["result == 30"]

depends_on: []

notes: |
  MERGED: this story now includes the audit work from sc-488-1.
  The shared package builds cleanly (dist/ exists). No module resolution blocker.

  Current state (2026-03-30):
  - 34 unit test files, ~463 test cases
  - 13/34 services untested (38%)
  - This story covers 7 of those 13 (core business logic)
  - Remaining 6 (I/O services) are in sc-488-3

  Priority order for implementation:
  1. Run existing suite first, fix any skip/todo violations (audit)
  2. expat_scoring_service — complex formulas, highest risk
  3. tips_service — pure logic, no mocking needed, quick win
  4. chat_assistant_service — string analysis, moderate complexity
  5. contact_movement_service — state transitions
  6. dashboard_service — DB aggregation (mock queries)
  7. cv_parser_service — file routing
  8. reply_generation_service — prompt templates

  Pattern: follow existing test style in confidence_score_service.spec.ts.
  All tests must use Japa test runner (not Vitest) for backend.

