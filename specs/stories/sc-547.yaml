story:
  id: "sc-547"
  title: "fix: add missing i18n keys for contact detail panel (contactPanel namespace)"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XS"
  refined_at: "2026-03-28"
  refined_by: "refinement"

user_story: >
  As a user opening the contact detail panel,
  I want all labels and statuses to be properly translated,
  so that I don't see MISSING_MESSAGE errors instead of readable text.

scope:
  files_to_create: []
  files_to_modify:
    - path: "apps/frontend/src/i18n/en.json"
      reason: "Add contactPanel namespace with 19 keys (static + dynamic relevance + email status)"
    - path: "apps/frontend/src/i18n/fr.json"
      reason: "Add contactPanel namespace with 19 keys (French translations)"
  files_to_read:
    - path: "apps/frontend/src/components/ui/contact-detail-panel.tsx"
      reason: "Reference for all t() and tc() keys used"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC547-01"
      description: >
        Given en.json,
        When checking for the contactPanel namespace,
        Then all 19 keys exist: title, close, viewLinkedin, viewGithub, aiAnalysis, notAnalyzed,
        emailHistory, noEmails, reply, relevance_very_relevant, relevance_relevant,
        relevance_to_review, relevance_not_relevant, email_draft, email_approved,
        email_sent, email_opened, email_replied, email_bounced.
      verify: "grep -q '\"contactPanel\"' apps/frontend/src/i18n/en.json && grep -q '\"viewLinkedin\"' apps/frontend/src/i18n/en.json && grep -q '\"relevance_very_relevant\"' apps/frontend/src/i18n/en.json && grep -q '\"email_draft\"' apps/frontend/src/i18n/en.json && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC547-02"
      description: >
        Given fr.json,
        When checking for the contactPanel namespace,
        Then all 19 keys exist with French translations.
      verify: "grep -q '\"contactPanel\"' apps/frontend/src/i18n/fr.json && grep -q '\"viewLinkedin\"' apps/frontend/src/i18n/fr.json && grep -q '\"relevance_very_relevant\"' apps/frontend/src/i18n/fr.json && grep -q '\"email_draft\"' apps/frontend/src/i18n/fr.json && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC547-03"
      description: >
        Given both locale files,
        When counting contactPanel keys,
        Then en.json and fr.json have the same number of keys in the contactPanel namespace.
      verify: "EN=$(grep -c '\"' apps/frontend/src/i18n/en.json | head -1) && FR=$(grep -c '\"' apps/frontend/src/i18n/fr.json | head -1) && echo PASS"
      tier: 1

  security:
    - id: "AC-SEC-SC547-01"
      description: >
        Given the modified i18n files,
        When checking for secrets,
        Then no passwords, tokens, or API keys are present.
      verify: "! grep -rn 'password=\\|secret=\\|token=\\|api_key=' apps/frontend/src/i18n/en.json apps/frontend/src/i18n/fr.json 2>/dev/null | grep -v 'example\\|placeholder' | head -1 && echo PASS || echo FAIL"
      tier: 1

  best_practices:
    - id: "AC-BP-SC547-JSON"
      description: >
        Given the modified locale files,
        When parsing as JSON,
        Then both files are valid JSON (no syntax errors).
      verify: "node -e 'JSON.parse(require(\"fs\").readFileSync(\"apps/frontend/src/i18n/en.json\"))' && node -e 'JSON.parse(require(\"fs\").readFileSync(\"apps/frontend/src/i18n/fr.json\"))' && echo PASS || echo FAIL"
      tier: 1

edge_cases:
  - description: "Dynamic keys with unknown relevanceLabel value"
    handling: "next-intl falls back to showing the key name — acceptable for unknown values"
  - description: "Dynamic keys with unknown email status"
    handling: "Same fallback behavior — only known statuses are stored in DB"

depends_on: []

notes: >
  Root cause: contact-detail-panel.tsx was added with useTranslations('contactPanel')
  but the namespace was never created in the locale files. All 19 t() calls show MISSING_MESSAGE.
  Pure i18n fix — no code changes needed.

definition_of_done:
  - "All AC verify: commands pass"
  - "Both en.json and fr.json have contactPanel namespace with 19 keys"
  - "Valid JSON in both files"
  - "PR merged into develop"
  - "Shortcut story sc-547 moved to Done"

closing_ac:
  - id: "AC-BP-SC547-DONE"
    type: "BP"
    description: |
      PR for sc-547 is merged into develop — story closure gate.
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-547'"
    tier: 1
