# Story: job-custom-platforms
# Epic: E14 — Automatisation
# Estimate: M (3 pts)
# Priority: should-have
# Depends on: job-search-config (validated), job-scraping-pipeline (validated)

user_story: |
  As a user searching for jobs in a specific country,
  I want to add custom job platforms (URLs) to my search configuration,
  and see platform suggestions based on my target country,
  so that I can discover offers on niche local boards not covered by default scrapers.

context: |
  Currently only 4 platforms are supported (seek, linkedin, builtin, zeil) as hardcoded
  in SUPPORTED_PLATFORMS. Users can select from these in the search form.
  This story adds: (1) a custom_platforms table for user-defined platforms,
  (2) a suggestions API that recommends platforms per country (Apify actors catalog),
  (3) UI for managing custom platforms in the /recherche-offres page.
  Custom platforms are scraped via a generic Apify web scraper actor.

scope:
  files_to_create:
    - apps/api/database/migrations/44_create_custom_platforms_table.ts
    - apps/api/app/models/custom_platform.ts
    - apps/api/app/services/custom_platform_service.ts
    - apps/api/app/controllers/custom_platforms_controller.ts
    - apps/api/app/validators/custom_platform_validator.ts
    - apps/api/start/routes/custom_platforms.ts
    - apps/api/tests/unit/services/custom_platform_service.spec.ts
    - packages/shared/src/types/custom-platform.ts
    - packages/shared/src/constants/platform-suggestions.ts    # Country → suggested platforms mapping
    - apps/frontend/src/components/job-search/custom-platform-form.tsx
    - apps/frontend/src/components/job-search/custom-platform-form.test.tsx
    - apps/frontend/src/components/job-search/custom-platform-list.tsx
    - apps/frontend/src/hooks/use-custom-platforms.ts
    - apps/frontend/src/lib/custom-platform-api.ts
    - e2e/tests/custom-platforms.spec.ts
  files_to_modify:
    - apps/frontend/src/app/recherche-offres/page.tsx           # Add custom platforms section
    - apps/frontend/src/i18n/en.json                             # i18n keys
    - apps/frontend/src/i18n/fr.json                             # i18n keys
    - packages/shared/src/index.ts                               # Export new types + constants
    - apps/api/start/routes.ts                                   # Import custom_platforms routes
  files_to_read:
    - apps/api/app/services/job_scraping_service.ts              # Integration point for custom scrapers
    - apps/api/app/scrapers/job_offer_scraper_registry.ts        # Registry pattern
    - stacks/typescript-adonisjs.md                              # Backend conventions

components:
  reuse: []
  create:
    - name: "CustomPlatformForm"
      type: dumb
      reason: "Name + URL input for adding a custom platform"
    - name: "CustomPlatformList"
      type: dumb
      reason: "List of user's custom platforms with delete action"

acceptance_criteria:
  # --- FUNCTIONAL ---
  - id: "AC-FUNC-JCP-01"
    type: "FUNC"
    description: "Given a user / When they POST a custom platform with name and URL / Then it is saved and returned with an ID"
    verify: "grep -n 'async store\\|async create' apps/api/app/controllers/custom_platforms_controller.ts apps/api/app/services/custom_platform_service.ts"
    tier: 1

  - id: "AC-FUNC-JCP-02"
    type: "FUNC"
    description: "Given a user / When they GET /api/custom-platforms / Then only their platforms are returned"
    verify: "grep -n 'userId\\|user_id' apps/api/app/services/custom_platform_service.ts | head -5"
    tier: 1

  - id: "AC-FUNC-JCP-03"
    type: "FUNC"
    description: "Given a user / When they DELETE a custom platform / Then it is removed from their list"
    verify: "grep -n 'async destroy\\|async remove' apps/api/app/controllers/custom_platforms_controller.ts apps/api/app/services/custom_platform_service.ts"
    tier: 1

  - id: "AC-FUNC-JCP-04"
    type: "FUNC"
    description: "Given a country code / When GET /api/platforms/suggestions?country=NZ / Then suggested platforms for NZ are returned"
    verify: "grep -n 'suggestions\\|PLATFORM_SUGGESTIONS\\|country' apps/api/app/controllers/custom_platforms_controller.ts packages/shared/src/constants/platform-suggestions.ts"
    tier: 1

  - id: "AC-FUNC-JCP-05"
    type: "FUNC"
    description: "Given a duplicate platform URL for the same user / When they POST / Then 409 Conflict is returned"
    verify: "grep -n 'DUPLICATE\\|unique\\|conflict\\|409' apps/api/app/services/custom_platform_service.ts apps/api/database/migrations/44_create_custom_platforms_table.ts"
    tier: 1

  - id: "AC-FUNC-JCP-06"
    type: "FUNC"
    description: "Given the custom platform form / When name and URL are filled / Then the add button is enabled"
    verify: "grep -n 'data-testid.*custom-platform-add\\|disabled.*name\\|disabled.*url' apps/frontend/src/components/job-search/custom-platform-form.tsx"
    tier: 1

  - id: "AC-FUNC-JCP-07"
    type: "FUNC"
    description: "Given an invalid URL (no http/https) / When submitted / Then validation error is shown"
    verify: "grep -n 'url.*vine\\.string\\|url.*regex\\|vine\\.compile' apps/api/app/validators/custom_platform_validator.ts"
    tier: 1

  - id: "AC-FUNC-JCP-08"
    type: "FUNC"
    description: "Given the frontend / When custom platforms exist / Then they appear in a list with delete buttons"
    verify: "grep -n 'data-testid.*custom-platform-item\\|data-testid.*custom-platform-delete' apps/frontend/src/components/job-search/custom-platform-list.tsx"
    tier: 1

  # --- SECURITY ---
  - id: "AC-SEC-JCP-01"
    type: "SEC"
    description: "All custom platform routes require auth middleware"
    verify: "grep -n 'middleware.auth' apps/api/start/routes/custom_platforms.ts"
    tier: 1

  - id: "AC-SEC-JCP-02"
    type: "SEC"
    description: "URL field is validated — only http/https allowed, no javascript: or data: URIs"
    verify: "grep -n 'http\\|https\\|url\\|regex' apps/api/app/validators/custom_platform_validator.ts"
    tier: 1

  - id: "AC-SEC-JCP-03"
    type: "SEC"
    description: "All DB queries scoped to userId — no cross-user data access"
    verify: "grep -n 'userId' apps/api/app/services/custom_platform_service.ts | wc -l | awk '{if ($1 >= 3) print \"PASS: userId scoped\"; else print \"FAIL: missing userId scope\"}'"
    tier: 1

  # --- BEST PRACTICES ---
  - id: "AC-BP-JCP-TESTID"
    type: "BP"
    description: "All interactive elements have data-testid attributes"
    verify: "grep -c 'data-testid' apps/frontend/src/components/job-search/custom-platform-form.tsx apps/frontend/src/components/job-search/custom-platform-list.tsx | awk -F: '{sum+=$2} END {if (sum >= 6) print \"PASS: \"sum\" testids\"; else print \"FAIL: only \"sum\" testids\"}'"
    tier: 1

  - id: "AC-BP-JCP-I18N"
    type: "BP"
    description: "All user-visible text uses i18n (no hardcoded strings)"
    verify: "! grep -n \"'[A-Z][a-z].*'\" apps/frontend/src/components/job-search/custom-platform-form.tsx apps/frontend/src/components/job-search/custom-platform-list.tsx | grep -v 'import\\|test\\|spec\\|//\\|data-testid\\|className\\|http'"
    tier: 1

  - id: "AC-BP-JCP-DESIGN"
    type: "BP"
    description: "CSS uses design system variables only — no hardcoded Tailwind colors"
    verify: "! grep -En 'text-(red|blue|green|gray|slate|zinc|neutral|stone|orange|amber|yellow|lime|emerald|teal|cyan|sky|indigo|violet|purple|fuchsia|pink|rose)-[0-9]' apps/frontend/src/components/job-search/custom-platform-form.tsx apps/frontend/src/components/job-search/custom-platform-list.tsx"
    tier: 1

  - id: "AC-BP-JCP-COMPILE"
    type: "BP"
    description: "Project compiles without errors"
    verify: "cd apps/api && npx tsc --noEmit 2>&1 | tail -1 && cd ../frontend && npx tsc --noEmit 2>&1 | tail -1"
    tier: 1

  - id: "AC-BP-JCP-TU"
    type: "BP"
    description: "All unit tests pass"
    verify: "cd apps/api && node --import tsx/esm bin/test.ts 2>&1 | tail -5"
    tier: 2

  - id: "AC-BP-JCP-CONSOLE"
    type: "BP"
    description: "Zero console errors/stacktraces"
    verify: "runtime-only"
    tier: 3

test_intentions:
  - function: CustomPlatformService.create
    description: "Creates a custom platform for a user"
    inputs:
      userId: "user-1"
      payload: { name: "TradeMe Jobs", url: "https://trademe.co.nz/jobs", country: "NZ" }
    oracle:
      final: "Platform created with id, userId=user-1, name=TradeMe Jobs, url as given"
    assertions:
      - "result.name == 'TradeMe Jobs'"
      - "result.url == 'https://trademe.co.nz/jobs'"
      - "result.userId == 'user-1'"
    edge_cases:
      - description: "duplicate URL for same user"
        inputs: { userId: "user-1", payload: { name: "Dupe", url: "https://trademe.co.nz/jobs" } }
        oracle: { final: "throws DUPLICATE_PLATFORM error" }
        assertions: ["error.code == 'DUPLICATE_PLATFORM'"]
      - description: "same URL different user is allowed"
        inputs: { userId: "user-2", payload: { name: "TradeMe", url: "https://trademe.co.nz/jobs" } }
        oracle: { final: "creates successfully — unique is per user" }
        assertions: ["result.userId == 'user-2'"]

  - function: PLATFORM_SUGGESTIONS
    description: "Returns suggested platforms per country code"
    inputs:
      country: "NZ"
    oracle:
      final: "NZ suggestions include TradeMe Jobs, Seek NZ, MyJobSpace"
    assertions:
      - "suggestions.length >= 2"
      - "suggestions.some(s => s.name.includes('TradeMe'))"
    edge_cases:
      - description: "unknown country returns empty suggestions"
        inputs: { country: "XX" }
        oracle: { final: "empty array" }
        assertions: ["suggestions.length == 0"]

  - function: CustomPlatformForm
    description: "Form enables add button only when name and URL are filled"
    inputs:
      name: ""
      url: ""
    oracle:
      final: "empty inputs → button disabled"
    assertions:
      - "screen.getByTestId('custom-platform-add-btn').disabled == true"
    edge_cases:
      - description: "both fields filled"
        inputs: { name: "MyBoard", url: "https://myboard.com" }
        oracle: { final: "button enabled" }
        assertions: ["screen.getByTestId('custom-platform-add-btn').disabled == false"]

edge_cases:
  - "User adds platform with trailing slash — normalize URL before uniqueness check"
  - "User deletes a platform that was used in a past search run — soft reference, no cascade issues"
  - "Free user max 3 custom platforms, premium unlimited"
  - "Very long platform name (>255 chars) — validator truncates or rejects"
  - "Platform URL with query params or fragments — preserved as-is"

dependencies:
  - "job-search-config (validated)"

