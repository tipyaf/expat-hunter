id: "job-custom-platforms"
shortcut_id: "sc-1052"
epic: "E14"
title: "Job Custom Platforms — User-defined scraping targets + suggestions"
status: "building"
estimate: 3
type: "feature"
area: "fullstack"

scope:
  backend:
    - "apps/api/database/migrations/44_create_custom_platforms_table.ts"
    - "apps/api/app/models/custom_platform.ts"
    - "apps/api/app/services/custom_platform_service.ts"
    - "apps/api/app/validators/custom_platform_validator.ts"
    - "apps/api/app/controllers/custom_platforms_controller.ts"
    - "apps/api/start/routes/custom_platforms.ts"
    - "apps/api/start/routes.ts"
    - "apps/api/tests/unit/services/custom_platform_service.spec.ts"
  frontend:
    - "apps/frontend/src/components/job-search/custom-platform-form.tsx"
    - "apps/frontend/src/components/job-search/custom-platform-list.tsx"
    - "apps/frontend/src/hooks/use-custom-platforms.ts"
    - "apps/frontend/src/lib/custom-platform-api.ts"
    - "apps/frontend/src/app/recherche-offres/page.tsx"
    - "apps/frontend/src/i18n/en.json"
    - "apps/frontend/src/i18n/fr.json"
    - "apps/frontend/src/components/job-search/custom-platform-form.test.tsx"
  shared:
    - "packages/shared/src/types/custom-platform.ts"
    - "packages/shared/src/constants/platform-suggestions.ts"
    - "packages/shared/src/index.ts"

acceptance_criteria:
  - id: "AC-FUNC-JCP-01"
    type: "FUNC"
    description: "Given valid name+url / When POST /api/custom-platforms / Then platform created with correct fields"
    verify: "grep -q 'create: saves a custom platform and returns it' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-02"
    type: "FUNC"
    description: "Given two users / When GET /api/custom-platforms / Then each user sees only their own platforms"
    verify: "grep -q 'list: returns only platforms for the given userId' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-03"
    type: "FUNC"
    description: "Given a platform exists / When DELETE /api/custom-platforms/:id / Then platform removed"
    verify: "grep -q 'remove: deletes platform for the correct user' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-04"
    type: "FUNC"
    description: "Given country NZ / When GET /api/platforms/suggestions?country=NZ / Then returns suggestions including TradeMe"
    verify: "grep -q 'getSuggestions: returns platforms for known country' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-05"
    type: "FUNC"
    description: "Given same URL already exists for user / When POST /api/custom-platforms / Then 409 DUPLICATE_PLATFORM"
    verify: "grep -q 'duplicate URL for same user returns 409 DUPLICATE_PLATFORM' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-06"
    type: "FUNC"
    description: "Given empty inputs / When page loads / Then add button is disabled; When both filled / Then enabled"
    verify: "grep -q 'add button is disabled when inputs are empty' apps/frontend/src/components/job-search/custom-platform-form.test.tsx && grep -q 'add button is enabled when both name and url are filled' apps/frontend/src/components/job-search/custom-platform-form.test.tsx && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-07"
    type: "FUNC"
    description: "Given invalid URL (no http/https) / When form submitted / Then error message shown"
    verify: "grep -q 'shows error for invalid URL' apps/frontend/src/components/job-search/custom-platform-form.test.tsx && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-08"
    type: "FUNC"
    description: "Given platforms exist / When rendered / Then list with Globe icon and delete buttons"
    verify: "grep -q 'custom-platform-list' apps/frontend/src/components/job-search/custom-platform-list.tsx && grep -q 'custom-platform-delete-btn' apps/frontend/src/components/job-search/custom-platform-list.tsx && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-09"
    type: "FUNC"
    description: "Given free user with FREE_MAX_CUSTOM_PLATFORMS / When creating one more / Then 403 QUOTA_EXCEEDED"
    verify: "grep -q 'free user limited to FREE_MAX_CUSTOM_PLATFORMS' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-10"
    type: "FUNC"
    description: "Given premium user / When creating beyond free limit / Then succeeds"
    verify: "grep -q 'premium user can exceed free limit' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-11"
    type: "FUNC"
    description: "Given URL with trailing slash / When POST / Then URL normalized (slash stripped)"
    verify: "grep -q 'normalizes URL by stripping trailing slash' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-12"
    type: "FUNC"
    description: "Given same URL different user / When POST / Then succeeds (unique per user)"
    verify: "grep -q 'same URL different user is allowed' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-13"
    type: "FUNC"
    description: "Given user B tries to delete user A platform / When DELETE / Then 404"
    verify: "grep -q 'user cannot delete another user platform' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-14"
    type: "FUNC"
    description: "Given unknown country / When getSuggestions / Then empty array"
    verify: "grep -q 'getSuggestions: returns empty for unknown country' apps/api/tests/unit/services/custom_platform_service.spec.ts && echo PASS"
    tier: 1

  - id: "AC-FUNC-JCP-15"
    type: "FUNC"
    description: "Given isSubmitting prop / When rendered / Then button shows Adding... text"
    verify: "grep -q 'shows submitting state' apps/frontend/src/components/job-search/custom-platform-form.test.tsx && echo PASS"
    tier: 1

  - id: "AC-SEC-JCP-01"
    type: "SEC"
    description: "All custom platform routes are protected by auth middleware"
    verify: "grep -q 'middleware.*auth' apps/api/start/routes/custom_platforms.ts && echo PASS"
    tier: 1

  - id: "AC-SEC-JCP-02"
    type: "SEC"
    description: "VineJS validator enforces URL format and max lengths"
    verify: "grep -q 'vine.string' apps/api/app/validators/custom_platform_validator.ts && grep -q 'url()' apps/api/app/validators/custom_platform_validator.ts && echo PASS"
    tier: 1

test_intentions:
  backend:
    - "PLATFORM_SUGGESTIONS: NZ includes TradeMe"
    - "PLATFORM_SUGGESTIONS: unknown country returns undefined"
    - "PLATFORM_SUGGESTIONS: AU has at least 2 suggestions"
    - "create: saves platform with correct fields"
    - "create: normalizes URL (strips trailing slash)"
    - "create: duplicate URL same user → 409 DUPLICATE_PLATFORM"
    - "create: same URL different user → allowed"
    - "create: free user limit enforced → 403 QUOTA_EXCEEDED"
    - "create: premium user can exceed free limit"
    - "list: returns only user's own platforms"
    - "remove: deletes platform for correct user"
    - "remove: nonexistent ID → 404 NOT_FOUND"
    - "remove: cross-user access blocked → 404"
    - "getSuggestions: known country returns suggestions"
    - "getSuggestions: unknown country returns empty"
    - "getSuggestions: case insensitive (nz → NZ)"
  frontend:
    - "renders form with inputs and add button"
    - "add button disabled when inputs empty"
    - "add button enabled when both filled"
    - "shows error for invalid URL"
    - "shows submitting state"
