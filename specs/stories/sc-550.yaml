# =============================================================================
# STORY FILE — sc-550: One-click email account connection via Google OAuth
# =============================================================================
# This is the BUILD CONTRACT. The developer implements exactly this.
# The validator checks exactly this. Nothing more, nothing less.
# =============================================================================

story:
  id: "sc-550"
  name: "One-click email account connection via Google OAuth"
  parent: null
  type: "feature"
  priority: "high"
  estimate: 5  # L — OAuth flow + migration + token refresh + frontend UX
  created_at: "2026-03-28"

  user_story: >
    As a user on the email connection settings page,
    I want to connect my Gmail account with one click via Google OAuth,
    so that I don't have to manually enter IMAP/SMTP credentials.
    The OAuth method becomes the default; manual IMAP/SMTP remains as an alternative.

  context: >
    The current email connection page (/parametres/connexion-email) only supports
    manual IMAP/SMTP credentials. Google OAuth already exists for login (@adonisjs/ally).
    We reuse the same OAuth library but request Gmail scopes (send + read) to obtain
    an access token used as XOAUTH2 credential for SMTP/IMAP — no Gmail API dependency.
    This keeps the existing email sending pipeline intact. Outlook OAuth is a separate
    follow-up story.

scope:
  included:
    - "Migration: add connectionType, oauthProvider, oauthAccessToken (encrypted), oauthRefreshToken (encrypted), oauthExpiresAt to email_connections"
    - "Backend: new OAuth flow — GET /api/email-connections/oauth/google (redirect) + GET /api/email-connections/oauth/google/callback"
    - "Backend: token refresh logic — refresh access token before SMTP/IMAP use if expired"
    - "Backend: ally config updated with Gmail scopes (gmail.send, gmail.readonly)"
    - "EmailConnection model updated with new columns + encrypted OAuth tokens"
    - "Frontend: email connection page redesigned — OAuth button as primary, manual form as secondary (collapsible)"
    - "Frontend: show connected account info (email, provider icon, connected status)"
    - "Frontend: disconnect button for OAuth connections"
    - "Email sending service: detect connectionType, use XOAUTH2 auth when OAuth"
    - "i18n keys en/fr for OAuth UI"
  excluded:
    - "Outlook / Microsoft OAuth (separate story)"
    - "Yahoo OAuth"
    - "Gmail API usage (we use XOAUTH2 over SMTP/IMAP, not Gmail REST API)"
    - "IMAP sync via OAuth (existing stub unchanged)"
    - "Changes to email generation or template system"

files:
  to_create:
    - path: "apps/api/database/migrations/XXXX_add_oauth_to_email_connections.ts"
      description: "Add connectionType ('manual'|'oauth'), oauthProvider ('google'|null), oauthAccessToken, oauthRefreshToken, oauthExpiresAt columns"
    - path: "apps/api/app/controllers/email_oauth_controller.ts"
      description: "Google OAuth flow for email: redirect + callback. Stores tokens in email_connections. Redirects to frontend settings page with success/error."
    - path: "apps/api/app/services/oauth_token_service.ts"
      description: "Token refresh logic: check expiry, refresh via Google token endpoint, update DB. Used before every SMTP/IMAP operation."
  to_modify:
    - path: "apps/api/app/models/email_connection.ts"
      description: "Add connectionType, oauthProvider, oauthAccessToken (encrypted), oauthRefreshToken (encrypted), oauthExpiresAt columns"
    - path: "apps/api/config/ally.ts"
      description: "Add Gmail scopes to Google OAuth config or create separate 'googleMail' provider with gmail.send + gmail.readonly scopes"
    - path: "apps/api/app/services/email_sending_service.ts"
      description: "Before sending: check connectionType. If oauth, refresh token if needed, use XOAUTH2 auth method for SMTP transport"
    - path: "apps/api/start/routes.ts"
      description: "Add routes: GET /api/email-connections/oauth/google, GET /api/email-connections/oauth/google/callback"
    - path: "apps/frontend/src/app/parametres/connexion-email/page.tsx"
      description: "Redesign: OAuth section (primary) with 'Connect with Google' button + connected state display. Manual section (secondary, collapsible). Disconnect button."
    - path: "apps/frontend/src/hooks/use-email-connection.ts"
      description: "Add OAuth state handling: connected provider info, disconnect method"
    - path: "apps/frontend/src/i18n/en.json"
      description: "Add keys: emailConnection.connectWithGoogle, emailConnection.connectedAs, emailConnection.disconnect, emailConnection.oauthSuccess, emailConnection.oauthError, emailConnection.orManual, emailConnection.manualConfig"
    - path: "apps/frontend/src/i18n/fr.json"
      description: "Same keys in French"
  to_read:
    - path: "apps/api/config/ally.ts"
      description: "Understand existing Google OAuth config"
    - path: "apps/api/app/controllers/auth_controller.ts"
      description: "Reference: existing Google OAuth login flow (redirect + callback pattern)"
    - path: "apps/api/config/mail.ts"
      description: "Understand mail transport config for XOAUTH2 integration"

dependencies:
  - "Google Cloud Console: add Gmail scopes (gmail.send, gmail.readonly) to existing OAuth app"
  - "GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET env vars (already configured for login)"

acceptance_criteria:
  - id: "AC-FUNC-550-01"
    type: "FUNC"
    description: "Given I'm on /parametres/connexion-email / Then I see a 'Connect with Google' button as the primary action"
    verify: "grep -r 'connectWithGoogle\\|connect.*google\\|Connect.*Google' apps/frontend/src/app/parametres/connexion-email/page.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-02"
    type: "FUNC"
    description: "Given I click 'Connect with Google' / Then I'm redirected to Google OAuth consent with Gmail scopes"
    verify: "grep -r 'gmail\\|mail.google\\|email-connections/oauth/google' apps/api/ --include='*.ts' | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-03"
    type: "FUNC"
    description: "Given Google OAuth callback succeeds / Then an email_connection record is created with connectionType='oauth' and encrypted tokens"
    verify: "grep -r 'connectionType.*oauth\\|oauthProvider' apps/api/app/controllers/email_oauth_controller.ts | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-04"
    type: "FUNC"
    description: "Given I have an OAuth connection / Then the settings page shows connected status (email, provider icon) and a Disconnect button"
    verify: "grep -r 'disconnect\\|connectedAs\\|oauthProvider' apps/frontend/src/app/parametres/connexion-email/page.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-05"
    type: "FUNC"
    description: "Given I click Disconnect / Then the OAuth connection is deleted and the page returns to the connect state"
    verify: "grep -r 'disconnect\\|DELETE.*email-connections' apps/frontend/src/hooks/use-email-connection.ts | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-06"
    type: "FUNC"
    description: "The manual IMAP/SMTP form is still available as a secondary collapsible section"
    verify: "grep -r 'imapHost\\|manualConfig\\|orManual' apps/frontend/src/app/parametres/connexion-email/page.tsx | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-07"
    type: "FUNC"
    description: "Given an OAuth email connection exists / When sending emails / Then XOAUTH2 auth is used instead of password auth"
    verify: "grep -r 'xoauth2\\|XOAUTH2\\|oauth.*auth\\|connectionType' apps/api/app/services/email_sending_service.ts | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-08"
    type: "FUNC"
    description: "Given an OAuth token is expired / When sending an email / Then the token is refreshed automatically before sending"
    verify: "grep -r 'refresh.*token\\|oauthExpiresAt\\|isExpired\\|refreshAccessToken' apps/api/app/services/oauth_token_service.ts | grep -q '.'"
    tier: 1

  - id: "AC-FUNC-550-09"
    type: "FUNC"
    description: "Migration adds connectionType, oauthProvider, oauthAccessToken, oauthRefreshToken, oauthExpiresAt to email_connections table"
    verify: "grep -r 'connectionType.*oauthProvider\\|oauthAccessToken\\|oauthRefreshToken\\|oauthExpiresAt' apps/api/database/migrations/ --include='*.ts' | grep -q '.'"
    tier: 1

  - id: "AC-SEC-550-01"
    type: "SEC"
    description: "OAuth tokens (accessToken + refreshToken) are encrypted at rest using AdonisJS encryption service"
    verify: "grep -c 'encryptedColumn\\|encryption.encrypt' apps/api/app/models/email_connection.ts | awk '$1 >= 4'"
    tier: 1

  - id: "AC-SEC-550-02"
    type: "SEC"
    description: "OAuth callback validates state parameter to prevent CSRF"
    verify: "grep -r 'stateMismatch\\|hasError\\|accessDenied' apps/api/app/controllers/email_oauth_controller.ts | grep -q '.'"
    tier: 1

  - id: "AC-SEC-550-03"
    type: "SEC"
    description: "OAuth connection is scoped to current user — no cross-user token access"
    verify: "grep -r 'auth.user\\|userId.*user' apps/api/app/controllers/email_oauth_controller.ts | grep -q '.'"
    tier: 1

  - id: "AC-BP-550-01"
    type: "BP"
    description: "i18n keys for OAuth UI exist in both en.json and fr.json"
    verify: "grep -q 'connectWithGoogle' apps/frontend/src/i18n/en.json && grep -q 'connectWithGoogle' apps/frontend/src/i18n/fr.json"
    tier: 1

  - id: "AC-BP-550-02"
    type: "BP"
    description: "No magic strings — connection types and OAuth providers are named constants"
    verify: "grep -rn 'CONNECTION_TYPE\\|OAUTH_PROVIDER\\|manual.*oauth' apps/api/app/ --include='*.ts' | grep -q 'const\\|enum\\|type'"
    tier: 1

  - id: "AC-BP-550-03"
    type: "BP"
    description: "TypeScript: 0 errors in both frontend and API"
    verify: "cd apps/frontend && pnpm tsc --noEmit 2>&1 | grep -c 'error TS' | grep -q '^0$'"
    tier: 1

edge_cases:
  - "User denies Google OAuth consent → redirect to settings with error message"
  - "Token refresh fails (revoked by user in Google account) → mark connection as inactive, show reconnect prompt"
  - "User already has manual connection → OAuth replaces it (one connection per user)"
  - "User has OAuth connection and tries to save manual config → replaces OAuth with manual"
  - "Google OAuth callback with invalid state → reject with 403"
  - "Network error during token refresh → retry once, then fail gracefully with error logged"
  - "Frontend loads while OAuth callback is processing → loading state"

technical_notes:
  - "Reuse @adonisjs/ally Google driver but with separate config entry ('googleMail') that requests gmail.send + gmail.readonly scopes"
  - "XOAUTH2 auth: nodemailer supports auth.type='OAuth2' with user + accessToken — no password needed"
  - "Token refresh: POST https://oauth2.googleapis.com/token with grant_type=refresh_token + refresh_token + client_id + client_secret"
  - "Access tokens expire after ~1 hour; always check oauthExpiresAt before using"
  - "The ally callback pattern is identical to auth_controller.ts googleCallback — copy and adapt"
  - "Frontend redirect after OAuth: /parametres/connexion-email?oauth=success or ?oauth=error&reason=..."
