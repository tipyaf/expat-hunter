story:
  id: "job-ai-evaluation"
  name: "Job AI Evaluation — Scoring + Exclusion Learning"
  feature: "job-ai-evaluation"
  epic: "E11 — Evaluation & Enrichissement"
  priority: "must-have"
  size: "L"
  estimate: 5
  status: "refined"
  created_at: "2026-04-08"

  user_story: |
    As an expat job seeker,
    I want each scraped job offer to be evaluated by AI against my profile,
    so that I see a relevance score, match summary, and application advice for each offer.

  description: |
    AI evaluation layer for job offers. Creates JobAiEvaluationService (builds prompt
    from candidate profile + offer + exclusion history, calls OpenRouter, parses structured response),
    JobOfferExclusion model (structured reasons: category + freetext), evaluation prompt/parser,
    API routes (POST /api/job-offers/:id/exclude, PUT /api/job-offers/:id/advice,
    GET /api/job-offers/exclusions), and wires evaluation into the post-scraping flow.
    Backend-only — no UI changes.

  depends_on:
    - "job-scraping-pipeline"  # provides JobOffer, JobOfferLink, scraping flow
    - "candidate-profile"       # provides CandidateProfile for evaluation context

  ux_ref: null  # Backend-only, no UI

  adr_required: false

