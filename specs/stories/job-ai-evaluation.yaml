  acceptance_criteria:
    # --- FUNCTIONAL ---
    - id: "AC-FUNC-JAE-01"
      type: "FUNC"
      description: "Given a new job offer and a user profile / When AI evaluation runs / Then the offer gets relevance_score (0-100), match_summary, selection_reason, and application_advice"
      verify: "grep -E 'relevance_score|relevanceScore|match_summary|matchSummary|selection_reason|selectionReason|application_advice|applicationAdvice' apps/api/app/services/job_ai_evaluation_service.ts | wc -l | grep -v '^0$'"
      tier: 1

