  test_intentions:
    - function: "JobAiEvaluationService.evaluateForSearch"
      description: "Batch-evaluate all unevaluated offers for a search"
      inputs:
        searchId: "uuid-of-search"
        userId: "uuid-of-user"
      oracle:
        final: "All new offers get relevance_score, match_summary, selection_reason, application_advice. Already-evaluated offers are skipped."
      assertions:
        - "result.evaluated > 0"
        - "result.skipped >= 0"
        - "result.errors >= 0"
        - "all evaluated offers have relevanceScore != null"
      edge_cases:
        - description: "OpenRouter unavailable"
          inputs: { searchId: "uuid", userId: "uuid" }
          oracle: { final: "offers stay status='new', no crash — fail open" }
          assertions: ["result.errors > 0", "offers.every(o => o.status === 'new')"]
        - description: "Candidate has no profile"
          inputs: { searchId: "uuid", userId: "uuid-no-profile" }
          oracle: { final: "evaluation runs with generic context, lower confidence" }
          assertions: ["result.evaluated > 0"]
        - description: "Offer has no description"
          inputs: { searchId: "uuid", offer: { descriptionRaw: null } }
          oracle: { final: "evaluation runs with title only, notes missing description" }
          assertions: ["result.evaluated > 0"]
        - description: "Very long description (>10k chars)"
          inputs: { searchId: "uuid", offer: { descriptionRaw: "x".repeat(15000) } }
          oracle: { final: "description truncated to MAX_DESCRIPTION_LENGTH before prompt" }
          assertions: ["promptLength < 5000"]

    - function: "JobAiEvaluationService.evaluate"
      description: "Evaluate a single offer with profile and exclusion context"
      inputs:
        offer: { title: "Senior Dev", descriptionRaw: "..." }
        profile: { skills: ["TypeScript"], targetRoles: ["Developer"] }
        exclusions: [{ category: "salary", reason: "Below 100k" }]
      oracle:
        final: "Structured response with relevanceScore 0-100, matchSummary, selectionReason, applicationAdvice"
      assertions:
        - "result.relevanceScore >= 0 && result.relevanceScore <= 100"
        - "result.matchSummary.length > 0"
        - "result.selectionReason.length > 0"
        - "result.applicationAdvice.length > 0"
      edge_cases:
        - description: "OpenRouter returns malformed JSON"
          inputs: { offer: { title: "Dev" }, profile: {} }
          oracle: { final: "parse fallback returns null scores, offer stays 'new'" }
          assertions: ["result === null"]

    - function: "JobOffersController.exclude"
      description: "Exclude an offer with structured reason"
      inputs:
        offerId: "uuid"
        body: { category: "salary", reason: "Below 120k NZD" }
      oracle:
        final: "Offer status becomes 'excluded', JobOfferExclusion record created"
      assertions:
        - "response.status === 200"
        - "response.body.data.status === 'excluded'"
      edge_cases:
        - description: "Invalid category"
          inputs: { body: { category: "invalid", reason: "test" } }
          oracle: { final: "422 validation error" }
          assertions: ["response.status === 422"]
        - description: "Offer belongs to another user"
          inputs: { offerId: "other-user-offer-uuid" }
          oracle: { final: "404 not found" }
          assertions: ["response.status === 404"]

  edge_cases:
    - "OpenRouter returns malformed JSON → parse fallback, keep offer as 'new'"
    - "Candidate has no profile → evaluate with generic context, lower confidence"
    - "Offer has no description → evaluate with title only, note in match_summary"
    - "User excludes an already-evaluated offer → status changes, exclusion stored for future learning"
    - "Very long description (>10k chars) → truncate to MAX_DESCRIPTION_LENGTH for prompt"
    - "All offers in a batch fail evaluation → return error count, no crash"
    - "User excludes with empty reason → category is required, reason can be empty string"
    - "Re-run evaluation on same search → skip already-evaluated offers"

  components:
    reuse:
      - name: "RelevanceAnalyzer pattern"
        path: "apps/api/app/ai/relevance_analyzer.ts"
        note: "Reuse pattern: OpenRouter client → build prompt → parse response"
      - name: "Relevance analysis prompt pattern"
        path: "apps/api/app/ai/prompts/relevance_analysis_prompt.ts"
        note: "Reuse: system/user prompt builder + structured JSON response parser"
      - name: "OpenRouterClient"
        path: "apps/api/app/ai/openrouter_client.ts"
        note: "Reuse: configured OpenRouter client with env-based API key"
    create: []
