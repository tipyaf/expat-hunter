# DÉPENDANCES EXTERNES
# ============================================================================

external_dependencies:

  - service: "Hunter.io"
    usage: "Domain Search (contacts), Email Finder (enrichissement), Company Enrichment (contexte entreprise)"
    current_plan: "Free (25 searches/mois)"
    recommended_plan: "Starter ($34/mois, 500 searches) dès validation MVP"
    already_integrated: true

  - service: "NZ Immigration API"
    usage: "Vérification sponsor visa accrédité"
    cost: "Gratuit"
    already_integrated: true
    known_issue: "Rate limiting non documenté — mitigation en place (sc-31-7)"

  - service: "OpenRouter"
    usage: "Scoring IA et génération SectorProfile via LLM"
    cost: "~0.0002-0.005$ par contact selon modèle"
