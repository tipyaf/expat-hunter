global_acceptance_criteria:

  quality_targets:
    - criterion: "Taux de contacts avec un vrai nom"
      current: "~40%"
      target: "100% — aucun contact générique (Hiring Manager, HR Team) ne passe le filtrage"
      measurable: true

    - criterion: "Taux de contacts opérationnels (non-RH)"
      current: "Non mesuré (mélange non contrôlé)"
      target: ">= 85% des contacts affichés sont opérationnels (si hr_enabled = false)"
      measurable: true

    - criterion: "Taux de couverture email"
      current: "~0%"
      target: ">= 60% des contacts ont un email_status = verified OU probable"
      measurable: true

    - criterion: "Pertinence des contacts (validation humaine)"
      current: "~4% (1/26 pertinent)"
      target: ">= 70% des contacts soumis à l'utilisateur sont jugés 'pertinents' par ce dernier"
      test: "Test utilisateur sur 20 contacts sélectionnés après scoring"

    - criterion: "Richesse contextuelle"
      current: "0 champ contextuel (nom entreprise uniquement)"
      target: ">= 4 champs contextuels par entreprise (description, sector, tech_stack ou équivalent, visa_status)"
      measurable: true

  pipeline_performance:
    - criterion: "Durée d'un sourcing complet (20 entreprises)"
      target: "< 5 minutes pour step_1 + step_3 (identifcation). Step_2 et step_5 peuvent être async."
    - criterion: "Coût Hunter par sourcing (20 entreprises)"
      target: "< 25 calls/sourcing (quota free tier = 25/mois — 1 sourcing complet possible en gratuit)"
    - criterion: "Coût IA par contact scoré"
      target: "< 0.005$ (modèle cheap OpenRouter — ex: Mistral 7B ou Claude Haiku)"

  regression:
    - criterion: "Les sourcings existants ne sont pas cassés"
      target: "Un sourcing Seek NZ IT retourne toujours des résultats après sc-31 (non régression)"
    - criterion: "Le pipeline dashboard continue d'afficher les contacts existants"
      target: "Aucune donnée existante perdue lors des migrations"

