# ============================================================================
# RISQUES ET MITIGATIONS
# ============================================================================

risks:

  - risk: "Hunter quota insuffisant en free tier (25 domain searches/mois)"
    probability: "high"
    impact: "high"
    mitigation: |
      Stratégie de conservation des quotas :
      1. Mettre en cache les résultats Hunter par domaine (TTL: 30 jours)
      2. Ne pas relancer Hunter si les contacts sont déjà en base
      3. Afficher le quota restant dans les settings
      4. Passer au plan payant Hunter ($34/mois pour 500 searches) dès que le MVP est validé
      5. Prioriser les domaines les plus importants (entreprises visa accréditées en premier)

  - risk: "Domain resolver retourne un mauvais domaine (ex: PHQ → phq.com au lieu de phq.nz)"
    probability: "medium"
    impact: "high"
    mitigation: |
      1. Validation du domaine résolu via HTTP check (le site répond ?)
      2. Préférence aux domaines locaux : si pays = NZ, prioriser .nz sur .com
      3. Interface de correction manuelle du domaine dans l'UI entreprise
      4. Log des domaines incorrects détectés pour améliorer le resolver

  - risk: "NZ Immigration API rate limiting instable (400 après plusieurs appels)"
    probability: "medium"
    impact: "medium"
    mitigation: |
      1. Implémenter un retry avec backoff exponentiel (1s, 2s, 4s)
      2. Mettre en cache les résultats par nom entreprise normalisé (TTL: 7 jours)
      3. Queue dédiée avec rate limiting conservateur (1 appel/seconde max)
      4. Fuzzy matching amélioré pour les trading names (Datacom → Datacom Limited)

  - risk: "Certaines entreprises ont une politique anti-scraping agressive sur leur page /team"
    probability: "low"
    impact: "low"
    mitigation: |
      1. Playwright avec delays aléatoires (2-5s entre requêtes)
      2. La page /team est optionnelle — Hunter reste la source primaire
      3. Graceful degradation : si scraping échoue, log + continuer sans ce contact

  - risk: "Coût IA trop élevé si modèles trop chers pour le scoring"
    probability: "low"
    impact: "medium"
    mitigation: |
      1. Utiliser un modèle cheap (Mistral 7B via OpenRouter, ~0.0002$/1k tokens)
      2. Prompt de scoring concis (< 500 tokens input + 200 tokens output = 0.0002$/contact)
      3. Scoring en batch (pas de streaming, optimise le coût)
      4. Cache le score si le contact et le profil candidat n'ont pas changé

