# --- CONTRAINTES ---
constraints:
  performance:
    - "API response < 500ms (hors scraping et IA)"
    - "Le scraping tourne en background (async)"
    - "L'analyse IA tourne en background (async)"
  security:
    - "Mots de passe hashés bcrypt"
    - "JWT pour l'auth API"
    - "Credentials email chiffrés en base"
    - "Pas de secrets dans le code"
    - "Rate limiting sur l'API"
  scraping:
    - "User-agent rotation"
    - "Délais aléatoires entre requêtes (2-10s)"
    - "Support de proxies"
    - "Gestion des captchas (retry + fallback Apify)"
    - "Respect des robots.txt quand applicable"
  ai:
    - "OpenRouter comme provider principal (modèles interchangeables)"
    - "Ollama en fallback futur (quand VPS suffisant)"
    - "Budget IA maîtrisé (batch processing, cache des résultats)"
  deployment:
    target: "vps"  # VPS Hostinger KVM2 existant
    ci_cd: "github-actions"

# --- CONVENTIONS ---
conventions:
  naming:
    files: "kebab-case"  # TypeScript/Next.js convention
    functions: "camelCase"
    components: "PascalCase"
    variables: "camelCase"
    types: "PascalCase"
  git:
    branch_strategy: "github-flow"
    commit_format: "conventional-commits"
  code_style: "biome"

# --- PHASES DE VALIDATION ---
validation:
  after_plan: true
  after_scaffold: true
  after_implement: true
  after_test: true
  after_review: true

# --- CONTEXTE ---
context:
  inspiration: "Lemlist, Apollo.io (mais orienté job search, pas sales)"
  existing_code: ""
  documentation: ""
  notes: |
    - L'outil cible DEUX marchés : le marché CACHÉ (contacts leads, prospection proactive) ET le marché VISIBLE (offres publiées, candidature réactive)
    - Pipeline contacts : on contacte les responsables d'équipes opérationnelles, PAS les RH
    - Pipeline offres : on scrape les plateformes (Seek, LinkedIn, BuiltIn, Zeil...) et l'IA évalue la pertinence
    - Les deux pipelines coexistent avec signalement croisé (badge "vous avez déjà un contact chez cette entreprise")
    - Contacts de recrutement (interlocuteurs dans un process) ≠ contacts leads (prospection marché caché)
    - L'IA doit comprendre à qui elle parle ET qui est le candidat
    - Simplicité extrême pour l'utilisateur malgré la complexité technique
    - MVP mono-user, architecturé pour multi-user
    - Budget 30$/mois max (hosting + APIs)
    - LinkedIn : Apify obligatoire (scraping maison trop risqué), scraping maison + Apify fallback pour les autres
    - Cache global partagé entre utilisateurs : company info (1 an), accreditation (1 an)
    - Les exclusions d'offres (raisons structurées) alimentent le prompt IA pour les évaluations futures
    - CV adapté par remplacements ciblés (max 7), pas de réécriture complète — préserve l'identité du candidat
    - Export PDF pour CV et lettres de motivation, avec édition manuelle avant export
    - LinkedIn messaging : nécessite étude préalable risque/bénéfice
    - Vision long terme : plateforme complète d'aide à l'expatriation
    - Architecture n8n existante (Telegram) sert de référence fonctionnelle mais est remplacée par le SaaS
