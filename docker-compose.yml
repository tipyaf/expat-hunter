services:
  postgres:
    image: postgres:16-alpine
    container_name: expat-hunter-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: expathunter
      POSTGRES_PASSWORD: expathunter
      POSTGRES_DB: expat_hunter_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: expat-hunter-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
