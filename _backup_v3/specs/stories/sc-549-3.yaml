edge_cases:
  - "No presets → dropdown hidden or shows empty state 'Create your first preset'"
  - "No default preset → initial generation uses current hardcoded prompt (backward compatible)"
  - "Default preset exists → automatically applied to generateForContacts and generateOne"
  - "Preset + template + instructions combined → all three sent to prompt (preset = system prompt style, template = content base, instructions = refinement)"
  - "Framework enum values (aida/pas/bab/direct) mapped to specific prompt structures"
  - "Language override → if preset says 'French', the output language changes accordingly"

technical_notes:
  - "Preset parameters affect the SYSTEM prompt (tone, length, framework, language)"
  - "Templates (sc-549-2) affect the USER prompt (content pattern to personalize)"
  - "Instructions (sc-549-1) affect the USER prompt (refinement guidance)"
  - "These three features are orthogonal and composable"
  - "Framework mapping: aida=Attention-Interest-Desire-Action, pas=Problem-Agitate-Solve, bab=Before-After-Bridge, direct=current style"
  - "Length mapping: short=80 words max, medium=150 words max (current), long=250 words max"
