story:
  id: "sc-549-3"
  name: "Generation presets — customize tone/style"
  parent: "sc-549"
  type: "feature"
  priority: "medium"
  estimate: 3  # M — standard feature
  created_at: "2026-03-28"

  user_story: >
    As a user,
    I want to define generation presets (tone, length, framework, language) and apply them
    when editing an email or have my default preset automatically used during initial generation,
    so that generated emails match my preferred communication style.

  context: >
    The GenerationPreset model and CRUD API (/api/presets) already exist but are not connected
    to any frontend or to the email generation flow. The EmailComposer currently uses hardcoded
    prompt parameters (tone, length constraints). This story wires presets into both the modal
    (manual selection) and the initial generation flow (default preset auto-applied).

scope:
  included:
    - "Preset management page at /parametres/presets (CRUD connected to existing API)"
    - "usePresets hook for frontend state management"
    - "Preset selector dropdown in EmailEditModal (from sc-549-1)"
    - "Backend: regenerate endpoint accepts optional presetId, loads preset, injects into system prompt"
    - "Backend: generateForContacts and generateOne load user's default preset and apply to AI prompt"
    - "buildEmailPrompt() accepts preset parameters (tone, length, framework, language, customInstructions)"
    - "Sidebar link to presets settings page"
    - "i18n keys en/fr for preset management and modal"
  excluded:
    - "Email templates (sc-549-2)"
    - "Changes to GenerationPreset model (schema is sufficient as-is)"
    - "Changes to PresetsController CRUD (already working)"

files:
  to_create:
    - path: "apps/frontend/src/app/parametres/presets/page.tsx"
      description: "Preset management page: list presets, create/edit/delete with form for name, length, framework, tone, language, customInstructions, isDefault"
    - path: "apps/frontend/src/hooks/use-presets.ts"
      description: "Hook for CRUD operations on /api/presets: list, create, update, delete"
  to_modify:
    - path: "apps/frontend/src/components/emails/email-edit-modal.tsx"
      description: "Add preset selector dropdown. When selected, passes presetId to regenerate call."
    - path: "apps/frontend/src/components/layout/sidebar.tsx"
      description: "Add link to /parametres/presets in settings section"
    - path: "apps/api/app/controllers/emails_controller.ts"
      description: "regenerate() reads optional presetId from body, passes to service"
    - path: "apps/api/app/services/email_generation_service.ts"
      description: "regenerate() loads GenerationPreset by id if presetId provided. generateForContacts() and generateOne() load user's default preset (isDefault=true). Pass preset data to composer."
    - path: "apps/api/app/ai/email_composer.ts"
      description: "compose() accepts optional preset in options, passes to buildEmailPrompt"
    - path: "apps/api/app/ai/prompts/email_prompt.ts"
      description: "buildEmailPrompt() accepts optional preset parameters. When provided: overrides tone instruction, adjusts length constraint, applies framework structure, sets language."
    - path: "apps/frontend/src/i18n/en.json"
      description: "Add presets namespace keys (title, create, edit, delete, name, length, framework, tone, language, customInstructions, isDefault, selectPreset, noPresets, frameworkOptions)"
    - path: "apps/frontend/src/i18n/fr.json"
      description: "Same keys in French"
  to_read:
    - path: "apps/api/app/models/generation_preset.ts"
      description: "Understand existing model schema and types"
    - path: "apps/api/app/controllers/presets_controller.ts"
      description: "Understand existing CRUD API"

dependencies:
  - "sc-549-1 (EmailEditModal must exist to add preset selector)"
  - "OpenRouter API configured (OPENROUTER_API_KEY env var)"

