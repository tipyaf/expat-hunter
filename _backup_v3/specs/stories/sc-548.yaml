story:
  id: "sc-548"
  title: "fix: contact detail panel not accessible from contacts page"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XS"
  refined_at: "2026-03-28"
  refined_by: "refinement"

user_story: >
  As a user on the Contacts page,
  I want to click on a contact to open the detail panel,
  so that I can see their full information (AI analysis, emails, links) without leaving the page.

scope:
  files_to_create: []
  files_to_modify:
    - path: "apps/frontend/src/app/contacts/page.tsx"
      reason: "Import ContactDetailPanel, add selectedContactId state, make rows clickable, render panel"
  files_to_read:
    - path: "apps/frontend/src/app/suivi/page.tsx"
      reason: "Reference implementation — same pattern with selectedContactId + onCardClick"
    - path: "apps/frontend/src/components/ui/contact-detail-panel.tsx"
      reason: "Component API reference (contactId, onClose)"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC548-01"
      description: >
        Given the /contacts page,
        When I click on a contact row,
        Then the ContactDetailPanel opens showing that contact's details.
      verify: "grep -q 'ContactDetailPanel' apps/frontend/src/app/contacts/page.tsx && grep -q 'selectedContactId' apps/frontend/src/app/contacts/page.tsx && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC548-02"
      description: >
        Given the panel is open,
        When I click the close button or the backdrop,
        Then the panel closes (selectedContactId set to null).
      verify: "grep -q 'setSelectedContactId(null)' apps/frontend/src/app/contacts/page.tsx && echo PASS || echo FAIL"
      tier: 1

    - id: "AC-FUNC-SC548-03"
      description: >
        Given the contacts list,
        When I hover over a contact row,
        Then the cursor indicates it is clickable.
      verify: "grep -q 'cursor-pointer' apps/frontend/src/app/contacts/page.tsx && echo PASS || echo FAIL"
      tier: 1

  security:
    - id: "AC-SEC-SC548-01"
      description: >
        Given contacts/page.tsx,
        When reviewing the code,
        Then no raw user input is injected — only contact.id (UUID) is passed to the panel.
      verify: "! grep -n 'dangerouslySetInnerHTML\\|eval(' apps/frontend/src/app/contacts/page.tsx && echo PASS || echo FAIL"
      tier: 1

  best_practices:
    - id: "AC-BP-SC548-TS"
      description: >
        Given the frontend after changes,
        When running TypeScript check,
        Then no new errors in contacts/page.tsx.
      verify: "cd apps/frontend && pnpm tsc --noEmit 2>&1 | grep 'contacts/page' && echo FAIL || echo PASS"
      tier: 1

edge_cases:
  - description: "Panel already open — click another contact"
    handling: "selectedContactId updates, panel re-renders with new data (native behavior)"
  - description: "Contact without email or LinkedIn"
    handling: "Panel shows empty sections — already handled by ContactDetailPanel"
  - description: "Free user clicks a contact"
    handling: "Panel opens normally — premium gating is on analysis, not on viewing details"

depends_on: []

notes: >
  ContactDetailPanel is already used in suivi/page.tsx with the exact same pattern:
  selectedContactId state + setSelectedContactId on card click + panel at bottom of JSX.
  Pure wiring fix — no component changes needed.

definition_of_done:
  - "All AC verify: commands pass"
  - "No new TypeScript errors"
  - "Contact rows clickable with cursor-pointer"
  - "PR merged into develop"
  - "Shortcut story sc-548 moved to Done"

closing_ac:
  - id: "AC-BP-SC548-DONE"
    type: "BP"
    description: |
      PR for sc-548 is merged into develop — story closure gate.
    verify: "gh pr list --state merged --base develop --json title | grep -q 'sc-548'"
    tier: 1
