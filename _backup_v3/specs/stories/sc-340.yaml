story:
  id: "sc-340"
  shortcut_url: "https://app.shortcut.com/expat-hunter/story/340"
  title: "fix: resolve pre-existing TypeScript errors (profile, contact, routes)"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "XS"
  estimate: 1
  type: "bug"
  refined_at: "2026-03-26"
  refined_by: "refinement"

user_story: >
  As the developer, I want the TypeScript compiler to report 0 errors so that
  the CI is unblocked and type safety is guaranteed across the codebase.

scope:
  files_to_create: []
  files_to_modify:
    - path: "apps/api/app/models/candidate_profile.ts"
      reason: "Add missing @column declarations for followUps and sendingSchedule (migration 1774210834868 already added the DB columns)"
    - path: "apps/api/app/models/contact.ts"
      reason: "Add missing @column declarations for emailVerifiedAt and emailVerifyMethod (migrations 25 + 28 already added the DB columns)"
    - path: "apps/api/app/controllers/contacts_controller.ts"
      reason: "Add stub movements() method referenced by routes.ts:77 but never implemented"
  files_to_read:
    - "apps/api/app/models/candidate_profile.ts"
    - "apps/api/app/models/contact.ts"
    - "apps/api/app/controllers/contacts_controller.ts"
    - "apps/api/start/routes.ts"

acceptance_criteria:

  functional:
    - id: "AC-FUNC-SC340-01"
      description: "Given the CandidateProfile model / When tsc checks it / Then followUps and sendingSchedule are declared as nullable JSONB columns"
      verify: "grep -n 'followUps\\|sendingSchedule' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/models/candidate_profile.ts"
      tier: 1

    - id: "AC-FUNC-SC340-02"
      description: "Given the Contact model / When tsc checks it / Then emailVerifiedAt and emailVerifyMethod are declared as nullable columns"
      verify: "grep -n 'emailVerifiedAt\\|emailVerifyMethod' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/models/contact.ts"
      tier: 1

    - id: "AC-FUNC-SC340-03"
      description: "Given the ContactsController / When the router resolves /:id/movements / Then the movements() method exists on the controller"
      verify: "grep -n 'async movements' /Volumes/Samsung_T5/dev/expat-hunter/apps/api/app/controllers/contacts_controller.ts"
      tier: 1

  best_practices:
    - id: "AC-BP-SC340-01"
      description: "TypeScript: 0 errors after changes"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/api && npx tsc --noEmit 2>&1 | wc -l | tr -d ' ' | grep '^0$'"
      tier: 1

    - id: "AC-BP-SC340-02"
      description: "All existing unit tests still pass after adding model columns"
      verify: "cd /Volumes/Samsung_T5/dev/expat-hunter/apps/api && NODE_ENV=test ~/.nvm/versions/node/v22.22.1/bin/node --import tsx/esm bin/test.ts 2>&1 | grep -E 'passed|failed'"
      tier: 2

edge_cases:
  - description: "followUps and sendingSchedule are nullable — existing rows have NULL in these columns"
    handling: "Declare as `Record<string, unknown>[] | null` to match the nullable JSONB migration"
  - description: "emailVerifiedAt is nullable — not all contacts have been verified"
    handling: "Declare as `DateTime | null` with @column.dateTime()"
  - description: "emailVerifyMethod is nullable — matches the migration (varchar 20, nullable)"
    handling: "Declare as `string | null`"
  - description: "movements() stub — the feature is not yet implemented"
    handling: "Return 200 with empty array for now: `return response.ok({ data: [] })`"

depends_on: []

notes: |
  Root causes (all model/type drift — no new migrations needed):
  1. Migration 1774210834868 added follow_ups + sending_schedule to candidate_profiles
     but CandidateProfile model was never updated.
  2. Migrations 25 + 28 added email_verified_at + email_verify_method to contacts
     but Contact model was never updated.
  3. routes.ts:77 declares [ContactsController, 'movements'] but the method was never
     implemented in the controller.

definition_of_done:
  - "npx tsc --noEmit exits with 0 errors"
  - "All unit tests pass"
  - "PR merged into main"
  - "Shortcut story sc-340 moved to Done"

closing_ac:
  - id: "AC-BP-SC340-DONE"
    type: "BP"
    description: "PR is merged into main — story closure gate."
    verify: "gh pr list --state merged --base main --json title | grep -q 'sc-340'"
    tier: 1
