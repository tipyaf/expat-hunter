id: "contact-sourcing"
name: "feat: contact sourcing — pluggable scrapers, anti-detection, search orchestration"
type: "feature"
status: "validated"
shortcut_url: ""

context: |
  Retrospective story — the feature was fully implemented before the framework was set up.
  Backend: pluggable ScraperRegistry, BaseScraper (anti-detection), SeekScraper,
  GoogleLinkedinProxyScraper, HunterCompanySearchScraper, SearchOrchestratorService
  (full pipeline: scraping → enrichment → AI analysis → email generation),
  SourcingService, SourcingOrchestrator, SearchRun/SourcingRun/SourcingSource models.
  Frontend: /recherche page with launch form, progress modal, history table.
  Tests: unit (scrapers + services) + functional (search flows).

scope:
  - "apps/api/app/scrapers/base_scraper.ts"
  - "apps/api/app/scrapers/scraper_registry.ts"
  - "apps/api/app/scrapers/seek_scraper.ts"
  - "apps/api/app/scrapers/google_linkedin_proxy_scraper.ts"
  - "apps/api/app/scrapers/hunter_company_search_scraper.ts"
  - "apps/api/app/services/search_orchestrator_service.ts"
  - "apps/api/app/services/sourcing_service.ts"
  - "apps/api/app/services/sourcing_orchestrator.ts"
  - "apps/api/app/controllers/search_controller.ts"
  - "apps/api/app/controllers/sourcing_controller.ts"
  - "apps/api/app/models/search_run.ts"
  - "apps/api/app/models/sourcing_run.ts"
  - "apps/api/app/models/sourcing_source.ts"
  - "apps/api/start/routes.ts"
  - "apps/frontend/src/app/recherche/page.tsx"
  - "apps/frontend/src/components/ui/search-progress-modal.tsx"
  - "apps/frontend/src/hooks/use-search.ts"
  - "apps/frontend/src/hooks/use-sourcing.ts"

acceptance_criteria:
  - id: "AC-FUNC-CS-01"
    type: "FUNC"
    description: "POST /api/recherche route exists and is wired to SearchController.launch"
    verify: "grep -c \"SearchController, 'launch'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-CS-02"
    type: "FUNC"
    description: "GET /api/recherche/:id/progress route exists"
    verify: "grep -c \"SearchController, 'progress'\" apps/api/start/routes.ts"
    tier: 1

  - id: "AC-FUNC-CS-03"
    type: "FUNC"
    description: "ScraperRegistry exposes register, getForCountry, getByName"
    verify: "grep -c 'register\\|getForCountry\\|getByName' apps/api/app/scrapers/scraper_registry.ts"
    tier: 1

  - id: "AC-FUNC-CS-04"
    type: "FUNC"
    description: "BaseScraper provides randomUserAgent + delay for anti-detection"
    verify: "grep -c 'randomUserAgent\\|delay' apps/api/app/scrapers/base_scraper.ts"
    tier: 1

  - id: "AC-FUNC-CS-05"
    type: "FUNC"
    description: "BaseScraper.deduplicateContacts deduplicates by email / LinkedIn / name+company"
    verify: "grep -c 'linkedinUrl\\|email\\|fullName.*companyName' apps/api/app/scrapers/base_scraper.ts"
    tier: 1

  - id: "AC-FUNC-CS-06"
    type: "FUNC"
    description: "Frontend /recherche page exists and uses useSearch hook"
    verify: "test -f apps/frontend/src/app/recherche/page.tsx && grep -c 'useSearch' apps/frontend/src/app/recherche/page.tsx"
    tier: 1

  - id: "AC-FUNC-CS-07"
    type: "FUNC"
    description: "All unit and functional search/scraper tests pass"
    verify: "cd apps/api && ~/.nvm/versions/node/v22.22.1/bin/node --import tsx/esm bin/test.ts 2>&1 | grep -E 'Tests.*passed'"
    tier: 2

  - id: "AC-SEC-CS-01"
    type: "SEC"
    description: "All /api/recherche routes are protected by auth middleware"
    verify: "grep -A 8 'prefix.*api/recherche' apps/api/start/routes.ts | grep -c 'middleware.auth'"
    tier: 1

  - id: "AC-SEC-CS-02"
    type: "SEC"
    description: "Search results scoped to user.id — no cross-user access in orchestrator"
    verify: "grep -c 'userId\\|user_id\\|user\\.id' apps/api/app/services/search_orchestrator_service.ts"
    tier: 1

  - id: "AC-SEC-CS-03"
    type: "SEC"
    description: "No raw SQL in service layer — Lucid ORM only"
    verify: "grep -rc 'knex.raw\\|db.raw\\|\.raw(' apps/api/app/services/search_orchestrator_service.ts apps/api/app/services/sourcing_service.ts | grep -v ':0' | wc -l | tr -d ' '"
    tier: 1

  - id: "AC-BP-CS-01"
    type: "BP"
    description: "All scrapers extend BaseScraper (pluggable pattern enforced)"
    verify: "grep -rl 'extends BaseScraper' apps/api/app/scrapers/ | wc -l | tr -d ' '"
    tier: 1

  - id: "AC-BP-CS-02"
    type: "BP"
    description: "Business logic in SearchOrchestratorService — controller only calls service"
    verify: "grep -c 'this.searchService\\.' apps/api/app/controllers/search_controller.ts"
    tier: 1

  - id: "AC-BP-CS-03"
    type: "BP"
    description: "Frontend /recherche page uses i18n keys (no hardcoded strings)"
    verify: "grep -c 'useTranslations' apps/frontend/src/app/recherche/page.tsx"
    tier: 1

edge_cases:
  - "Scraper returns 0 results → orchestrator continues with enrichment on empty set"
  - "Hunter.io API key missing → scraper skipped gracefully"
  - "Country with no registered scrapers → error returned to user"
  - "Search already running → concurrent launch blocked"
  - "Scraper throws → error logged, other scrapers continue (partial results)"
