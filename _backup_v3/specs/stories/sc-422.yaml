    - "apps/api/config/ally.ts"
    - "apps/api/database/migrations/XX_add_google_id_to_users.ts"
    - "apps/frontend/src/components/ui/social-auth-button.tsx"
    - "apps/frontend/src/app/auth/callback/page.tsx"
  files_to_modify:
