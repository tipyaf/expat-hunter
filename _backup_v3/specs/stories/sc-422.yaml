story:
  id: "sc-422"
  shortcut_url: "https://app.shortcut.com/expat-hunter/story/422"
  title: "Sign in with Google (OAuth)"
  parent_spec: "specs/expat-hunter.yaml"
  status: "refined"
  size: "M"
  estimate: 3
  type: "feature"
  refined_at: "2026-03-26"
  refined_by: "refinement"

user_story: >
  As a user, I want to sign in or register with my Google account so that
  I can access ExpatHunter without creating a password.

