excluded:
  - LinkedIn OAuth (sc-434)
  - Outlook / Meta / other providers
  - Forced email verification for OAuth accounts (email already verified by Google)
  - Any changes to existing email/password flow

oauth_flow: >
  1. User clicks "Continue with Google" on login or register page
  2. Frontend navigates to GET /api/auth/google
  3. AdonisJS Ally redirects to Google OAuth consent screen
  4. Google redirects to GET /api/auth/google/callback
  5. Ally verifies state (CSRF) and retrieves Google profile (email, name, googleId)
  6. API finds user by googleId OR email:
     - Found by googleId → log in directly
     - Found by email → link googleId to existing account, log in
     - Not found → create new user (password=null, emailVerifiedAt=now)
  7. Generate access token
  8. Redirect to FRONTEND_URL/auth/callback?token=<token>
  9. Frontend /auth/callback reads ?token, stores via loginWithToken(), redirects to /

notes:
  - "@adonisjs/ally handles CSRF state automatically — do NOT use .stateless()"
  - "User.password becomes nullable for OAuth-only accounts"
  - "Google profile email is already verified — set emailVerifiedAt = DateTime.now()"
  - "Use Google's official button branding: white background, Google SVG icon"
  - "FRONTEND_URL must be added to env.ts (used for redirect after callback)"

