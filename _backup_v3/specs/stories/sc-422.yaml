    - "apps/api/adonisrc.ts"
    - "apps/api/start/env.ts"
    - "apps/api/app/models/user.ts"
    - "apps/api/app/controllers/auth_controller.ts"
    - "apps/api/start/routes.ts"
    - "apps/frontend/src/contexts/auth-context.tsx"
    - "apps/frontend/src/app/login/page.tsx"
    - "apps/frontend/src/app/register/page.tsx"
    - "apps/frontend/src/i18n/en.json"
    - "apps/frontend/src/i18n/fr.json"
  files_to_read:
