# ============================================================================
# MÉTADONNÉES DE FILTRAGE
# ============================================================================

# Titres universellement exclus — peu importe le secteur
# Ces titres sont si génériques qu'ils polluent les résultats Hunter
universal_exclude:
  - "Intern"
  - "Trainee"
  - "Graduate"
  - "Junior"
  - "Assistant"
  - "Coordinator"
  - "Administrator"
  - "Officer" # sauf quand précédé de "Chief"
  - "Analyst" # sauf quand précédé de "Senior" ou manager explicite
  - "Specialist" # idem
  - "Consultant" # trop vague, ne signifie pas un pouvoir de recrutement

# Signaux positifs dans un titre (augmentent le score de pertinence)
positive_title_signals:
  - "Head of"
  - "Director of"
  - "VP "
  - "Vice President"
  - "Chief "
  - "Manager" # si combiné avec un scope (Engineering Manager, Finance Manager)
  - "Lead " # si combiné avec un scope technique
  - "Principal"
  - "Partner" # cabinets
  - "General Manager"

# Signaux négatifs dans un titre
negative_title_signals:
  - "HR"
  - "Human Resources"
  - "People & Culture"
  - "Talent"
  - "Recruiter"
  - "Recruitment"
  - "Payroll"
  - "Admin"
  - "Support"
  - "Assistant"

# ============================================================================
# NOTES D'IMPLÉMENTATION POUR LE SectorTitleService
# ============================================================================
#
# 1. PRIORITÉ DE CIBLAGE Hunter.io :
#    - Envoyer les titres PRIMARY en priorité (3-5 à la fois max)
#    - Si résultats < 3 contacts, compléter avec SECONDARY
#    - Ne jamais envoyer les titres HR/TALENT sauf option explicite utilisateur
#
# 2. MATCHING FLOU :
#    - Hunter.io cherche par titre exact (substring match)
#    - Inclure les variantes : "CTO" ET "Chief Technology Officer"
#    - Inclure les variantes locales NZ : "Head of X" plutôt que "Director of X"
#
# 3. SECTEURS MULTI-TITRES :
#    - Ne pas dépasser 10 titres par appel Hunter (risque timeout + limite crédit)
#    - Faire 2-3 appels avec des lots de titres différents si nécessaire
#
# 4. FALLBACK LLM :
#    - Si le secteur n'est pas dans ce fichier → utiliser le prompt dans
#      data/sector-titles-prompt.md
#    - Stocker le résultat en cache DB (sector_title_cache, 30j)
#    - Ajouter manuellement à ce fichier si le secteur devient récurrent
#
# 5. CACHE :
#    - Ce fichier = source "static" pour SectorTitleService
#    - generated_by = 'static' dans la table sector_title_cache
#    - expires_at = null (pas d'expiration pour les entrées statiques)
#
# ============================================================================
