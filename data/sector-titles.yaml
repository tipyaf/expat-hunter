# ============================================================================
# ExpatHunter — Base statique des titres de postes cibles par secteur
# Fichier : data/sector-titles.yaml
# Usage   : SectorTitleService — source primaire avant fallback LLM
# Version : 1.0.0
# Date    : 2026-03-23
# ============================================================================
#
# STRUCTURE PAR SECTEUR :
#
#   primary   : Managers opérationnels avec pouvoir de recruter — CIBLÉS EN PRIORITÉ
#               Critère : décident ou influencent directement les embauches dans leur équipe
#
#   secondary : Leads, seniors influents, peuvent initier le recrutement
#               Ciblés si pas de contacts primaires trouvés chez une entreprise
#
#   hr_talent : Postes RH/Talent — inclus si option "include_hr" activée (off par défaut)
#               Note : dans le contexte ExpatHunter (marché caché), on ÉVITE les RH
#               car ils reçoivent 100x plus de sollicitations que les managers opérationnels
#
#   exclude   : Titres trop génériques, seniors sans lien opérationnel, ou postes
#               qui n'ont pas de pouvoir d'embauche direct
#
# STRUCTURE PAR LANGUE/CULTURE :
#   en_anglophone : UK, AU, NZ, CA, US — titres en anglais
#   fr            : France, Belgique, Suisse romande — titres en français
#   de            : Allemagne, Suisse alémanique, Autriche — titres en allemand
#
# NOTES IMPORTANTES :
# - Pour le MVP NZ, seule la section en_anglophone est utilisée
# - Les variantes sont listées car Hunter.io cherche par titre exact
# - Les acronymes (CTO, CFO) sont inclus en plus des formes longues
# - Les titres "Head of X" sont préférés à "Director of X" dans la culture NZ/AU
#   (culture moins formelle que UK/US)
#
# ============================================================================

version: "1.0.0"
last_updated: "2026-03-23"
mvp_country: "NZ"

